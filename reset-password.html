<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>

  <link rel="icon" href="/Assets/og.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://dtgnvzjtojdqmujzokgh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0Z252emp0b2pkcW11anpva2doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyMTkwMDAsImV4cCI6MjA3Nzc5NTAwMH0.r8LBQ14sxABB0mIw0exPlmv19W1fx0-iKLyefPhh8d8";
    window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true

  });
  </script>

  <style>
    :root{
      --bg:#050508; --bg1:#141414; --bg2:#1b1b1b;
      --fg:#fff; --muted:#bdbdbd; --accent:#e50914; --accent-yellow:#FFD93B;
      --line:rgba(255,255,255,.08); --shadow:0 40px 120px -30px rgba(0,0,0,.7);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:radial-gradient(circle at top, #161623 0, #050508 55%, #000 100%);
      color:var(--fg);
      font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .card{
      width:min(520px, 96vw);
      background:var(--bg1);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .pad{padding:18px}
    h1{font-family:"Bebas Neue";letter-spacing:2px;margin:0;font-size:44px;text-transform:uppercase}
    .sub{color:var(--muted);margin-top:6px;line-height:1.35}
    input{
      width:100%;
      background:var(--bg2);
      border:1px solid var(--line);
      color:#fff;
      padding:12px 12px;
      border-radius:12px;
      outline:none;
      font-size:15px;
      margin-top:10px;
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;justify-content:flex-end}
    .btn{
      display:inline-flex;gap:8px;align-items:center;
      padding:10px 14px;border-radius:999px;border:1px solid var(--line);
      cursor:pointer;font-size:13px;background:transparent;color:var(--fg);
    }
    .btn.primary{
      background:radial-gradient(circle at top left,#ff4d4d,var(--accent));
      color:#fff;border-color:rgba(229,9,20,.9);
      box-shadow:0 0 18px rgba(229,9,20,.5);
    }
    .msg{margin-top:10px;font-size:13px}
    .msg.ok{color:#9affc5}
    .msg.bad{color:#ff9090}
    a{color:var(--accent-yellow);text-decoration:none}
  </style>
</head>

<body>
  <div class="card">
    <div class="pad">
      <h1>Reset password</h1>
      <div class="sub">
        Set a new password for your account.
      </div>

      <div id="guard" class="sub" style="margin-top:10px"></div>

      <label class="sub" style="display:block;margin-top:12px">New password</label>
      <input id="p1" type="password" autocomplete="new-password" placeholder="At least 6 characters"/>

      <label class="sub" style="display:block;margin-top:10px">Confirm new password</label>
      <input id="p2" type="password" autocomplete="new-password" placeholder="Repeat password"/>

      <div id="msg" class="msg"></div>

      <div class="row">
        <a class="btn" href="/">Home</a>
        <button id="save" class="btn primary" type="button">Save</button>
      </div>
    </div>
  </div>

<script>
  const $ = (id)=>document.getElementById(id);

  function setMsg(text, ok){
    const el = $('msg');
    el.textContent = text || '';
    el.className = 'msg ' + (ok ? 'ok' : (text ? 'bad' : ''));
  }

  async function boot(){
    // In Supabase reset flow, the user should have a temporary session after landing here.
    const { data: { session } } = await supabase.auth.getSession();

    if (!session?.user){
      $('guard').innerHTML =
        `No reset session found. Please use the reset link from your email again or <a href="/">go home</a>.`;
      $('save').disabled = true;
      return;
    }

    $('guard').textContent = 'Signed in for reset as: ' + (session.user.email || 'Driver');
  }

  $('save').onclick = async ()=>{
    const p1 = $('p1').value || '';
    const p2 = $('p2').value || '';

    if (p1.length < 6){
      setMsg('Password must be at least 6 characters.', false);
      return;
    }
    if (p1 !== p2){
      setMsg('Passwords do not match.', false);
      return;
    }

    $('save').disabled = true;
    setMsg('Saving…', true);

    const { error } = await supabase.auth.updateUser({ password: p1 });
    if (error){
      setMsg(error.message || 'Could not update password.', false);
      $('save').disabled = false;
      return;
    }

    setMsg('Password updated. You can go back home and log in.', true);

    // Optional: sign out after reset for cleanliness
    try{ await supabase.auth.signOut(); }catch(e){}
  };

  boot();
</script>
</body>
</html>
