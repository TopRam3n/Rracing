<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reset Password — ROK Racers JA</title>
  <meta name="description" content="Set a new password for your ROK Racers JA account." />
  <link rel="icon" href="/Assets/og.png"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://dtgnvzjtojdqmujzokgh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0Z252emp0b2pkcW11anpva2doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyMTkwMDAsImV4cCI6MjA3Nzc5NTAwMH0.r8LBQ14sxABB0mIw0exPlmv19W1fx0-iKLyefPhh8d8";
    window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>

  <style>
    :root{
      --bg:#050508; --bg1:#141414; --bg2:#1b1b1b;
      --fg:#fff; --muted:#bdbdbd; --accent:#e50914; --accent-yellow:#FFD93B;
      --line:rgba(255,255,255,.08); --shadow:0 40px 120px -30px rgba(0,0,0,.7);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:radial-gradient(circle at top, #161623 0, #050508 55%, #000 100%);
      color:var(--fg);
      font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif;
    }
    .container{max-width:720px;margin:0 auto;padding:56px 24px}
    h1{font-family:"Bebas Neue";letter-spacing:2px;margin:0;font-size:54px}
    .sub{color:var(--muted)}
    .card{
      margin-top:18px;
      background:var(--bg1);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .pad{padding:18px}
    input{
      width:100%;
      background:var(--bg2);
      border:1px solid var(--line);
      color:#fff;
      padding:12px;
      border-radius:12px;
      outline:none;
      font-size:14px;
      font-family:inherit;
      margin-top:8px;
    }
    .btn{
      display:inline-flex;gap:8px;align-items:center;
      padding:10px 14px;border-radius:999px;
      border:1px solid var(--line);
      cursor:pointer;font-size:13px;
      background:transparent;color:var(--fg);
    }
    .btn.primary{
      background:radial-gradient(circle at top left,#ff4d4d,var(--accent));
      color:#fff;border-color:rgba(229,9,20,.9);
      box-shadow:0 0 18px rgba(229,9,20,.5);
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;margin-top:12px}
    .err{color:#ffb4b4;font-size:13px;margin-top:10px}
    .ok{color:var(--accent-yellow);font-size:13px;margin-top:10px}
    a{color:var(--accent-yellow);text-decoration:none}
  </style>
</head>
<body>
  <main class="container">
    <h1>Reset password</h1>
    <div class="sub">Set a new password for your account.</div>

    <div class="card">
      <div class="pad">
        <label class="sub">New password</label>
        <input id="p1" type="password" autocomplete="new-password" placeholder="••••••••">

        <label class="sub" style="display:block;margin-top:12px">Confirm password</label>
        <input id="p2" type="password" autocomplete="new-password" placeholder="••••••••">

        <div class="row">
          <a class="btn" href="/">Home</a>
          <button id="save" class="btn primary">Save password</button>
        </div>

        <div id="msg" class="sub" style="margin-top:10px"></div>
        <div id="err" class="err" style="display:none"></div>
        <div id="ok" class="ok" style="display:none"></div>
      </div>
    </div>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);

    function showErr(t){
      $('ok').style.display='none';
      $('err').style.display = t ? 'block' : 'none';
      $('err').textContent = t || '';
    }
    function showOk(t){
      $('err').style.display='none';
      $('ok').style.display = t ? 'block' : 'none';
      $('ok').textContent = t || '';
    }

    // Helpful status: ensure session exists (Supabase sets a recovery session after redirect)
    window.addEventListener('DOMContentLoaded', async ()=>{
      const { data: { session } } = await supabase.auth.getSession();
      if(!session){
        $('msg').innerHTML = `No reset session found. Please request a new reset link from the login screen.`;
      } else {
        $('msg').innerHTML = `You’re connected. Set your new password below.`;
      }
    });

    $('save').addEventListener('click', async ()=>{
      showErr(''); showOk('');
      const p1 = $('p1').value || '';
      const p2 = $('p2').value || '';

      if(!p1 || p1.length < 8) return showErr('Password must be at least 8 characters.');
      if(p1 !== p2) return showErr('Passwords do not match.');

      const { error } = await supabase.auth.updateUser({ password: p1 });
      if(error) return showErr(error.message);

      showOk('Password updated. You can go back and log in now.');
      setTimeout(()=> location.href='/', 1200);
    });
  </script>
</body>
</html>
