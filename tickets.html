<style>
  :root{
    --bg:#050508;
    --bg1:#141414;
    --bg2:#1b1b1b;
    --fg:#fff;
    --muted:#bdbdbd;
    --accent:#e50914;
    --accent-yellow:#FFD93B;
    --line:rgba(255,255,255,.08);
    --shadow:0 40px 120px -30px rgba(0,0,0,.7);
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    background:radial-gradient(circle at top, #161623 0, #050508 55%, #000 100%);
    color:var(--fg);
    font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif;
  }
  a{color:inherit;text-decoration:none}
  .container{max-width:1200px;margin:0 auto;padding:0 24px}
  h1,h2{
    font-family:"Bebas Neue",system-ui,sans-serif;
    letter-spacing:2px;
    margin:0;
  }
  .sub{color:var(--muted);font-size:14px}

  /* NAV (matches events / likes pages) */
  .nav{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(5,5,8,.9);
    border-bottom:1px solid var(--line);
    backdrop-filter:saturate(140%) blur(12px);
  }
  .nav-inner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 0;
    gap:16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .logo{
    width:48px;
    height:48px;
    border-radius:12px;
    object-fit:cover;
  }
  .title small{
    color:var(--muted);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.16em;
  }

  .nav-auth{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .btn{
    display:inline-flex;
    gap:8px;
    align-items:center;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    cursor:pointer;
    font-size:13px;
    background:transparent;
    color:var(--fg);
    transition:transform .18s ease-out, box-shadow .18s ease-out, background .18s ease-out, border-color .18s ease-out;
  }
  .btn.small{
    padding:6px 10px;
    font-size:12px;
  }
  .btn.primary{
    background:radial-gradient(circle at top left,#ff4d4d,var(--accent));
    color:#fff;
    border-color:rgba(229,9,20,.9);
    box-shadow:0 0 18px rgba(229,9,20,.5);
  }
  .btn.primary:hover{
    box-shadow:0 0 26px rgba(229,9,20,.7);
    transform:translateY(-1px);
  }
  .btn:hover{
    background:rgba(255,255,255,0.03);
  }

  /* Profile nav (same ids as other pages for auth-ui.js) */
  .profile-menu{
    position:relative;
    display:flex;
    align-items:center;
  }
  .profile-chip{
    width:32px;
    height:32px;
    border-radius:50%;
    background:var(--bg2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
    cursor:pointer;
    border:1px solid var(--line);
    font-size:13px;
    transition:box-shadow .18s ease-out, border-color .18s ease-out, transform .18s ease-out;
  }
  .profile-chip:hover{
    border-color:rgba(255,255,255,.32);
    box-shadow:0 0 16px rgba(255,217,59,.6);
    transform:translateY(-1px);
  }
  .dropdown{
    position:absolute;
    right:0;
    top:40px;
    background:#121212;
    border:1px solid var(--line);
    box-shadow:0 20px 40px rgba(0,0,0,.6);
    border-radius:16px;
    display:flex;
    flex-direction:column;
    min-width:190px;
    z-index:60;
  }
  .dropdown a,
  .dropdown button{
    padding:10px 16px;
    text-align:left;
    border:none;
    background:transparent;
    color:var(--fg);
    font-size:13px;
    width:100%;
    cursor:pointer;
  }
  .dropdown a:hover,
  .dropdown button:hover{
    background:#1f1f1f;
  }

  main{padding:32px 0 48px}

  .header-row{
    display:flex;
    justify-content:space-between;
    gap:16px;
    align-items:flex-end;
    flex-wrap:wrap;
    margin-bottom:16px;
  }

  /* Filter pills (Upcoming / Past / All) */
  .filter-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:18px;
    align-items:center;
  }
  .filter-label{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.16em;
    color:var(--muted);
  }
  .filter-pill{
    border:none;
    padding:6px 12px;
    border-radius:999px;
    background:var(--bg2);
    border:1px solid var(--line);
    color:var(--fg);
    font-size:12px;
    cursor:pointer;
  }
  .filter-pill.active{
    background:#fff;
    color:#000;
    border-color:#fff;
  }

  .grid{
    display:grid;
    gap:18px;
    grid-template-columns:repeat(2,1fr);
  }
  @media(max-width:960px){
    .grid{grid-template-columns:1fr;}
  }

  .card{
    background:var(--bg1);
    border:1px solid var(--line);
    border-radius:20px;
    box-shadow:var(--shadow);
    overflow:hidden;
    transition:transform .22s ease-out, box-shadow .22s ease-out, border-color .22s ease-out;
  }
  .card:hover{
    transform:translateY(-4px);
    border-color:rgba(255,217,59,0.7);
    box-shadow:0 30px 80px rgba(0,0,0,.9);
  }

  .card img{
    display:block;
    width:100%;
    height:auto;
    max-height:220px;
    object-fit:cover;
  }

  .pad{
    padding:14px 16px 16px;
  }

  .date-block{
    background:var(--bg2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:8px 10px;
    min-width:60px;
    text-align:center;
  }
  .date-block .m{
    font-family:"Bebas Neue";
    font-size:20px;
    line-height:1;
  }
  .date-block .d{
    font-family:"Bebas Neue";
    font-size:24px;
    line-height:1;
  }

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:4px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--bg2);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.14em;
  }
  .pill.status{
    border-color:rgba(255,217,59,0.7);
    color:var(--accent-yellow);
  }

  .empty{
    border-radius:18px;
    border:1px dashed rgba(255,255,255,0.16);
    padding:20px 18px;
    background:rgba(5,5,8,0.9);
    text-align:left;
    box-shadow:0 24px 60px rgba(0,0,0,0.9);
  }

  #authMessage{
    margin-top:8px;
  }

  @media(max-width:600px){
    .nav-inner{flex-wrap:wrap;}
    .nav-auth{width:100%;justify-content:flex-end;}
    .header-row{align-items:flex-start;}
  }
</style>
</head>
<body>
  <!-- NAV -->
  <nav class="nav" role="navigation" aria-label="Primary">
    <div class="container nav-inner">
      <a class="brand" href="/" aria-label="ROK Racers JA home">
        <img src="/Assets/logo.png" alt="" class="logo">
        <div class="title">
          <h1>ROK RACERS JA</h1>
          <small>My tickets</small>
        </div>
      </a>

      <div class="nav-auth">
        <a class="btn" href="/events.html">Events</a>
        <a class="btn" href="/garage.html">Garage</a>

        <button id="navSignInBtn" class="btn">Log in</button>
        <button id="navJoinBtn" class="btn primary">Join the grid</button>

        <div id="navProfileWrap" class="profile-menu" style="display:none">
          <div id="navProfileChip" class="profile-chip" aria-haspopup="true" aria-expanded="false">
            <span id="navProfileInitials">U</span>
          </div>
          <div id="navProfileDropdown" class="dropdown" style="display:none">
            <a href="/garage.html">My Garage</a>
            <a href="/tickets.html">My Tickets</a>
            <a href="/likes-builds.html">Liked Builds</a>
            <a href="/likes-sightings.html">Liked Sightings</a>
            <a href="/teams.html">My Teams</a>
            <a href="/activity.html">Activity</a>
            <button id="signoutBtn" type="button">Sign out</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <section>
      <div class="header-row">
        <div>
          <h2 style="font-size:40px;letter-spacing:2px;text-transform:uppercase;">My tickets</h2>
          <p class="sub">
            Events you’ve locked in with an RSVP. As payments roll in later, this page becomes your full ticket wallet.
          </p>
        </div>
        <button class="btn" onclick="location.href='/events.html'">
          Browse events
        </button>
      </div>

      <p id="authMessage" class="sub"></p>

      <div class="filter-row" id="filterRow" style="display:none">
        <span class="filter-label">Show</span>
        <button class="filter-pill active" data-when="upcoming">Upcoming</button>
        <button class="filter-pill" data-when="past">Past</button>
        <button class="filter-pill" data-when="all">All</button>
      </div>

      <div id="ticketsGrid" class="grid" aria-live="polite">
        <div class="empty">
          Loading your tickets…
        </div>
      </div>
    </section>
  </main>

  <script>
    const pageState = {
      allTickets: [],
      filterWhen: 'upcoming'
    };

    function escapeHTML(s){
      return (s || "").replace(/[&<>"']/g, m => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]
      ));
    }

    function isUpcoming(dateStr){
      if (!dateStr) return false;
      const now = new Date();
      const d = new Date(dateStr);
      return d >= now;
    }

    function renderTickets(){
      const grid = document.getElementById('ticketsGrid');
      const when = pageState.filterWhen;
      let rows = pageState.allTickets.slice(0);

      if (when === 'upcoming'){
        rows = rows.filter(r => r.event.starts_at && isUpcoming(r.event.starts_at));
      } else if (when === 'past'){
        rows = rows.filter(r => r.event.starts_at && !isUpcoming(r.event.starts_at));
      }

      if (!rows.length){
        grid.innerHTML = `
          <div class="empty">
            <p style="margin-bottom:6px;">No tickets in this view yet.</p>
            <p class="sub" style="margin-bottom:10px;">
              Try switching filters, or hit the events board and RSVP “Yes” to a meet.
            </p>
            <button class="btn primary" type="button" onclick="location.href='/events.html'">
              View events
            </button>
          </div>`;
        return;
      }

      grid.innerHTML = rows.map(({ rsvp, event }) => {
        const d = event.starts_at ? new Date(event.starts_at) : null;
        const m = d ? d.toLocaleString("en-US",{month:"short"}).toUpperCase() : "--";
        const day = d ? String(d.getDate()).padStart(2,"0") : "--";
        const whenStr = d
          ? d.toLocaleString("en-US",{ weekday:"short", hour:"numeric", minute:"2-digit" })
          : "";
        const loc = event.location
          ? `${whenStr ? whenStr + " • " : ""}${event.location}`
          : whenStr;

        const booked = rsvp.created_at
          ? new Date(rsvp.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})
          : "";

        const statusLabel = (rsvp.status || '').toUpperCase();
        const isConfirmed = rsvp.status === 'yes';

        const statusText = isConfirmed ? 'Confirmed RSVP' : `RSVP: ${statusLabel || 'UNKNOWN'}`;

        return `
          <article class="card">
            ${event.cover_url
              ? `<img src="${escapeHTML(event.cover_url)}" alt="${escapeHTML(event.title)}" loading="lazy">`
              : ''}
            <div class="pad">
              <div class="row" style="margin-bottom:8px">
                <div style="display:flex;gap:10px;align-items:center;flex:1 1 auto;min-width:0;">
                  <div class="date-block">
                    <div class="m">${m}</div>
                    <div class="d">${day}</div>
                  </div>
                  <div style="min-width:0;">
                    <strong style="display:block;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;">
                      ${escapeHTML(event.title)}
                    </strong>
                    ${loc ? `<div class="sub">${escapeHTML(loc)}</div>` : ''}
                  </div>
                </div>
                <span class="pill status">
                  ${escapeHTML(statusText)}
                </span>
              </div>

              <div class="row" style="margin-top:6px">
                <span class="sub">
                  ${booked ? `Booked on ${escapeHTML(booked)}` : ''}
                </span>
                <a class="btn small" href="/event.html?id=${event.id}">
                  View event
                </a>
              </div>
            </div>
          </article>`;
      }).join('');
    }

    async function loadTickets(){
      const grid = document.getElementById('ticketsGrid');
      const authMsg = document.getElementById('authMessage');
      const filterRow = document.getElementById('filterRow');

      grid.innerHTML = `<div class="empty">Loading your tickets…</div>`;

      const { data: { user } } = await supabase.auth.getUser();

      if (!user){
        authMsg.textContent = "Sign in to see your tickets and RSVPs.";
        grid.innerHTML = `
          <div class="empty">
            <p style="margin-bottom:8px;">You’re not signed in.</p>
            <button class="btn primary" type="button"
              onclick="window.authUI && authUI.requireLogin(()=>location.reload())">
              Log in to view tickets
            </button>
          </div>`;
        filterRow.style.display = 'none';
        return;
      }

      authMsg.textContent = "";
      filterRow.style.display = 'flex';

      // Fetch RSVPs where status = 'yes' (i.e. confirmed / ticket)
      const rsvpRes = await supabase
        .from('event_rsvps')
        .select('event_id,status,created_at')
        .eq('user_id', user.id)
        .in('status', ['yes', 'maybe'])           // in case you want to show maybes as soft tickets
        .order('created_at',{ ascending:false });

      if (rsvpRes.error){
        console.error(rsvpRes.error);
        grid.innerHTML = `
          <div class="empty">
            Couldn’t load your tickets right now. Refresh in a bit.
          </div>`;
        filterRow.style.display = 'none';
        return;
      }

      const rsvps = rsvpRes.data || [];
      if (!rsvps.length){
        grid.innerHTML = `
          <div class="empty">
            <p style="margin-bottom:6px;">No tickets yet.</p>
            <p class="sub" style="margin-bottom:10px;">
              Once you RSVP “Yes” to an event, it’ll show up here as your ticket.
            </p>
            <button class="btn primary" type="button" onclick="location.href='/events.html'">
              Browse events
            </button>
          </div>`;
        filterRow.style.display = 'none';
        return;
      }

      const eventIds = [...new Set(rsvps.map(r => r.event_id))];

      const evRes = await supabase
        .from('events')
        .select('id,title,starts_at,location,cover_url')
        .in('id', eventIds);

      if (evRes.error){
        console.error(evRes.error);
        grid.innerHTML = `
          <div class="empty">
            Couldn’t load events linked to your tickets. Try again shortly.
          </div>`;
        return;
      }

      const events = evRes.data || [];
      const evMap = new Map(events.map(e => [e.id, e]));

      // keep only latest RSVP per event
      const latestByEvent = new Map();
      rsvps.forEach(r => {
        const prev = latestByEvent.get(r.event_id);
        if (!prev || new Date(r.created_at) > new Date(prev.created_at)){
          latestByEvent.set(r.event_id, r);
        }
      });

      const rows = [];
      latestByEvent.forEach((rsvp, eventId) => {
        const event = evMap.get(eventId);
        if (event) rows.push({ rsvp, event });
      });

      // sort by event date (soonest first)
      rows.sort((a,b) => {
        const da = a.event.starts_at ? new Date(a.event.starts_at) : new Date(0);
        const db = b.event.starts_at ? new Date(b.event.starts_at) : new Date(0);
        return da - db;
      });

      pageState.allTickets = rows;
      renderTickets();
    }

    // hook up filter pills
    document.addEventListener('click', (e) => {
      const pill = e.target.closest('.filter-pill');
      if (!pill) return;
      const when = pill.dataset.when;
      if (!when) return;

      document.querySelectorAll('.filter-pill').forEach(p => {
        p.classList.toggle('active', p === pill);
      });

      pageState.filterWhen = when;
      renderTickets();
    });

    document.addEventListener('DOMContentLoaded', loadTickets);
  </script>
</body>
</html>
