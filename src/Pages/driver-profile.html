<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Driver Profile — ROK Racers JA</title>
  <meta name="description" content="Driver profile and statistics." />
  <link rel="icon" href="../../Assets/og.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../Security/supabase-client.js"></script>
  <script src="../Security/auth-ui.js"></script>
  <link rel="stylesheet" href="../../styles/design-system.css">

  <style>
    :root {
      --bg-main: #050508;
      --bg-card: #141414;
      --accent-main: #128b02;
      --text-main: #ffffff;
      --text-muted: #bdbdbd;
      --border-subtle: rgba(255,255,255,0.08);
      --shadow-soft: 0 18px 40px rgba(0,0,0,0.7);
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{
      min-height:100%;
      background:radial-gradient(circle at top,#161623 0,#050508 55%,#000 100%);
      color:var(--text-main);
      font-family:"Rajdhani",system-ui,sans-serif;
    }
    .container{ width:min(1280px,100% - 32px); margin:0 auto; padding:26px 0 56px; }
    @media(min-width:1280px){ .container{ width:min(1280px,100% - 64px); } }

    /* Nav */
    .nav-wrapper{
      position:sticky; top:0; z-index:40;
      backdrop-filter:blur(16px);
      background:linear-gradient(to bottom,rgba(5,5,8,0.92),rgba(5,5,8,0.62));
      border-bottom:1px solid rgba(255,255,255,0.04);
    }
    .nav{
      height:76px;
      display:flex; align-items:center; justify-content:space-between; gap:20px;
      padding:0 24px;
    }
    .logo{ display:flex; align-items:center; gap:10px; letter-spacing:0.04em; }
    .page-title{
      font-family:"Bebas Neue";
      font-size:clamp(36px,6vw,48px);
      letter-spacing:2px; text-transform:uppercase; line-height:0.95;
      margin-bottom:8px;
    }
    .sub{ color:var(--text-muted); font-size:13px; }

    /* Profile header */
    .profile-header{
      display:grid; gap:16px; margin-bottom:32px;
      padding:24px; border-radius:18px;
      border:1px solid var(--border-subtle);
      background:radial-gradient(circle at top,rgba(255,255,255,0.05),rgba(10,10,10,0.96));
      box-shadow:var(--shadow-soft);
    }
    .profile-top{
      display:flex; gap:20px; align-items:flex-start;
    }
    .profile-avatar{
      width:120px; height:120px; border-radius:12px;
      background:linear-gradient(135deg,#128b02,#0a5c00);
      display:flex; align-items:center; justify-content:center;
      font-size:40px; font-weight:700; flex-shrink:0;
    }
    .profile-info{ flex:1; }
    .profile-name{
      font-family:"Bebas Neue";
      font-size:32px; letter-spacing:1.5px; margin-bottom:4px;
    }
    .profile-meta{
      display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px;
    }
    .profile-badge{
      padding:4px 10px; border-radius:6px;
      border:1px solid rgba(24,158,6,0.3);
      background:rgba(24,158,6,0.08);
      font-size:11px; color:rgba(24,158,6,0.8);
      text-transform:uppercase; letter-spacing:0.08em;
    }
    .profile-bio{
      font-size:13px; color:var(--text-muted); line-height:1.6; max-width:600px;
    }

    /* Stats grid */
    .stats-grid{
      display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:12px; margin-top:16px;
    }
    .stat-card{
      padding:16px; border-radius:12px;
      border:1px solid rgba(24,158,6,0.2);
      background:rgba(24,158,6,0.05);
      text-align:center;
    }
    .stat-value{
      font-family:"Bebas Neue";
      font-size:28px; letter-spacing:1px; color:#fff; margin-bottom:4px;
    }
    .stat-label{
      font-size:11px; text-transform:uppercase;
      letter-spacing:0.1em; color:var(--text-muted);
    }

    /* Accolades */
    .section-title{
      font-family:"Bebas Neue";
      font-size:24px; letter-spacing:1.2px;
      text-transform:uppercase; margin:24px 0 16px;
    }
    .accolades-grid{
      display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:12px;
    }
    .accolade-badge{
      padding:12px; border-radius:10px;
      border:1px solid rgba(255,217,59,0.3);
      background:rgba(255,217,59,0.08);
      text-align:center; font-size:12px;
    }
    .accolade-emoji{ font-size:24px; margin-bottom:6px; display:block; }
    .accolade-name{ color:#fff; font-weight:600; margin-bottom:2px; }
    .accolade-by{ font-size:10px; color:var(--text-muted); }

    /* Builds */
    .builds-grid{
      display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:12px;
    }
    .build-card{
      border-radius:10px; border:1px solid var(--border-subtle);
      background:linear-gradient(135deg,rgba(20,20,24,0.8),rgba(10,10,10,0.95));
      overflow:hidden; transition:transform 0.2s ease;
      cursor:pointer;
    }
    .build-card:hover{ transform:translateY(-3px); }
    .build-thumb{
      width:100%; height:140px;
      background:linear-gradient(135deg,#171717,#262626);
      display:flex; align-items:center; justify-content:center;
      font-size:32px; overflow:hidden;
    }
    .build-thumb img{ width:100%; height:100%; object-fit:cover; }
    .build-info{ padding:12px; }
    .build-title{ font-weight:600; font-size:12px; line-height:1.3; margin-bottom:4px; }
    .build-meta{ font-size:10px; color:var(--text-muted); }

    .empty-state{
      padding:40px 20px; text-align:center; color:var(--text-muted);
      border-radius:12px; border:1px dashed var(--border-subtle);
    }
  </style>
</head>

<body>
  <!-- NAV -->
  <div class="nav-wrapper" id="navWrapper"></div>

  <main class="container">
    <div id="profileContent">
      <div style="text-align:center; padding:40px;">
        <div class="sub">Loading profile…</div>
      </div>
    </div>
  </main>

<script>
const $ = (id) => document.getElementById(id);
const navWrapper = $('navWrapper');

// Nav solid on scroll
function updateNavSolid(){
  navWrapper?.classList.toggle('nav-solid', window.scrollY > 40);
}
updateNavSolid();
window.addEventListener('scroll', updateNavSolid, { passive:true });

async function loadProfile() {
  const params = new URLSearchParams(location.search);
  const userId = params.get('id');
  if (!userId) {
    $('profileContent').innerHTML = `<div class="empty-state">No user specified.</div>`;
    return;
  }

  try {
    // Fetch driver profile
    const { data: profile } = await supabase
      .from('driver_profiles')
      .select('*')
      .eq('id', userId)
      .maybeSingle();

    if (!profile) {
      $('profileContent').innerHTML = `<div class="empty-state">Driver profile not found.</div>`;
      return;
    }

    // Fetch accolades
    const { data: accolades } = await supabase
      .from('accolades')
      .select('*')
      .eq('driver_id', userId);

    // Fetch stats
    const { data: stats } = await supabase
      .from('driver_stats')
      .select('*')
      .eq('user_id', userId)
      .maybeSingle();

    // Fetch builds (if linked_build_id exists)
    let builds = [];
    if (profile.linked_build_id) {
      const { data: buildData } = await supabase
        .from('builds')
        .select('id,title,year,make,model,thumb_url')
        .eq('id', profile.linked_build_id);
      builds = buildData || [];
    }

    // Render profile
    const initials = profile.handle ? profile.handle.substring(0, 2).toUpperCase() : '👤';
    const html = `
      <div class="profile-header">
        <div class="profile-top">
          <div class="profile-avatar">${initials}</div>
          <div class="profile-info">
            <div class="profile-name">${escapeHTML(profile.handle || 'Driver')}</div>
            <div class="profile-meta">
              ${profile.racing_class ? `<div class="profile-badge">${escapeHTML(profile.racing_class)}</div>` : ''}
              ${profile.discipline ? `<div class="profile-badge">${escapeHTML(profile.discipline)}</div>` : ''}
              ${profile.car_number ? `<div class="profile-badge">#${profile.car_number}</div>` : ''}
            </div>
            ${profile.bio ? `<div class="profile-bio">${escapeHTML(profile.bio)}</div>` : ''}
          </div>
        </div>

        ${stats ? `
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value">${stats.events_entered || 0}</div>
              <div class="stat-label">Events</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${stats.wins || 0}</div>
              <div class="stat-label">Wins</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${stats.podiums || 0}</div>
              <div class="stat-label">Podiums</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${stats.dnfs || 0}</div>
              <div class="stat-label">DNFs</div>
            </div>
          </div>
        ` : ''}
      </div>

      ${accolades && accolades.length ? `
        <h2 class="section-title">🏆 Accolades</h2>
        <div class="accolades-grid">
          ${accolades.map(a => `
            <div class="accolade-badge">
              <span class="accolade-emoji">${a.emoji || '⭐'}</span>
              <div class="accolade-name">${escapeHTML(a.title || 'Achievement')}</div>
              <div class="accolade-by">${escapeHTML(a.issuer || 'Verified')}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      ${builds && builds.length ? `
        <h2 class="section-title">🚗 Featured Build</h2>
        <div class="builds-grid">
          ${builds.map(b => `
            <a href="/build.html?id=${encodeURIComponent(b.id)}" class="build-card">
              <div class="build-thumb">
                ${b.thumb_url ? `<img src="${escapeHTML(b.thumb_url)}" alt="Build" loading="lazy">` : '🚙'}
              </div>
              <div class="build-info">
                <div class="build-title">${escapeHTML(b.title || 'Build')}</div>
                <div class="build-meta">${[b.year, b.make, b.model].filter(Boolean).join(' ')}</div>
              </div>
            </a>
          `).join('')}
        </div>
      ` : ''}
    `;

    $('profileContent').innerHTML = html;
  } catch (err) {
    console.error('Profile load error:', err);
    $('profileContent').innerHTML = `<div class="empty-state">Error loading profile.</div>`;
  }
}

function escapeHTML(s) {
  return (s || '').replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
</html>
