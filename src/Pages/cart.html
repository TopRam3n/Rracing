<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ROK Racers JA — Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Design System (centralized tokens + components) -->
  <link rel="stylesheet" href="../../styles/design-system.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#050508;--text:#fff;--muted:#bdbdbd;--border:rgba(255,255,255,.12);--accent:#E50914}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:radial-gradient(circle at top,#161623 0,#050508 55%,#000 100%);color:var(--text);font-family:Rajdhani,system-ui}
    .wrap{width:min(900px,100% - 32px);margin:0 auto;padding:24px 0 50px}
    h1{font-size:22px;letter-spacing:.14em;text-transform:uppercase}
    .sub{color:var(--muted);font-size:13px;margin-top:6px}
    .card{margin-top:14px;border:1px solid rgba(255,255,255,.08);background:rgba(10,10,10,.7);border-radius:18px;padding:14px}
    .row{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
    .row:last-child{border-bottom:none}
    .btn{border-radius:999px;border:1px solid transparent;padding:10px 14px;cursor:pointer;font-size:12px;text-transform:uppercase;letter-spacing:.16em;background:transparent;color:var(--text)}
    .btn-primary{background:radial-gradient(circle at top left,#ff4d4d,var(--accent));border-color:rgba(229,9,20,.9)}
    .btn-ghost{border-color:rgba(255,255,255,.16);color:var(--muted)}
    input{width:74px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.35);color:#fff;padding:8px 10px;outline:none}
    .tot{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
      <div>
        <h1>Cart</h1>
        <div class="sub">Ready to checkout</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="location.href='./store.html'">Back to store</button>
        <button id="clearBtn" class="btn btn-ghost">Clear</button>
      </div>
    </div>

    <div id="list" class="card"></div>

    <div class="card">
      <div class="tot">
        <div>
          <div style="font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:12px">Total</div>
          <div class="sub" id="totSub">Calculated server-side at checkout</div>
        </div>
        <button id="checkoutBtn" class="btn btn-primary">Checkout</button>
      </div>
      <div class="sub" style="margin-top:10px">
        Prices are verified on the server to prevent cart tampering.
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://dtgnvzjtojdqmujzokgh.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_ANON_KEY_HERE";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getCart(){ try { return JSON.parse(localStorage.getItem('rok_cart')||'[]'); } catch { return []; } }
    function setCart(c){ localStorage.setItem('rok_cart', JSON.stringify(c)); }

    const list = document.getElementById('list');
    const clearBtn = document.getElementById('clearBtn');
    const checkoutBtn = document.getElementById('checkoutBtn');

    async function load(){
      const cart = getCart();
      if (!cart.length){
        list.innerHTML = `<div class="sub">Cart empty. Go add merch.</div>`;
        checkoutBtn.disabled = true;
        checkoutBtn.style.opacity = .6;
        return;
      }

      // Pull products for display (prices still verified server-side later)
      const ids = cart.map(i => i.product_id);
      const { data, error } = await sb.from('products')
        .select('id,title,price_jmd,active')
        .in('id', ids);

      if (error){
        console.error(error);
        list.innerHTML = `<div class="sub">Couldn’t load cart items. Refresh.</div>`;
        return;
      }

      const map = new Map((data||[]).map(p => [p.id, p]));
      list.innerHTML = cart.map(item => {
        const p = map.get(item.product_id);
        const name = p?.title || 'Product';
        return `
          <div class="row" data-id="${item.product_id}">
            <div style="display:flex;flex-direction:column;gap:3px">
              <div style="font-weight:700">${name}</div>
              <div class="sub">${p?.active ? 'Active' : 'Unavailable'}</div>
            </div>
            <div style="display:flex;gap:10px;align-items:center">
              <input type="number" min="1" value="${item.qty}" />
              <button class="btn btn-ghost" data-remove>Remove</button>
            </div>
          </div>
        `;
      }).join('');

      list.onclick = (e)=>{
        const row = e.target.closest('[data-id]');
        if (!row) return;
        const id = row.dataset.id;
        const cart2 = getCart();

        if (e.target.closest('[data-remove]')){
          setCart(cart2.filter(x => x.product_id !== id));
          load();
          return;
        }
      };

      list.onchange = (e)=>{
        const row = e.target.closest('[data-id]');
        if (!row) return;
        const id = row.dataset.id;
        const qty = Math.max(1, parseInt(row.querySelector('input')?.value || '1', 10));
        const cart2 = getCart();
        const item = cart2.find(x => x.product_id === id);
        if (item) item.qty = qty;
        setCart(cart2);
      };
    }

    clearBtn.onclick = ()=>{ setCart([]); load(); };

    checkoutBtn.onclick = async ()=>{
      const cart = getCart();
      if (!cart.length) return;

      // OPTIONAL: require login for checkout
      const { data: { user } } = await sb.auth.getUser();
      if (!user){
        alert("Please log in from the Store page first.");
        location.href = '/store.html';
        return;
      }

      const res = await fetch('/api/create-checkout-session', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ cart })
      });

      const out = await res.json().catch(()=> ({}));
      if (!res.ok) return alert(out.error || 'Checkout failed');

      // Redirect to Stripe Checkout
      window.location.href = out.url;
    };

    load();
  </script>
</body>
</html>
