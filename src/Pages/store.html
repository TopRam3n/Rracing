<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Store - ROK Racers JA</title>
  <meta name="description" content="Official ROK Racers merch and gear." />

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../Security/supabase-client.js"></script>
  <script src="../Security/auth-ui.js"></script>
  <link rel="stylesheet" href="../../styles/design-system.css" />

  <style>
    :root{--bg:#050508;--card:#141414;--muted:#bdbdbd;--line:rgba(255,255,255,.1);--accent:#128b02}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top,#161623 0,#050508 55%,#000 100%);color:#fff;font-family:Rajdhani,system-ui}
    a{color:inherit;text-decoration:none}
    .wrap{width:min(1180px,100% - 32px);margin:0 auto;padding:24px 0 48px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .title{font-family:"Bebas Neue";font-size:56px;letter-spacing:.06em;margin:0}
    .sub{color:var(--muted)}
    .btn{padding:9px 14px;border:1px solid var(--line);border-radius:999px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;background:transparent;color:#fff}
    .btn.on{border-color:rgba(18,139,2,.7);box-shadow:0 0 18px rgba(18,139,2,.3)}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:18px}
    @media(max-width:1000px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}} @media(max-width:720px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}} @media(max-width:520px){.grid{grid-template-columns:1fr}}
    .card{background:linear-gradient(160deg,#191919,#101014);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 16px 36px rgba(0,0,0,.45)}
    .img{height:160px;background:linear-gradient(135deg,#1f1f1f,#2d2d2d)}
    .body{padding:12px;display:grid;gap:8px}
    .name{font-size:18px;font-weight:700}
    .price{font-size:14px;color:#b9f6c5}
    .hint{color:var(--muted);font-size:12px}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1 class="title">Store</h1>
        <div class="sub">Official merch and drop-ready gear.</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn" href="./index.html">Home</a>
        <a class="btn" href="./marketplace.html">Marketplace</a>
        <a class="btn on" href="./store.html">Store</a>
      </div>
    </div>

    <section class="grid" id="products">
      <article class="card"><div class="img"></div><div class="body"><div class="name">ROK Tee - Black</div><div class="price">JMD 4,500</div><div class="hint">Drop-ready street fit.</div></div></article>
      <article class="card"><div class="img"></div><div class="body"><div class="name">Paddock Hoodie</div><div class="price">JMD 8,900</div><div class="hint">Heavyweight fleece.</div></div></article>
      <article class="card"><div class="img"></div><div class="body"><div class="name">Track Cap</div><div class="price">JMD 2,800</div><div class="hint">Curved brim, embroidered logo.</div></div></article>
      <article class="card"><div class="img"></div><div class="body"><div class="name">Grid Sticker Pack</div><div class="price">JMD 1,200</div><div class="hint">Weatherproof vinyl set.</div></div></article>
    </section>
  </main>
</body>
</html>
