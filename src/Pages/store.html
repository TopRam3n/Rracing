<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Merch Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- Design System (centralized tokens + components) -->
  <link rel="stylesheet" href="../../styles/design-system.css">

  <style>
    :root{
      --bg:#050508; --card:#141414; --muted:#bdbdbd; --text:#fff;
      --accent:#E50914; --yellow:#FFD93B;
      --border:rgba(255,255,255,.10);
      --r:18px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:radial-gradient(circle at top,#161623 0,#050508 55%,#000 100%);color:var(--text);font-family:Rajdhani,system-ui}
    a{color:inherit;text-decoration:none}
    .wrap{width:min(1200px,100% - 32px);margin:0 auto;padding:22px 0 50px}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
    .brand{display:flex;gap:10px;align-items:center}
    .logo{width:38px;height:38px;border-radius:50%;border:1px solid rgba(229,9,20,.7);overflow:hidden;background:#000}
    .logo img{width:100%;height:100%;object-fit:cover}
    h1{font-family:"Bebas Neue";letter-spacing:.08em;font-size:34px;text-transform:uppercase;line-height:1}
    .sub{color:var(--muted);font-size:13px;margin-top:4px}
    .btn{border-radius:999px;border:1px solid transparent;padding:10px 14px;cursor:pointer;font-size:12px;text-transform:uppercase;letter-spacing:.16em;background:transparent;color:var(--text)}
    .btn-primary{background:radial-gradient(circle at top left,#ff4d4d,var(--accent));border-color:rgba(229,9,20,.9)}
    .btn-ghost{border-color:rgba(255,255,255,.16);color:var(--muted)}
    .btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,.26)}
    .topbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .pill{padding:6px 10px;border:1px solid rgba(255,255,255,.14);border-radius:999px;color:var(--muted);font-size:11px;letter-spacing:.12em;text-transform:uppercase}

    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:16px}
    @media (max-width:980px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media (max-width:720px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:480px){.grid{grid-template-columns:1fr}}
    .card{
      border:1px solid rgba(255,255,255,.08);
      background:radial-gradient(circle at top, rgba(255,255,255,.06), rgba(10,10,10,.96));
      border-radius:var(--r); overflow:hidden;
      box-shadow:0 18px 40px rgba(0,0,0,.65);
      display:flex;flex-direction:column;
    }
    .img{height:180px;background:linear-gradient(135deg,#181818,#292929);position:relative}
    .img img{width:100%;height:100%;object-fit:cover;display:block}
    .body{padding:12px;display:flex;flex-direction:column;gap:8px;flex:1}
    .title{font-weight:700;font-size:15px}
    .desc{color:var(--muted);font-size:12px;line-height:1.35;min-height:32px}
    .row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:auto}
    .price{font-weight:700;letter-spacing:.06em}
    .small{color:var(--muted);font-size:11px}
    .actions{display:flex;gap:8px;align-items:center}
    .qty{width:58px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.35);color:#fff;padding:8px 10px;outline:none}

    /* Admin drawer */
    .drawerMask{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:50}
    .drawer{
      position:fixed;top:0;right:0;height:100%;width:min(520px,92vw);
      background:rgba(10,10,14,.98);border-left:1px solid rgba(255,255,255,.10);
      box-shadow:-24px 0 60px rgba(0,0,0,.75);
      padding:16px;display:none;z-index:60;overflow:auto
    }
    .drawer h2{font-size:14px;letter-spacing:.16em;text-transform:uppercase;margin:6px 0 10px}
    .field{display:flex;flex-direction:column;gap:6px;margin:10px 0}
    .field label{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    .field input,.field textarea{
      border-radius:14px;border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.35);color:#fff;padding:10px 12px;outline:none
    }
    .field textarea{min-height:90px;resize:vertical}
    .adminList{margin-top:14px;display:flex;flex-direction:column;gap:10px}
    .adminItem{
      border:1px solid rgba(255,255,255,.10);border-radius:16px;padding:10px 12px;
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start
    }
    .adminItem .meta{display:flex;flex-direction:column;gap:4px}
    .adminItem .meta b{font-size:13px}
    .adminItem .meta span{font-size:11px;color:var(--muted)}
    .adminItem .btn{padding:8px 10px;font-size:10px}
    .warn{color:var(--yellow);font-size:12px;margin-top:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo"><img src="../../Assets/logo.png" alt="ROK Racers"></div>
        <div>
          <h1>COMING SOON</h1>
          <div class="sub">Look out for merch drops from the grid</div>
        </div>
      </div>

      <div class="topbar">
        <span id="authPill" class="pill">Checking session…</span>
        <button class="btn btn-ghost" onclick="location.href='./cart.html'">Cart (<span id="cartCount">0</span>)</button>
        <button id="adminBtn" class="btn btn-ghost" style="display:none">Admin</button>
        <button id="loginBtn" class="btn btn-primary">Log in</button>
      </div>
    </header>

    <div id="grid" class="grid" aria-live="polite"></div>
  </div>

  <div id="drawerMask" class="drawerMask"></div>
  <aside id="drawer" class="drawer">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
      <h2>Admin · Products</h2>
      <button id="closeDrawer" class="btn btn-ghost">Close</button>
    </div>

    <div class="warn">Only admins can add, edit, or delete products.</div>

    <h2 style="margin-top:14px">Add / Update product</h2>

    <div class="field">
      <label>Product ID (leave blank to create new)</label>
      <input id="p_id" placeholder="auto" />
    </div>
    <div class="field">
      <label>Title</label>
      <input id="p_title" placeholder="ROK Tee" />
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="p_desc" placeholder="Heavyweight cotton, stitched logo…"></textarea>
    </div>
    <div class="field">
      <label>Image URL</label>
      <input id="p_img" placeholder="https://..." />
    </div>
    <div class="field">
      <label>Price (JMD)</label>
      <input id="p_price" type="number" min="0" step="1" placeholder="4500" />
    </div>
    <div class="field">
      <label>Active</label>
      <input id="p_active" type="checkbox" checked />
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
      <button id="saveProduct" class="btn btn-primary">Save</button>
      <button id="clearForm" class="btn btn-ghost">Clear</button>
    </div>

    <h2 style="margin-top:18px">All products</h2>
    <div id="adminList" class="adminList"></div>
  </aside>

  <script>
    const SUPABASE_URL = "https://dtgnvzjtojdqmujzokgh.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_ANON_KEY_HERE"; // keep your existing one
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const grid = document.getElementById('grid');
    const cartCount = document.getElementById('cartCount');
    const authPill = document.getElementById('authPill');
    const loginBtn = document.getElementById('loginBtn');
    const adminBtn = document.getElementById('adminBtn');

    const drawer = document.getElementById('drawer');
    const drawerMask = document.getElementById('drawerMask');

    function getCart(){
      try { return JSON.parse(localStorage.getItem('rok_cart') || '[]'); }
      catch { return []; }
    }
    function setCart(items){
      localStorage.setItem('rok_cart', JSON.stringify(items));
      updateCartCount();
    }
    function updateCartCount(){
      const items = getCart();
      const n = items.reduce((s,i)=> s + (i.qty||0), 0);
      cartCount.textContent = n;
    }

    function fmtJMD(cents){
      const v = (cents || 0) / 100;
      return new Intl.NumberFormat('en-JM', { style:'currency', currency:'JMD' }).format(v);
    }

    async function getProfileRole(){
      const { data: { user } } = await sb.auth.getUser();
      if (!user) return { user:null, role:null };
      // best path: profiles table
      const { data: prof } = await sb.from('profiles').select('role,email').eq('id', user.id).maybeSingle();
      return { user, role: prof?.role || null };
    }

    async function updateAuthUI(){
      const { data: { user } } = await sb.auth.getUser();
      if (!user){
        authPill.textContent = 'Guest';
        loginBtn.style.display = 'inline-flex';
        adminBtn.style.display = 'none';
        return;
      }
      loginBtn.style.display = 'none';
      authPill.textContent = (user.email || 'Signed in');

      const roleInfo = await getProfileRole();
      if (roleInfo.role === 'admin'){
        adminBtn.style.display = 'inline-flex';
      } else {
        adminBtn.style.display = 'none';
      }
    }

    loginBtn.addEventListener('click', async ()=>{
      const mode = prompt("Type 1 for email+password login, 2 for Google:");
      if (mode === '2'){
        const { error } = await sb.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.href }
        });
        if (error) alert(error.message);
        return;
      }

      const email = prompt("Email:");
      const pass = prompt("Password:");
      if (!email || !pass) return;

      // Try sign-in; if it fails, offer sign-up
      let res = await sb.auth.signInWithPassword({ email, password: pass });
      if (res.error){
        const yn = confirm("No account found or wrong password. Create account with this email/password?");
        if (!yn) return;

        const signUp = await sb.auth.signUp({ email, password: pass });
        if (signUp.error) return alert(signUp.error.message);

        // ensure profile row (role defaults to user)
        const { data: { user } } = await sb.auth.getUser();
        if (user){
          await sb.from('profiles').upsert({ id: user.id, email: user.email });
        }
        alert("Account created. If email confirmation is enabled, check your inbox.");
      }
    });

    async function loadProducts(){
      grid.innerHTML = '';
      const { data, error } = await sb
        .from('products')
        .select('id,title,description,image_url,price_jmd,active,created_at')
        .eq('active', true)
        .order('created_at', { ascending:false });

      if (error){
        console.error(error);
        grid.innerHTML = `<div class="card"><div class="body"><div class="title">Couldn’t load store.</div><div class="desc">Check your connection and refresh.</div></div></div>`;
        return;
      }

      if (!data?.length){
        grid.innerHTML = `<div class="card"><div class="body"><div class="title">No merch live yet.</div><div class="desc">Admin can add products now. The grid will show them instantly.</div></div></div>`;
        return;
      }

      grid.innerHTML = data.map(p => {
        const img = p.image_url
          ? `<img src="${p.image_url}" alt="${p.title}" loading="lazy">`
          : '';
        const safeDesc = (p.description || '').slice(0, 120);

        return `
          <article class="card" data-id="${p.id}">
            <div class="img">${img}</div>
            <div class="body">
              <div class="title">${p.title}</div>
              <div class="desc">${safeDesc}</div>
              <div class="row">
                <div>
                  <div class="price">${fmtJMD(p.price_jmd)}</div>
                  <div class="small">Ships / pickup options later</div>
                </div>
                <div class="actions">
                  <input class="qty" type="number" min="1" value="1" />
                  <button class="btn btn-primary" data-add>Add</button>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join('');

      grid.addEventListener('click', async (e)=>{
        const add = e.target.closest('[data-add]');
        if (!add) return;

        const card = e.target.closest('[data-id]');
        const id = card?.dataset.id;
        const qty = parseInt(card.querySelector('.qty')?.value || '1', 10);
        if (!id || !qty || qty < 1) return;

        const items = getCart();
        const existing = items.find(x => x.product_id === id);
        if (existing) existing.qty += qty;
        else items.push({ product_id:id, qty });
        setCart(items);

        add.textContent = 'Added';
        setTimeout(()=> add.textContent = 'Add', 900);
      }, { once:true });
    }

    // Admin drawer logic
    function openDrawer(){ drawer.style.display = 'block'; drawerMask.style.display='block'; }
    function closeDrawer(){ drawer.style.display = 'none'; drawerMask.style.display='none'; }
    drawerMask.addEventListener('click', closeDrawer);
    document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
    adminBtn.addEventListener('click', openDrawer);

    function fillForm(p){
      document.getElementById('p_id').value = p?.id || '';
      document.getElementById('p_title').value = p?.title || '';
      document.getElementById('p_desc').value = p?.description || '';
      document.getElementById('p_img').value = p?.image_url || '';
      document.getElementById('p_price').value = p ? (p.price_jmd/100) : '';
      document.getElementById('p_active').checked = p ? !!p.active : true;
    }
    document.getElementById('clearForm').addEventListener('click', ()=> fillForm(null));

    async function loadAdminList(){
      const list = document.getElementById('adminList');
      list.innerHTML = '';

      const { data, error } = await sb.from('products')
        .select('id,title,price_jmd,active,created_at')
        .order('created_at', { ascending:false });

      if (error){
        console.error(error);
        list.innerHTML = `<div class="adminItem"><div class="meta"><b>Couldn’t load admin list</b><span>Check RLS / role</span></div></div>`;
        return;
      }

      list.innerHTML = (data||[]).map(p => `
        <div class="adminItem">
          <div class="meta">
            <b>${p.title}</b>
            <span>${fmtJMD(p.price_jmd)} · ${p.active ? 'ACTIVE' : 'OFF'} · ${new Date(p.created_at).toLocaleDateString()}</span>
            <span style="opacity:.7">${p.id}</span>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost" data-edit="${p.id}">Edit</button>
            <button class="btn btn-ghost" data-del="${p.id}">Delete</button>
          </div>
        </div>
      `).join('');

      list.onclick = async (e)=>{
        const editId = e.target.closest('[data-edit]')?.dataset.edit;
        const delId = e.target.closest('[data-del]')?.dataset.del;

        if (editId){
          const { data: one } = await sb.from('products')
            .select('id,title,description,image_url,price_jmd,active')
            .eq('id', editId).maybeSingle();
          if (one) fillForm(one);
        }

        if (delId){
          const ok = confirm("Delete this product?");
          if (!ok) return;
          const { error } = await sb.from('products').delete().eq('id', delId);
          if (error) return alert(error.message);
          await loadAdminList();
          await loadProducts();
        }
      };
    }

    document.getElementById('saveProduct').addEventListener('click', async ()=>{
      const id = document.getElementById('p_id').value.trim() || null;
      const title = document.getElementById('p_title').value.trim();
      const description = document.getElementById('p_desc').value.trim();
      const image_url = document.getElementById('p_img').value.trim();
      const priceJmd = Math.round((parseFloat(document.getElementById('p_price').value || '0') || 0) * 100);
      const active = document.getElementById('p_active').checked;

      if (!title) return alert("Title is required.");
      if (priceJmd < 0) return alert("Price must be >= 0.");

      const payload = { title, description, image_url, price_jmd: priceJmd, active };

      let res;
      if (id){
        res = await sb.from('products').update(payload).eq('id', id);
      } else {
        res = await sb.from('products').insert(payload);
      }

      if (res.error) return alert(res.error.message);

      fillForm(null);
      await loadAdminList();
      await loadProducts();
      alert("Saved.");
    });

    sb.auth.onAuthStateChange(async ()=>{
      await updateAuthUI();
      const roleInfo = await getProfileRole();
      if (roleInfo.role === 'admin'){
        await loadAdminList();
      }
    });

    // Boot
    (async function(){
      updateCartCount();
      await updateAuthUI();

      const roleInfo = await getProfileRole();
      if (roleInfo.role === 'admin'){
        await loadAdminList();
      }

      await loadProducts();
    })();
  </script>
</body>
</html>
