<style>
:root{
  --bg:#141414; --bg1:#161616; --bg2:#1b1b1b; --fg:#fff; --muted:#bdbdbd;
  --accent:#e50914; --line:rgba(255,255,255,.08); --shadow:0 40px 120px -30px rgba(0,0,0,.6)
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif}
a{color:var(--fg);text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:0 24px}

.nav{position:sticky;top:0;z-index:50;background:rgba(18,18,18,.9);border-bottom:1px solid var(--line);backdrop-filter:saturate(140%) blur(8px)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:48px;height:48px;border-radius:8px}
h1,h2{font-family:"Bebas Neue";letter-spacing:2px;margin:0}
.title small{color:var(--muted)}
.sub{color:var(--muted)}

.nav-auth {
  position: relative;
  display: flex;
  align-items: center;
  gap: 10px;
}

.profile-chip {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--line);
}

.dropdown {
  position: absolute;
  right: 0;
  top: 48px;
  background: var(--bg1);
  border: 1px solid var(--line);
  box-shadow: 0 20px 40px rgba(0,0,0,.45);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  min-width: 180px;
  z-index: 999;
}

.dropdown a,
.dropdown button {
  padding: 12px 16px;
  text-align: left;
  border: none;
  background: transparent;
  color: var(--fg);
  font-size: 15px;
  width: 100%;
  cursor: pointer;
}

.dropdown a:hover,
.dropdown button:hover {
  background: #1f1f1f;
}


.section{padding:56px 0}
.grid{display:grid;gap:24px}
.cols-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:960px){.cols-3{grid-template-columns:1fr}}

.card{background:var(--bg1);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);transition:transform .25s cubic-bezier(.2,.8,.2,1)}
.card:hover{transform:translateY(-6px) scale(1.01)}
.card img{display:block;width:100%;height:auto}
.pad{padding:18px}

.filters{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 18px}
input,select{background:var(--bg2);border:1px solid var(--line);color:#fff;padding:12px;border-radius:12px;outline:none;min-width:160px}
.btn{display:inline-flex;gap:8px;align-items:center;padding:10px 14px;border-radius:14px;border:1px solid var(--line);cursor:pointer;background:transparent;color:var(--fg)}
.btn.primary{background:#fff;color:#000;border-color:#fff}
.btn.ghost{background:transparent}

.browse-head{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.badge{border:1px solid var(--line);background:var(--bg2);padding:6px 10px;border-radius:999px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

.pagination{display:flex;gap:10px;justify-content:center;margin-top:18px}
.pagination .btn[disabled]{opacity:.5;pointer-events:none}

.banner{border:1px dashed rgba(255,255,255,.2);background:rgba(255,255,255,.03);border-radius:16px;padding:14px}
.banner strong{color:#fff}
</style>
</head>
<body>
  <nav class="nav" role="navigation" aria-label="Primary">
    <div class="container nav-inner">
      <a class="brand" href="/" aria-label="ROK Racers JA home">
        <img src="/Assets/logo.png" alt="" class="logo">
        <div class="title"><h1>ROK RACERS JA</h1><small>Garage</small></div>
      </a>
      <div class="row">
        <span id="userBadge" class="sub"></span>
      <div class="nav-auth"></div>
  <button id="signinBtn" class="btn">Sign in</button>
  <div id="profileMenu" class="profile-menu" style="display:none">
    <div id="profileChip" class="profile-chip">
      <span id="profileInitials">U</span>
    </div>

    <div id="dropdown" class="dropdown" style="display:none">
      <a href="/garage.html?view=my">My Garage</a>
      <a href="/tickets.html">My Tickets</a>
      <a href="/likes-builds.html">Liked Builds</a>
      <a href="/likes-sightings.html">Liked Sightings</a>
      <button id="signoutBtn" class="btn" style="width:100%">Sign out</button>
        <a class="btn" href="/events.html">Events</a>
      </div>
    </div>
</div>
  </nav>

  <main class="container">
    <section class="section">
      <div class="browse-head">
        <h2 style="font-size:44px">Garage</h2>

        <div class="row">
          <button id="newBuildBtn" class="btn primary">➕ New Build</button>
          <span id="buildQuota" class="badge sub">0/3 builds used</span>
        </div>
      </div>

      <div id="upgradeBanner" class="banner sub" style="display:none;margin-top:10px">
        <strong>Limit reached:</strong> You’ve used your 3 free builds. Upgrade to Premium to unlock more builds plus parts discounts and mechanic deals.
      </div>

                 <div class="filters" role="region" aria-label="Garage filters">
        <input id="q" placeholder="Search builds…" aria-label="Search builds"/>

        <select id="vis" aria-label="Visibility">
          <option value="public">Public builds</option>
          <option value="my">My builds</option>
          <option value="all">All public (default)</option>
        </select>

        <!-- New: filter by part category -->
        <select id="partFilter" aria-label="Part category">
          <option value="">Any part</option>
          <option value="wheels">Wheels</option>
          <option value="tires">Tires</option>
          <option value="suspension">Suspension</option>
          <option value="brakes">Brakes</option>
          <option value="engine">Engine</option>
          <option value="exhaust">Exhaust</option>
          <option value="drivetrain">Drivetrain</option>
          <option value="braces">Braces / Chassis</option>
          <option value="interior">Interior</option>
          <option value="exterior">Exterior</option>
          <option value="color">Color</option>
          <option value="other">Other</option>
        </select>

        <select id="sort" aria-label="Sort">
          <option value="top">Most liked</option>
          <option value="new">Newest</option>
        </select>

        <button id="apply" class="btn">Apply</button>
      </div>



      <div id="buildsGrid" class="grid cols-3" role="list" aria-live="polite">
        <article class="card" role="listitem"><div class="pad sub">Loading…</div></article>
      </div>

      <div class="pagination">
        <button id="prev" class="btn">← Prev</button>
        <button id="next" class="btn">Next →</button>
      </div>
    </section>
  </main>

<script>
/* ========= Mini auth widget ========= */
async function refreshAuthUI(){
  const { data: { user } } = await supabase.auth.getUser();
  const badge = document.getElementById('userBadge');
  const si = document.getElementById('signinBtn');
  const so = document.getElementById('signoutBtn');
  if(user){
    badge.textContent = user.email;
    si.style.display = 'none'; 
    so.style.display = 'inline-flex';
  }else{
    badge.textContent = '';
    si.style.display = 'inline-flex'; 
    so.style.display = 'none';
  }
  await updateQuota();
}

document.getElementById('signinBtn').onclick = async ()=>{
  const email = prompt("Enter your email to sign in:");
  if(!email) return;
  const { error } = await supabase.auth.signInWithOtp({ 
    email, 
    options:{ emailRedirectTo: location.href } 
  });
  if(error) return alert("Sign-in error: " + error.message);
  alert("Magic link sent! Check your email.");
};

document.getElementById('signoutBtn').onclick = async ()=>{
  await supabase.auth.signOut();
  await refreshAuthUI();
};

supabase.auth.onAuthStateChange(() => {
  refreshAuthUI();
});
refreshAuthUI();

// --- Elements ---
const signinBtn = document.getElementById("signinBtn");
const profileMenu = document.getElementById("profileMenu");
const profileChip = document.getElementById("profileChip");
const dropdown = document.getElementById("dropdown");
const initialsEl = document.getElementById("profileInitials");

// --- Auth UI state ---
async function updateAuthUI() {
  const { data: { user }} = await supabase.auth.getUser();

  if (user) {
    signinBtn.style.display = "none";
    profileMenu.style.display = "flex";

    const initials = user.email?.charAt(0)?.toUpperCase() || "U";
    initialsEl.textContent = initials;
  } else {
    signinBtn.style.display = "inline-flex";
    profileMenu.style.display = "none";
    dropdown.style.display = "none";
  }
}

// Toggle dropdown
profileChip?.addEventListener("click", () => {
  dropdown.style.display = dropdown.style.display === "none" ? "block" : "none";
});
document.addEventListener("click", (e) => {
  if (!profileMenu.contains(e.target)) dropdown.style.display = "none";
});

// Sign in
signinBtn.onclick = async () => {
  const email = prompt("Enter your email:");
  if (!email) return;
  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: location.href }
  });
  if (error) alert(error.message);
  else alert("Magic link sent! Check your inbox.");
};

// Sign out
document.getElementById("signoutBtn")?.addEventListener("click", async () => {
  await supabase.auth.signOut();
  updateAuthUI();
});

// Init
supabase.auth.onAuthStateChange(updateAuthUI);
updateAuthUI();

// --- Access guard ---
window.requireLogin = async function(callback){
  const { data: { user }} = await supabase.auth.getUser();
  if (!user) {
    alert("Please sign in first.");
    signinBtn.click();
    return false;
  }
  if (callback) callback();
  return true;
};



/* ========= Quota (3 free builds) ========= */
async function updateQuota(){
  const { data: { user } } = await supabase.auth.getUser();
  const quota = document.getElementById('buildQuota');
  const banner = document.getElementById('upgradeBanner');
  const btn = document.getElementById('newBuildBtn');

  if(!user){
    quota.textContent = '0/3 builds used';
    banner.style.display = 'none';
    btn.disabled = true; 
    btn.title = 'Sign in to add a build';
    return;
  }

  const { count, error } = await supabase
    .from('builds')
    .select('id', { count: 'exact', head: true })
    .eq('user_id', user.id);

  const used = error ? 0 : (count ?? 0);

  quota.textContent = `${used}/3 builds used`;
  const atLimit = used >= 3;
  banner.style.display = atLimit ? 'block' : 'none';
  btn.disabled = atLimit; 
  btn.title = atLimit ? 'Upgrade to add more builds' : '';
}

/* ========= New Build (redirect to builder) ========= */
document.getElementById('newBuildBtn').onclick = () =>
  requireLogin(async (user) => {
    // re-check quota
    const r = await supabase.from('builds').select('id').eq('user_id', user.id);
    if((r.data?.length || 0) >= 3) return alert('Free limit reached. Upgrade to add more builds.');

    const title = prompt('Build title:');
    if(!title) return;
    const pub = confirm('Make this build public? (OK = public, Cancel = private)');
    const { error } = await supabase.from('builds').insert({
      title, is_public: !!pub, user_id: user.id
    });
    if(error) return alert('Couldn’t create build: ' + error.message);
    alert('Build created!');
    await updateQuota();
    await applyFilters();
  });

  // optional: quick quota check before redirect
  const r = await supabase
    .from('builds')
    .select('id', { count: 'exact', head: true })
    .eq('user_id', user.id);
  const used = r.error ? 0 : (r.count ?? 0);
  if(used >= 3){
    alert('Free limit reached. Upgrade to add more builds.');
    await updateQuota();
    return;
  }
  location.href = '/build-edit.html';


/* ========= Filtering / pagination ========= */
const pageSize = 12; 
let page = 0; 
let currentRows = [];

function renderPage(){
  const grid = document.getElementById('buildsGrid');
  if(!currentRows.length){
    grid.innerHTML = `<article class="card"><div class="pad sub">No builds found.</div></article>`;
    document.getElementById('prev').disabled = true;
    document.getElementById('next').disabled = true;
    return;
  }
  const start = page * pageSize;
  const slice = currentRows.slice(start, start + pageSize);
  grid.innerHTML = slice.map(b => {
    const img = b.thumb_url ? `<img src="${b.thumb_url}" alt="${b.title}" loading="lazy">` : '';
    return `
      <article class="card" role="listitem" data-build="${b.id}">
        <a href="/build.html?id=${b.id}">
          ${img}
          <div class="pad">
            <strong>${b.title}</strong>
            <div class="sub">♥ <span class="likes">${Number(b.like_count||0)}</span></div>
          </div>
        </a>
        <div class="pad" style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn" data-like>${b._liked ? '♥' : '♡'}</button>
        </div>
      </article>`;
  }).join('');
  document.getElementById('prev').disabled = page===0;
  document.getElementById('next').disabled = (start + pageSize) >= currentRows.length;
}

async function applyFilters(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  const vis = document.getElementById('vis').value; // public | my | all (public)
  const sort = document.getElementById('sort').value; // top | new
  const partCat = document.getElementById('partFilter').value; // "" or category
  const { data: { user } } = await supabase.auth.getUser();

  let rows = [];
  if(vis === 'my' && user){
    // My builds: include public + private; join counts + thumb client-side
    const my = await supabase.from('builds')
      .select('id,title,is_public,created_at')
      .eq('user_id', user.id)
      .order('created_at',{ascending:false});
    if(my.error){ console.error(my.error); }
    const ids = (my.data||[]).map(r => r.id);
    let counts = []; let thumbs = [];
    if(ids.length){
      const c = await supabase.from('build_like_counts')
        .select('build_id, like_count')
        .in('build_id', ids);
      const t = await supabase.from('build_primary_image')
        .select('build_id, image_url')
        .in('build_id', ids);
      counts = c.data || []; thumbs = t.data || [];
    }
    const countMap = new Map(counts.map(r => [r.build_id, Number(r.like_count||0)]));
    const thumbMap = new Map(thumbs.map(r => [r.build_id, r.image_url]));
    rows = (my.data||[]).map(b => ({
      id: b.id,
      title: b.title,
      like_count: countMap.get(b.id)||0,
      thumb_url: thumbMap.get(b.id)||null,
      is_public: b.is_public,
      created_at: b.created_at
    }));
  }else{
    // Public listing (view already contains like_count + thumb)
    const pub = await supabase
      .from('public_builds_with_like_count')
      .select('id,title,like_count,thumb_url,is_public,created_at')
      .order('like_count', { ascending: sort!=='top' })
      .order('id', { ascending: true });
    if(pub.error){ console.error(pub.error); }
    rows = pub.data || [];
  }

  // Search filter
  if(q){
    rows = rows.filter(r => (r.title||'').toLowerCase().includes(q));
  }

  // NEW: filter by part category (builds that have at least one part in that category)
  if(partCat){
    const ids = rows.map(r => r.id);
    if(ids.length){
      const { data: partsData, error: partsError } = await supabase
        .from('build_parts')
        .select('build_id')
        .in('build_id', ids)
        .eq('category', partCat);
      if(!partsError){
        const allowed = new Set((partsData||[]).map(p => p.build_id));
        rows = rows.filter(r => allowed.has(r.id));
      }else{
        console.error(partsError);
      }
    }else{
      rows = [];
    }
  }

  // Sort (if 'new', sort by created_at desc when available; if not, leave as-is)
  if(sort === 'new'){
    rows.sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0));
  }else if(sort === 'top'){
    rows.sort((a,b) => Number(b.like_count||0) - Number(a.like_count||0));
  }

  // Mark liked hearts
  const uid = user?.id || null;
  if(uid && rows.length){
    const ids = rows.map(r=>r.id);
    const liked = await supabase.from('build_likes')
      .select('build_id')
      .in('build_id', ids)
      .eq('user_id', uid);
    const likedSet = new Set((liked.data||[]).map(r=>r.build_id));
    rows.forEach(r => { r._liked = likedSet.has(r.id); });
  }

  currentRows = rows;
  page = 0;
  renderPage();
} 

// Like/unlike (delegated)
document.getElementById('buildsGrid').addEventListener('click', async (e)=>{
  const btn = e.target.closest('button[data-like]');
  if(!btn) return;
  const card = e.target.closest('article.card');
  const id = card?.dataset.build;
  const likesEl = card.querySelector('.likes');

  const ok = await requireLogin();
  if (!ok) return;
  const { data: { user } } = await supabase.auth.getUser();
  if(!user){ return alert('Sign in to like builds.'); }




  const existing = await supabase
    .from('build_likes')
    .select('build_id')
    .eq('build_id', id)
    .eq('user_id', user.id)
    .maybeSingle();

  if(existing.data){
    const del = await supabase
      .from('build_likes')
      .delete()
      .eq('build_id', id)
      .eq('user_id', user.id);
    if(del.error) return alert('Unlike failed: ' + del.error.message);
    btn.textContent = '♡';
    likesEl.textContent = Math.max(0, (parseInt(likesEl.textContent)||0) - 1);
  }else{
    const ins = await supabase
      .from('build_likes')
      .insert({ build_id: id, user_id: user.id });
    if(ins.error) return alert('Like failed: ' + ins.error.message);
    btn.textContent = '♥';
    likesEl.textContent = (parseInt(likesEl.textContent)||0) + 1;
  }
});

// Live likes channel
let likesChannel;
function setupLiveLikes(){
  likesChannel?.unsubscribe();
  likesChannel = supabase.channel('build-likes-live-garage')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'build_likes' }, (p)=>{
      const card = document.querySelector(`article.card[data-build="${p.new.build_id}"]`);
      if(!card) return;
      const el = card.querySelector('.likes');
      el.textContent = (parseInt(el.textContent)||0) + 1;
    })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'build_likes' }, (p)=>{
      const card = document.querySelector(`article.card[data-build="${p.old.build_id}"]`);
      if(!card) return;
      const el = card.querySelector('.likes');
      el.textContent = Math.max(0, (parseInt(el.textContent)||0) - 1);
    })
    .subscribe();
}

/* ========= Boot ========= */
function initDefaultViewFromQuery(){
  const params = new URLSearchParams(location.search);
  const view = params.get('view');
  if(view === 'my'){
    const visSel = document.getElementById('vis');
    if(visSel) visSel.value = 'my';
  }
}

document.getElementById('apply').addEventListener('click', applyFilters);
document.getElementById('prev').addEventListener('click', ()=>{ if(page>0){ page--; renderPage(); }});
document.getElementById('next').addEventListener('click', ()=>{ page++; renderPage(); });



window.addEventListener('DOMContentLoaded', async ()=>{
  await refreshAuthUI();
  setupLiveLikes();
  await applyFilters();
});
</script>
</body>
