<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Register Team — ROK Racers JA</title>
<link rel="icon" href="/Assets/og.png"/>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://dtgnvzjtojdqmujzokgh.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_KEY";
window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>
<script src="/auth-ui.js"></script>

<style>
body{margin:0;background:#141414;color:#fff;font-family:Rajdhani}
.container{max-width:720px;margin:40px auto;padding:0 24px}
h1{font-family:Bebas Neue;font-size:48px}
label{display:block;margin-top:16px}
input,textarea,select{
  width:100%;padding:12px;border-radius:12px;
  background:#1b1b1b;border:1px solid rgba(255,255,255,.1);color:#fff
}
button{
  margin-top:24px;padding:12px 18px;
  border-radius:14px;border:none;background:#fff;color:#000;
  font-weight:600;cursor:pointer
}
.sub{color:#bdbdbd;font-size:14px}
</style>
</head>

<body>
<div class="container">
  <h1>Register Team</h1>
  <p class="sub">Create a motorsport team, crew, or promoter profile.</p>

  <label>Team name
    <input id="name" required>
  </label>

  <label>Parish
    <select id="parish">
      <option value="">Select parish</option>
      <option>Kingston</option>
      <option>St. Andrew</option>
      <option>St. Catherine</option>
      <option>St. James</option>
    </select>
  </label>

  <label>Instagram handle (no @)
    <input id="instagram">
  </label>

  <label>Logo URL
    <input id="logo">
  </label>

  <label>Team bio
    <textarea id="bio" rows="5"></textarea>
  </label>

  <label>
    <input type="checkbox" id="is_promoter"> This team promotes events
  </label>

  <button id="submit">Create team</button>
</div>

<script>
document.getElementById('submit').onclick = async () => {
  await authUI.requireLogin();

  const { data:{user} } = await supabase.auth.getUser();
  if(!user) return;

  const team = {
    name: name.value.trim(),
    parish: parish.value,
    instagram_handle: instagram.value.trim() || null,
    logo_url: logo.value.trim() || null,
    bio: bio.value.trim() || null,
    is_promoter: is_promoter.checked,
    owner_id: user.id
  };

  const { data, error } = await supabase.from('teams').insert(team).select().single();
  if(error){ alert(error.message); return; }

  await supabase.from('team_members').insert({
    team_id: data.id,
    user_id: user.id,
    role: 'owner'
  });

  location.href = `/team.html?id=${data.id}`;
};
</script>
</body>
</html>
