<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Liked Builds — ROK Racers JA</title>
  <meta name="description" content="All the builds you’ve boosted in the ROK Racers JA garage." />
  <link rel="icon" href="/Assets/og.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://dtgnvzjtojdqmujzokgh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0Z252emp0b2pkcW11anpva2doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyMTkwMDAsImV4cCI6MjA3Nzc5NTAwMH0.r8LBQ14sxABB0mIw0exPlmv19W1fx0-iKLyefPhh8d8";
    window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>

  <script src="/auth-ui.js"></script>

  <style>
    :root{
      --bg:#141414; --bg1:#161616; --bg2:#1b1b1b;
      --fg:#fff; --muted:#bdbdbd;
      --accent:#e50914; --line:rgba(255,255,255,.08);
      --shadow:0 40px 120px -30px rgba(0,0,0,.6);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--fg);font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif}
    a{color:var(--fg);text-decoration:none}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    .sub{color:var(--muted)}
    h1,h2{font-family:"Bebas Neue";letter-spacing:2px;margin:0}

    /* NAV */
    .nav{
      position:sticky;top:0;z-index:50;
      background:rgba(18,18,18,.9);
      border-bottom:1px solid var(--line);
      backdrop-filter:saturate(140%) blur(8px);
    }
    .nav-inner{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 0;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .logo-img{width:48px;height:48px;border-radius:8px;object-fit:contain}
    .title small{color:var(--muted)}
    .menu{display:flex;gap:10px;align-items:center}
    .btn{
      display:inline-flex;gap:8px;align-items:center;
      padding:10px 14px;border-radius:14px;
      border:1px solid var(--line);cursor:pointer;
      background:transparent;color:var(--fg);
      font-family:inherit;font-size:15px;
    }
    .btn.primary{background:#fff;color:#000;border-color:#fff}
    .btn.small{padding:6px 10px;font-size:14px}
    .btn[disabled]{opacity:.5;pointer-events:none}

    .section{padding:48px 0}

    .grid{display:grid;gap:24px}
    .cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    @media(max-width:960px){.cols-3{grid-template-columns:1fr}}

    .card{
      background:var(--bg1);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:transform .25s cubic-bezier(.2,.8,.2,1);
    }
    .card:hover{transform:translateY(-6px) scale(1.01)}
    .card img{display:block;width:100%;height:auto}
    .pad{padding:18px}

    .badge{
      border:1px solid var(--line);
      background:var(--bg2);
      padding:6px 10px;
      border-radius:999px;
      font-size:13px;
    }
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    .filters{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 18px}
    input,select{
      background:var(--bg2);
      border:1px solid var(--line);
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      font:inherit;
      min-width:160px;
      outline:none;
    }

    .nav-auth{display:flex;align-items:center;gap:10px}
    .profile-menu{position:relative;display:flex;align-items:center}
    .profile-chip{
      width:40px;height:40px;border-radius:50%;
      background:var(--bg2);
      display:flex;align-items:center;justify-content:center;
      font-weight:600;cursor:pointer;border:1px solid var(--line);
    }
    .profile-chip span{font-size:16px}
    .dropdown{
      position:absolute;right:0;top:48px;
      background:var(--bg1);border:1px solid var(--line);
      box-shadow:0 20px 40px rgba(0,0,0,.45);
      border-radius:14px;display:flex;flex-direction:column;
      min-width:190px;z-index:999;
    }
    .dropdown a,.dropdown button{
      padding:10px 16px;text-align:left;border:none;
      background:transparent;color:var(--fg);font-size:15px;
      width:100%;cursor:pointer;font-family:inherit;
    }
    .dropdown a:hover,.dropdown button:hover{background:#1f1f1f}
  </style>
</head>
<body>
  <!-- NAV -->
  <nav class="nav" role="navigation" aria-label="Primary">
    <div class="container nav-inner">
      <a class="brand" href="/" aria-label="ROK Racers JA home">
        <img src="/Assets/logo.png" alt="" class="logo-img" />
        <div class="title">
          <h1>ROK RACERS JA</h1>
          <small>Liked builds</small>
        </div>
      </a>

      <div style="display:flex;align-items:center;gap:12px">
        <div class="menu" role="menubar" aria-label="Main menu">
          <a class="btn" role="menuitem" href="/events.html">Events</a>
          <a class="btn" role="menuitem" href="/garage.html">Garage</a>
          <a class="btn" role="menuitem" href="/sightings.html">Sightings</a>
        </div>

        <div class="nav-auth">
          <button id="navSignInBtn" class="btn">Sign in</button>
          <div id="navProfileWrap" class="profile-menu" style="display:none">
            <div id="navProfileChip" class="profile-chip" aria-haspopup="true" aria-expanded="false">
              <span id="navProfileInitials">U</span>
            </div>
            <div id="navProfileDropdown" class="dropdown" style="display:none">
              <a href="/garage.html">My Garage</a>
              <a href="/tickets.html">My Tickets</a>
              <a href="/likes-builds.html">Liked Builds</a>
              <a href="/likes-sightings.html">Liked Sightings</a>
              <a href="/teams.html">My Teams</a>
              <a href="/activity.html">Activity</a>
              <button id="navSignOutBtn" type="button">Sign out</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="section">
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <h2 style="font-size:44px">Boosted builds</h2>
          <p class="sub" id="pageSub">The builds you’ve tapped ♥ on across the grid.</p>
        </div>
        <span id="countBadge" class="badge sub">0 builds</span>
      </div>

      <div class="filters" aria-label="Liked builds filters">
        <input id="q" type="text" placeholder="Search by title or car…" />
        <select id="sort">
          <option value="top">Most liked</option>
          <option value="new">Newest first</option>
        </select>
        <button id="applyBtn" class="btn">Apply</button>
      </div>

      <div id="msg" class="sub" style="margin-bottom:8px"></div>

      <div id="grid" class="grid cols-3" role="list" aria-live="polite">
        <article class="card" role="listitem"><div class="pad sub">Loading…</div></article>
      </div>
    </section>
  </main>

<script>
  const $ = (id)=>document.getElementById(id);
  let allRows = [];
  let currentUser = null;

  function renderCard(b){
    const carLabel = [b.year, b.make, b.model].filter(Boolean).join(' ');
    const type = b.build_type || 'owned';
    const typeLabel = {
      owned: 'Owned',
      dream: 'Dream',
      for_sale: 'For sale'
    }[type] || 'Build';

    const stageLabel = b.stage ? ({
      stock: 'Stock/OEM+',
      stage_1: 'Stage 1',
      stage_2: 'Stage 2',
      track: 'Track/Drift',
      other: 'Custom'
    }[b.stage] || b.stage) : null;

    const power = b.power_goal ? `${b.power_goal} hp` : null;
    const visibility = b.is_public ? 'Public' : 'Private';
    const img = b.thumb_url || b.custom_image_url || b.primary_image || '/Assets/garage-placeholder.jpg';
    const likes = Number(b.like_count || 0);

    return `
      <article class="card" role="listitem" data-build="${b.id}">
        <a href="/build.html?id=${b.id}" style="display:block">
          <img src="${img}" alt="${b.title || 'Build'}" loading="lazy">
        </a>
        <div class="pad">
          <strong>${b.title || 'Untitled build'}</strong>
          ${carLabel ? `<div class="sub">${carLabel}</div>` : ''}

          <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">
            <span class="badge">${typeLabel}</span>
            ${stageLabel ? `<span class="badge">${stageLabel}</span>` : ''}
            ${power ? `<span class="badge">${power}</span>` : ''}
            <span class="badge" style="border-color:${b.is_public ? 'var(--accent)' : 'var(--line)'}">
              ${visibility}
            </span>
          </div>

          <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;gap:8px">
            <span class="sub">♥ <span class="likes">${likes}</span></span>
            <button class="btn small" data-unlike
              aria-label="Remove boost from this build"
              title="Remove boost from this build">
              ♥ Remove
            </button>
          </div>
        </div>
      </article>
    `;
  }

  function renderGrid(rows){
    const grid = $('grid');
    if(!rows.length){
      grid.innerHTML = `
        <article class="card">
          <div class="pad sub">
            No boosted builds yet. Head to the <a href="/garage.html" style="text-decoration:underline;color:#fff">garage</a>
            and tap ♥ on the ones you rate.
          </div>
        </article>`;
      $('countBadge').textContent = '0 builds';
      return;
    }

    grid.innerHTML = rows.map(renderCard).join('');
    $('countBadge').textContent = `${rows.length} build${rows.length === 1 ? '' : 's'}`;
  }

  function applyFiltersLocal(){
    const q = $('q').value.trim().toLowerCase();
    const sort = $('sort').value;

    let rows = [...allRows];

    if(q){
      rows = rows.filter(b =>
        (b.title || '').toLowerCase().includes(q) ||
        [b.year, b.make, b.model].filter(Boolean).join(' ').toLowerCase().includes(q)
      );
    }

    if(sort === 'new'){
      rows.sort((a,b)=> new Date(b.created_at||0) - new Date(a.created_at||0));
    }else{
      rows.sort((a,b)=> Number(b.like_count||0) - Number(a.like_count||0));
    }

    renderGrid(rows);
  }

  async function loadLikedBuilds(){
    $('msg').textContent = '';
    $('grid').innerHTML = `<article class="card"><div class="pad sub">Loading…</div></article>`;

    const { data: { user } } = await supabase.auth.getUser();
    currentUser = user || null;

    if(!user){
      $('msg').textContent = 'Sign in to see the builds you’ve boosted.';
      renderGrid([]);
      return;
    }

    // 1) Get liked build IDs
    const { data: likes, error: likeErr } = await supabase
      .from('build_likes')
      .select('build_id')
      .eq('user_id', user.id);

    if(likeErr){
      console.error(likeErr);
      $('msg').textContent = 'We couldn’t load your likes. Try again in a few seconds.';
      renderGrid([]);
      return;
    }

    const ids = (likes || []).map(l => l.build_id);
    if(!ids.length){
      renderGrid([]);
      return;
    }

    // 2) Get builds (RLS will only return public/owned)
    const { data: builds, error: buildErr } = await supabase
      .from('builds')
      .select('id,title,year,make,model,build_type,stage,power_goal,is_public,created_at,custom_image_url,thumb_url,color_hex')
      .in('id', ids);

    if(buildErr){
      console.error(buildErr);
      $('msg').textContent = 'We couldn’t load some builds. Try again shortly.';
      renderGrid([]);
      return;
    }

    if(!builds || !builds.length){
      // All liked builds might be private and not visible anymore
      renderGrid([]);
      return;
    }

    const buildIds = builds.map(b => b.id);

    // 3) Like counts
    const { data: counts, error: countErr } = await supabase
      .from('build_like_counts')
      .select('build_id, like_count')
      .in('build_id', buildIds);

    if(countErr) console.error(countErr);
    const countMap = new Map((counts || []).map(r => [r.build_id, Number(r.like_count||0)]));

    // 4) Primary images
    const { data: thumbs, error: thumbErr } = await supabase
      .from('build_primary_image')
      .select('build_id, image_url')
      .in('build_id', buildIds);

    if(thumbErr) console.error(thumbErr);
    const thumbMap = new Map((thumbs || []).map(r => [r.build_id, r.image_url]));

    allRows = builds.map(b => ({
      ...b,
      like_count: countMap.get(b.id) ?? 0,
      primary_image: thumbMap.get(b.id) || null
    }));

    applyFiltersLocal();
  }

  // Unlike handler (remove boost + card)
  $('grid').addEventListener('click', async (e)=>{
    const btn = e.target.closest('button[data-unlike]');
    if(!btn) return;
    const card = e.target.closest('article.card');
    const id = card?.dataset.build;
    if(!id) return;

    const { data: { user } } = await supabase.auth.getUser();
    if(!user){
      alert('Sign in to manage your boosted builds.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Removing…';

    const { error } = await supabase
      .from('build_likes')
      .delete()
      .eq('build_id', id)
      .eq('user_id', user.id);

    if(error){
      console.error(error);
      alert('Couldn’t remove like. Try again.');
      btn.disabled = false;
      btn.textContent = '♥ Remove';
      return;
    }

    // Remove from local list + DOM
    allRows = allRows.filter(b => String(b.id) !== String(id));
    card.remove();
    applyFiltersLocal();
  });

  $('applyBtn').addEventListener('click', applyFiltersLocal);

  window.addEventListener('DOMContentLoaded', async ()=>{
    await loadLikedBuilds();
    supabase.auth.onAuthStateChange(loadLikedBuilds);
  });
</script>
</body>
</html>
