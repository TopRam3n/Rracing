<style>
  :root{
    --bg:#050508;
    --bg1:#141414;
    --bg2:#1b1b1b;
    --fg:#fff;
    --muted:#bdbdbd;
    --accent:#e50914;
    --accent-yellow:#FFD93B;
    --line:rgba(255,255,255,.08);
    --shadow:0 40px 120px -30px rgba(0,0,0,.7);
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    background:radial-gradient(circle at top, #161623 0, #050508 55%, #000 100%);
    color:var(--fg);
    font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif;
  }
  a{color:var(--fg);text-decoration:none}
  .container{max-width:1200px;margin:0 auto;padding:0 24px}

  /* NAV */
  .nav{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(5,5,8,.9);
    border-bottom:1px solid var(--line);
    backdrop-filter:saturate(140%) blur(12px);
  }
  .nav-inner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 0;
    gap:16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .logo{
    width:48px;
    height:48px;
    border-radius:12px;
    object-fit:cover;
  }
  h1,h2{
    font-family:"Bebas Neue",system-ui,sans-serif;
    letter-spacing:2px;
    margin:0;
  }
  .title small{
    color:var(--muted);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.16em;
  }

  .nav-auth{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .btn{
    display:inline-flex;
    gap:8px;
    align-items:center;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    cursor:pointer;
    font-size:13px;
    background:transparent;
    color:var(--fg);
    transition:transform .18s ease-out, box-shadow .18s ease-out, background .18s ease-out, border-color .18s ease-out;
  }
  .btn.primary{
    background:radial-gradient(circle at top left,#ff4d4d,var(--accent));
    color:#fff;
    border-color:rgba(229,9,20,.9);
    box-shadow:0 0 18px rgba(229,9,20,.5);
  }
  .btn.primary:hover{
    box-shadow:0 0 26px rgba(229,9,20,.7);
    transform:translateY(-1px);
  }
  .btn:hover{
    background:rgba(255,255,255,0.03);
  }

  /* Profile menu */
  .profile-menu{
    position:relative;
    display:flex;
    align-items:center;
  }
  .profile-chip{
    width:32px;
    height:32px;
    border-radius:50%;
    background:var(--bg2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
    cursor:pointer;
    border:1px solid var(--line);
    font-size:13px;
    transition:box-shadow .18s ease-out, border-color .18s ease-out, transform .18s ease-out;
  }
  .profile-chip:hover{
    border-color:rgba(255,255,255,.32);
    box-shadow:0 0 16px rgba(255,217,59,.6);
    transform:translateY(-1px);
  }
  .dropdown{
    position:absolute;
    right:0;
    top:40px;
    background:#121212;
    border:1px solid var(--line);
    box-shadow:0 20px 40px rgba(0,0,0,.6);
    border-radius:16px;
    display:flex;
    flex-direction:column;
    min-width:190px;
    z-index:60;
  }
  .dropdown a,
  .dropdown button{
    padding:10px 16px;
    text-align:left;
    border:none;
    background:transparent;
    color:var(--fg);
    font-size:13px;
    width:100%;
    cursor:pointer;
  }
  .dropdown a:hover,
  .dropdown button:hover{
    background:#1f1f1f;
  }

  .section{padding:40px 0 56px}
  .grid{display:grid;gap:24px}
  .cols-3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:960px){.cols-3{grid-template-columns:1fr}}

  .card{
    background:var(--bg1);
    border:1px solid var(--line);
    border-radius:20px;
    overflow:hidden;
    box-shadow:var(--shadow);
    transition:transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s, border-color .25s;

    transform:translateY(-6px) scale(1.01);
    box-shadow:0 30px 80px rgba(0,0,0,.85);
    border-color:rgba(255,217,59,0.5);

  .card img{display:block;width:100%;height:auto}

  .sub{color:var(--muted)}

    background:var(--bg2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 12px;
    min-width:64px;

    font-size:20px;
    line-height:1;
  }
  .date .d{
    font-family:"Bebas Neue";
    font-size:24px;
    line-height:1;
  }

  .filters{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin:14px 0 18px;
  }
  input,select{
    background:var(--bg2);
    border:1px solid var(--line);
    color:#fff;
    padding:10px 12px;
    border-radius:12px;
    outline:none;
    font-size:14px;
  }
  input:focus-visible,
  select:focus-visible{
    border-color:var(--accent-yellow);
    box-shadow:0 0 0 1px rgba(255,217,59,0.5);
  }

  .chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--bg2);
    border:1px solid var(--line);
    border-radius:999px;
    padding:6px 10px;
    font-size:12px;
  }

  .chip-status{
    border-color:rgba(255,217,59,0.7);
    color:var(--accent-yellow);
  }
  .chip-past{
    border-color:rgba(255,255,255,0.18);
    color:var(--muted);
    background:rgba(255,255,255,0.03);
  }

  .pagination{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:18px;
  }
  .pagination .btn[disabled]{
    opacity:.5;
    pointer-events:none;
  }

  /* Modal */
  .modal-backdrop{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:80;
  }
  .modal{
    width:min(720px,92vw);
    background:#121212;
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:var(--shadow);
  }
  .modal header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 18px;
    border-bottom:1px solid var(--line);
  }
  .modal h3{
    font-family:"Bebas Neue";
    font-size:28px;
    margin:0;
    letter-spacing:2px;
  }
  .modal .content{
    padding:18px;
    display:grid;
    gap:12px;
  }
  .row{display:grid;gap:10px}
  .modal .actions{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    padding:16px 18px;
    border-top:1px solid var(--line);
  }
  .two{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  @media(max-width:720px){.two{grid-template-columns:1fr}}
  .help{font-size:12px;color:var(--muted)}
  textarea{
    resize:vertical;
    background:var(--bg2);
    border:1px solid var(--line);
    color:#fff;
    padding:12px;
    border-radius:12px;
    font-family:inherit;

  }

  @media(max-width:600px){

      flex-wrap:wrap;
      align-items:flex-start;
    }
    .nav-auth{
      width:100%;
      justify-content:flex-end;
    }
  }
</style>

  <script>
    /* ========= Helpers ========= */

    const pageSize = 9;
    let page      = 0;
    let cached    = [];
    let filtered  = [];

    let teamsIndex = new Map();          // team_id -> {id,name,is_promoter}
    let promoterTeamIds = new Set();     // team_ids where is_promoter true

    function escapeHTML(s){
      return (s || "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function withinMonth(dateStr, monthIndex){
      if (monthIndex === "" || monthIndex == null) return true;
      const d = new Date(dateStr);
      return d.getMonth() === Number(monthIndex);
    }

    function isUpcoming(dateStr){
      const now = new Date();
      const d   = new Date(dateStr);
      return d >= now;
    }

    function renderEventListCard(e){
      const d   = e.starts_at ? new Date(e.starts_at) : null;
      const m   = d ? d.toLocaleString("en-US",{ month:"short" }).toUpperCase() : "--";
      const day = d ? String(d.getDate()).padStart(2,"0") : "--";
      const when = d
        ? d.toLocaleString("en-US",{ weekday:"short", hour:"numeric", minute:"2-digit" })
        : "";
      const hostTeam = e.teams?.id
        ? `<div class="sub">Host team: <a href="/team.html?id=${e.teams.id}" style="text-decoration:underline">${e.teams.name || 'View team'}</a></div>`
        : '';


      const parish = e.parish || "";
      const locLabel = [parish, e.location].filter(Boolean).join(" · ");
      const loc  = when
        ? (locLabel ? `${when} • ${locLabel}` : when)
        : locLabel;

      const counts = e.counts || { yes_count:0, maybe_count:0, no_count:0 };
      const past = e.starts_at && !isUpcoming(e.starts_at);
      const statusText = e.status || (past ? "Completed" : "RSVP Open");
      const tagText = e.tag || "Event";

      const host = e.team_id ? teamsIndex.get(e.team_id) : null;
      const hostLine = host
        ? `<div class="sub" style="margin-top:4px">Host: <a href="/team.html?id=${encodeURIComponent(host.id)}" style="text-decoration:underline">${escapeHTML(host.name)}</a></div>`
        : "";

      return `
        <article class="card" role="listitem">
          ${e.cover_url ? `<img src="${escapeHTML(e.cover_url)}" alt="${escapeHTML(e.title)}" loading="lazy">` : ""}
          <div class="pad">
            <div style="display:flex;gap:12px;align-items:center;margin-bottom:6px">
              <div class="date">
                <div class="m">${m}</div>
                <div class="d">${day}</div>
              </div>
              <div>
                <strong>${escapeHTML(e.title)}</strong>
                ${loc ? `<div class="sub">${escapeHTML(loc)}</div>` : ""}
                ${hostLine}
              </div>
            </div>

            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;">
              <span class="chip chip-status">${escapeHTML(tagText)}</span>
              <span class="chip ${past ? 'chip-past' : 'chip-status'}">${escapeHTML(statusText)}</span>
              ${host?.is_promoter ? `<span class="chip chip-status">Promoter</span>` : ``}
            </div>

            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <span class="chip">✅ ${counts.yes_count}</span>
              <span class="chip">🤔 ${counts.maybe_count}</span>
              <span class="chip">❌ ${counts.no_count}</span>
              <a class="btn" href="/event.html?id=${encodeURIComponent(e.id)}" style="margin-left:auto">
                Details / Tickets
              </a>
            </div>
          </div>
        </article>`;
    }

    function renderCurrentPage(){
      const listEl = document.getElementById('eventsList');
      const prevEl = document.getElementById('prev');
      const nextEl = document.getElementById('next');

      if (!filtered.length){
        listEl.innerHTML =
          `<article class="card"><div class="pad sub">
            No events match these filters yet. Try clearing search or switching to “All”.
          </div></article>`;
        if (prevEl) prevEl.disabled = true;
        if (nextEl) nextEl.disabled = true;
        return;
      }

      const start = page * pageSize;
      const slice = filtered.slice(start, start + pageSize);

      listEl.innerHTML = slice.map(renderEventListCard).join('');

      if (prevEl) prevEl.disabled = (page === 0);
      if (nextEl) nextEl.disabled = (start + pageSize) >= filtered.length;
    }

    function applyFilters(){
      const q     = document.getElementById('q').value.trim().toLowerCase();
      const month = document.getElementById('month').value;
      const when  = document.getElementById('when').value;
      const host  = document.getElementById('host').value; // "" | "promoters" | "team:<id>"
      const hostFilter = document.getElementById('hostFilter').value;
      const hostTeamId = document.getElementById('hostTeam').value;

        if (hostFilter === 'promoters'){
          rows = rows.filter(isPromoterEvent);
        } else if (hostFilter === 'team'){
          if (hostTeamId){
            rows = rows.filter(r => r.team_id === hostTeamId);
          } else {
            rows = []; // user picked "Specific team" but didn't choose a team yet
          }
        }

      let rows = cached.slice(0);

      // When: upcoming / past / all
      if (when === 'upcoming'){
        rows = rows.filter(r => r.starts_at && isUpcoming(r.starts_at));
      } else if (when === 'past'){
        rows = rows.filter(r => r.starts_at && !isUpcoming(r.starts_at));
      }

      // Month filter
      if (month !== ""){
        rows = rows.filter(r => r.starts_at && withinMonth(r.starts_at, month));
      }

      // Host filter
      if (host === 'promoters'){
        rows = rows.filter(r => r.team_id && promoterTeamIds.has(r.team_id));
      } else if (host && host.startsWith('team:')){
        const teamId = host.slice('team:'.length);
        rows = rows.filter(r => (r.team_id || '') === teamId);
      }

      // Search (title + location + parish + host name)
      if (q){
        rows = rows.filter(r => {
          const hostName = r.team_id ? (teamsIndex.get(r.team_id)?.name || '') : '';
          return (`${r.title||""} ${r.location||""} ${r.parish||""} ${hostName}`.toLowerCase().includes(q));
        });
      }

      filtered = rows;
      page = 0;
      renderCurrentPage();
    }

    async function loadHostTeamsForFilter(){
  const sel = document.getElementById('hostTeam');
  if(!sel) return;

  sel.innerHTML = `<option value="">Select a team…</option>`;

  const { data, error } = await supabase
    .from('teams')
    .select('id,name')
    .order('name', { ascending:true });

  if(error){
    console.error('loadHostTeamsForFilter', error);
    return;
  }

  (data||[]).forEach(t=>{
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name || 'Team';
    sel.appendChild(opt);
  });
}


    async function fetchTeamsForFilters(){
      const hostSel = document.getElementById('host');
      if(!hostSel) return;

      // keep first two options (Any host + Promoters only), then rebuild team options
      hostSel.innerHTML = `
        <option value="">Any host</option>
        <option value="promoters">Promoters only</option>
      `;

      const { data, error } = await supabase
        .from('teams')
        .select('id,name,is_promoter')
        .order('name', { ascending:true });

      if(error){
        console.error('fetchTeamsForFilters error', error);
        return;
      }

      teamsIndex = new Map((data || []).map(t => [t.id, t]));
      promoterTeamIds = new Set((data || []).filter(t => t.is_promoter).map(t => t.id));

      (data || []).forEach(t => {
        const opt = document.createElement('option');
        opt.value = `team:${t.id}`;
        opt.textContent = t.is_promoter ? `${t.name} (Promoter)` : t.name;
        hostSel.appendChild(opt);
      });
    }
    function isPromoterEvent(e){
      // treat as promoter-hosted if the host team exists and is_promoter = true
      return !!(e.teams && e.teams.is_promoter);
    }

    async function fetchAll(){
      const list = document.getElementById('eventsList');
      list.innerHTML =
        `<article class="card"><div class="pad sub">Loading events…</div></article>`;

      // ensure teams are available for host link + filters before rendering
      await fetchTeamsForFilters();

      const [eventsRes, countsRes] = await Promise.all([
        supabase
          .from('events')
          .select('id,title,starts_at,location,cover_url,tag,status,parish,promoter_handle,team_id,teams:team_id(id,name,is_promoter,logo_url)')
          .order('starts_at',{ ascending:true, nullsLast:true }),
        supabase
          .from('event_rsvp_counts')
          .select('event_id,yes_count,maybe_count,no_count')
      ]);

      if (eventsRes.error){
        console.error(eventsRes.error);
        list.innerHTML =
          `<article class="card"><div class="pad sub">
             Couldn’t load events right now. Refresh the page in a bit.
           </div></article>`;
        return [];
      }

      const countsMap = new Map((countsRes.data || []).map(c => [c.event_id, c]));

      return (eventsRes.data || []).map(e => ({
        ...e,
        counts: countsMap.get(e.id) || { yes_count:0, maybe_count:0, no_count:0 }
      }));
    }
    
document.getElementById('hostFilter').addEventListener('change', async ()=>{
  const mode = document.getElementById('hostFilter').value;
  const teamSel = document.getElementById('hostTeam');

  if(mode === 'team'){
    teamSel.style.display = 'inline-block';
    if(teamSel.options.length <= 1){
      await loadHostTeamsForFilter();
    }
  } else {
    teamSel.style.display = 'none';
    teamSel.value = '';
  }
  applyFilters();
});

document.getElementById('hostTeam').addEventListener('change', applyFilters);

    document.getElementById('apply').addEventListener('click', applyFilters);

    document.getElementById('prev').addEventListener('click', () => {
      if (page > 0){
        page--;
        renderCurrentPage();
      }
    });

    document.getElementById('next').addEventListener('click', () => {
      if ((page + 1) * pageSize < filtered.length){
        page++;
        renderCurrentPage();
      }
    });

    window.addEventListener('DOMContentLoaded', async () => {
      await loadHostTeamsForFilter(); // optional: prefill, or only when needed
      cached = await fetchAll();
      filtered = cached.slice(0);
      page = 0;
      renderCurrentPage();
    });


    /* ========= Create Event Modal ========= */

    const backdrop    = document.getElementById('modalBackdrop');
    const addEventBtn = document.getElementById('addEventBtn');

    const openModal = () => {
      backdrop.style.display = 'flex';
      backdrop.setAttribute('aria-hidden','false');
    };

    const closeModal = () => {
      backdrop.style.display = 'none';
      backdrop.setAttribute('aria-hidden','true');
    };

    if (addEventBtn){
      addEventBtn.addEventListener('click', async () => {
        if (window.authUI && typeof authUI.requireLogin === 'function'){
          authUI.requireLogin(async () => {
            await loadMyTeamOptions();
            openModal();
          });
          return;
        }

        const { data: { user } } = await supabase.auth.getUser();
        if (!user){
          alert("Sign in to create an event.");
          return;
        }
        await loadMyTeamOptions();
        openModal();
      });
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) closeModal();
    });

    function toISO(localDT){
      if (!localDT) return null;
      const [date, time] = localDT.split('T');
      return new Date(`${date}T${time}:00`).toISOString();
    }

    document.getElementById('modalCreate').addEventListener('click', async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user){
        alert("Sign in to create an event.");
        return;
      }

      const title       = document.getElementById('f_title').value.trim();
      const startsRaw   = document.getElementById('f_starts').value;
      const endsRaw     = document.getElementById('f_ends').value;
      const locationTxt = document.getElementById('f_location').value.trim() || null;
      const parishTxt   = document.getElementById('f_parish').value.trim() || null;
      const tag         = document.getElementById('f_tag').value.trim() || null;
      const status      = document.getElementById('f_status').value.trim() || null;
      const cover       = document.getElementById('f_cover').value.trim() || null;
      const desc        = document.getElementById('f_desc').value.trim()  || null;

      if (!title || !startsRaw){
        alert("Title and start time are required.");
        return;
      }

      const teamId = document.getElementById('f_team')?.value || null;

      const row = {
        title,
        starts_at: toISO(startsRaw),
        ends_at:   endsRaw ? toISO(endsRaw) : null,
        location:  locationTxt,
        parish:    parishTxt,
        tag,
        status,
        cover_url: cover,
        description: desc,
        created_by: user.id,
        team_id: teamId || null
      };

      const { error } = await supabase.from('events').insert(row);
      if (error){
        alert("Couldn’t create event: " + error.message);
        return;
      }

      closeModal();
      cached = await fetchAll();
      applyFilters();
      alert("Event created and added to the board.");
    });

    async function loadMyTeamOptions(){
      const sel = document.getElementById('f_team');
      if (!sel) return;

      sel.innerHTML = `<option value="">My account</option>`;

      const { data:{ user } } = await supabase.auth.getUser();
      if (!user) return;

      const { data, error } = await supabase
        .from('team_members')
        .select(`
          role,
          teams:team_id (
            id,
            name,
            is_promoter
          )
        `)
        .eq('user_id', user.id)
        .in('role', ['owner','manager']);

      if (error){
        console.error('loadMyTeamOptions error', error);
        return;
      }

      const teams = (data || []).map(r => r.teams).filter(Boolean);

      // if you want ONLY promoter teams to be able to host events, keep this:
      const allowed = teams;

      allowed.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = `${t.name}`;
        sel.appendChild(opt);
      });
    }
  </script>
