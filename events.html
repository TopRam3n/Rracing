<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>


<script>

  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0Z252emp0b2pkcW11anpva2doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyMTkwMDAsImV4cCI6MjA3Nzc5NTAwMH0.r8LBQ14sxABB0mIw0exPlmv19W1fx0-iKLyefPhh8d8";

<script src="/auth-ui.js"></script>
<style>
  :root{
    --bg:#141414;--bg1:#161616;--bg2:#1b1b1b;--fg:#fff;--muted:#bdbdbd;--accent:#e50914;
    --line:rgba(255,255,255,.08);--shadow:0 40px 120px -30px rgba(0,0,0,.6)
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif}
  a{color:var(--fg);text-decoration:none}
  .container{max-width:1200px;margin:0 auto;padding:0 24px}

  /* NAV */
  .nav{position:sticky;top:0;z-index:50;background:rgba(18,18,18,.9);border-bottom:1px solid var(--line);backdrop-filter:saturate(140%) blur(8px)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:48px;height:48px;border-radius:8px}
  .title small{color:var(--muted)}
  h1,h2{font-family:"Bebas Neue";letter-spacing:2px;margin:0}

  .nav-auth {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Wrap the chip + dropdown together */
.profile-menu {
  position: relative;
  display: flex;
  align-items: center;
}

.profile-chip {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--line);
}

.profile-chip span {
  font-size: 16px;
}

.dropdown {
  position: absolute;
  right: 0;
  top: 48px;
  background: var(--bg1);
  border: 1px solid var(--line);
  box-shadow: 0 20px 40px rgba(0,0,0,.45);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  min-width: 190px;
  z-index: 999;
}

.dropdown a,
.dropdown button {
  padding: 10px 16px;
  text-align: left;
  border: none;
  background: transparent;
  color: var(--fg);
  font-size: 15px;
  width: 100%;
  cursor: pointer;
}

.dropdown a:hover,
.dropdown button:hover {
  background: #1f1f1f;
}



  .section{padding:56px 0}
  .grid{display:grid;gap:24px}
  .cols-3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:960px){.cols-3{grid-template-columns:1fr}}

  .card{background:var(--bg1);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);transition:transform .25s cubic-bezier(.2,.8,.2,1)}
  .card:hover{transform:translateY(-6px) scale(1.01)}
  .card img{display:block;width:100%;height:auto}
  .pad{padding:18px}
  .sub{color:var(--muted)}

  .date{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;min-width:64px;text-align:center}
  .date .m{font-family:"Bebas Neue";font-size:22px;line-height:1}
  .date .d{font-family:"Bebas Neue";font-size:26px;line-height:1}

  .filters{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 18px}
  input,select{background:var(--bg2);border:1px solid var(--line);color:#fff;padding:12px;border-radius:12px;outline:none}
  .btn{display:inline-flex;gap:8px;align-items:center;padding:10px 14px;border-radius:14px;border:1px solid var(--line);cursor:pointer}
  .btn.primary{background:#fff;color:#000;border-color:#fff}
  .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:14px}

  .pagination{display:flex;gap:10px;justify-content:center;margin-top:18px}
  .pagination .btn[disabled]{opacity:.5;pointer-events:none}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:80}
  .modal{width:min(720px,92vw);background:#121212;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
  .modal header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
  .modal h3{font-family:"Bebas Neue";font-size:28px;margin:0}
  .modal .content{padding:18px;display:grid;gap:12px}
  .row{display:grid;gap:10px}
  .modal .actions{display:flex;gap:10px;justify-content:flex-end;padding:16px 18px;border-top:1px solid var(--line)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:720px){.two{grid-template-columns:1fr}}
  .help{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
  <nav class="nav" role="navigation" aria-label="Primary">
    <div class="container nav-inner">
      <a class="brand" href="/" aria-label="ROK Racers JA home">
        <img src="/Assets/logo.png" alt="" class="logo">
        <div class="title"><h1>ROK RACERS JA</h1><small>Events</small></div>
      </a>
      <div class="actions">
        <span id="userBadge" class="sub"></span>
        <button id="signinBtn" class="btn">Sign in</button>
        <button id="signoutBtn" class="btn" style="display:none">Sign out</button>
        <a class="btn" href="/">Home</a>
        <button id="addEventBtn" class="btn primary" style="display:none">+ Create Event</button>
      </div>
    </div>

    <div class="nav-auth">
  <button id="signinBtn" class="btn">Sign in</button>

  <div id="profileMenu" class="profile-menu" style="display:none">
    <div id="profileChip" class="profile-chip">
      <span id="profileInitials">U</span>
    </div>

    <div id="dropdown" class="dropdown" style="display:none">
      <a href="/garage.html">My Garage</a>
      <a href="/tickets.html">My Tickets</a>
      <a href="/likes-builds.html">Liked Builds</a>
      <a href="/likes-sightings.html">Liked Sightings</a>
      <button id="signoutBtn" class="btn" style="width:100%">Sign out</button>
    </div>
  </div>
</div>

  </nav>

  <main class="container">
    <section class="section">
      <h2 style="font-size:44px">All Events</h2>

      <div class="filters" role="region" aria-label="Event filters">
        <input id="q" placeholder="Search title or location…" aria-label="Search"/>
        <select id="month" aria-label="Month">
          <option value="">Any month</option>
          <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
          <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
          <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
          <option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
        </select>
        <select id="when" aria-label="When">
          <option value="upcoming">Upcoming</option>
          <option value="past">Past</option>
          <option value="all">All</option>
        </select>
        <button class="btn" id="apply">Apply</button>
      </div>

      <div id="eventsList" class="grid cols-3" role="list" aria-live="polite">
        <article class="card" role="listitem"><div class="pad sub">Loading…</div></article>
      </div>

      <div class="pagination">
        <button class="btn" id="prev">← Prev</button>
        <button class="btn" id="next">Next →</button>
      </div>
    </section>
  </main>

  <!-- Create Event Modal -->
  <div id="modalBackdrop" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header>
        <h3 id="modalTitle">Create Event</h3>
        <button id="modalClose" class="btn" aria-label="Close">✕</button>
      </header>
      <div class="content">
        <div class="row">
          <label>Title
            <input id="f_title" required placeholder="Event name" />
          </label>
        </div>
        <div class="two">
          <label>Starts at
            <input id="f_starts" type="datetime-local" required />
          </label>
          <label>Ends at <span class="help">(optional)</span>
            <input id="f_ends" type="datetime-local" />
          </label>
        </div>
        <div class="row">
          <label>Location <span class="help">(optional)</span>
            <input id="f_location" placeholder="Kingston, Fairview Parking Lot…" />
          </label>
        </div>
        <div class="row">
          <label>Cover image URL <span class="help">(optional, HTTPS)</span>
            <input id="f_cover" placeholder="https://…" />
          </label>
        </div>
        <div class="row">
          <label>Description <span class="help">(optional)</span>
            <textarea id="f_desc" rows="4" style="resize:vertical;background:var(--bg2);border:1px solid var(--line);color:#fff;padding:12px;border-radius:12px;"></textarea>
          </label>
        </div>
      </div>
      <div class="actions">
        <button id="modalCancel" class="btn">Cancel</button>
        <button id="modalCreate" class="btn primary">Create</button>
      </div>
    </div>
  </div>

    <script>
    /* ========= Auth mini-widget (header) ========= */
    async function refreshAuthUI(){
      const { data: { user } } = await supabase.auth.getUser();
      const badge = document.getElementById('userBadge');
      const si    = document.getElementById('signinBtn');
      const so    = document.getElementById('signoutBtn');
      const add   = document.getElementById('addEventBtn');

      if (user){
        badge.textContent = user.email;
        if (si)  si.style.display  = 'none';
        if (so)  so.style.display  = 'inline-flex';
        if (add) add.style.display = 'inline-flex';
      } else {
        badge.textContent = '';
        if (si)  si.style.display  = 'inline-flex';
        if (so)  so.style.display  = 'none';
        if (add) add.style.display = 'none';
      }
    }

    document.getElementById('signinBtn').onclick = async () => {
      const email = prompt("Enter your email to sign in:");
      if (!email) return;
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options:{ emailRedirectTo: location.href }
      });
      if (error){
        alert("Sign-in error: " + error.message);
      } else {
        alert("Magic link sent — check your inbox.");
      }
    };

    document.getElementById('signoutBtn').onclick = async () => {
      await supabase.auth.signOut();
      await refreshAuthUI();
    };

    supabase.auth.onAuthStateChange(refreshAuthUI);
    refreshAuthUI();


    /* ========= Events list, filters & pagination ========= */

    const pageSize = 9;
    let page      = 0;
    let cached    = [];  // all events from DB
    let filtered  = [];  // filtered view based on search/month/when

    function withinMonth(dateStr, monthIndex){
      if (monthIndex === "" || monthIndex == null) return true;
      const d = new Date(dateStr);
      return d.getMonth() === Number(monthIndex);
    }

    function isUpcoming(dateStr){
      const now = new Date();
      const d   = new Date(dateStr);
      return d >= now;
    }

    function renderEventListCard(e){
      const d   = e.starts_at ? new Date(e.starts_at) : null;
      const m   = d ? d.toLocaleString("en-US",{ month:"short" }).toUpperCase() : "--";
      const day = d ? String(d.getDate()).padStart(2,"0") : "--";
      const when = d
        ? d.toLocaleString("en-US",{ weekday:"short", hour:"numeric", minute:"2-digit" })
        : "";
      const loc  = e.location
        ? `${when ? when + " • " : ""}${e.location}`
        : when;

      const counts = e.counts || { yes_count:0, maybe_count:0, no_count:0 };

      return `
        <article class="card" role="listitem">
          ${e.cover_url ? `<img src="${e.cover_url}" alt="${e.title}" loading="lazy">` : ""}
          <div class="pad">
            <div style="display:flex;gap:12px;align-items:center;margin-bottom:6px">
              <div class="date">
                <div class="m">${m}</div>
                <div class="d">${day}</div>
              </div>
              <div>
                <strong>${e.title}</strong>
                ${loc ? `<div class="sub">${loc}</div>` : ""}
              </div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <span class="chip">✅ ${counts.yes_count}</span>
              <span class="chip">🤔 ${counts.maybe_count}</span>
              <span class="chip">❌ ${counts.no_count}</span>
              <a class="btn" href="/event.html?id=${e.id}" style="margin-left:auto">
                Details / Tickets
              </a>
            </div>
          </div>
        </article>`;
    }

    function renderCurrentPage(){
      const listEl = document.getElementById('eventsList');
      const prevEl = document.getElementById('prev');
      const nextEl = document.getElementById('next');

      if (!filtered.length){
        listEl.innerHTML =
          `<article class="card"><div class="pad sub">
            No events match these filters yet. Try clearing search or switching to “All”.
          </div></article>`;
        if (prevEl) prevEl.disabled = true;
        if (nextEl) nextEl.disabled = true;
        return;
      }

      const start = page * pageSize;
      const slice = filtered.slice(start, start + pageSize);

      listEl.innerHTML = slice.map(renderEventListCard).join('');

      if (prevEl) prevEl.disabled = (page === 0);
      if (nextEl) nextEl.disabled = (start + pageSize) >= filtered.length;
    }

    function applyFilters(){
      const q     = document.getElementById('q').value.trim().toLowerCase();
      const month = document.getElementById('month').value;
      const when  = document.getElementById('when').value;

      let rows = cached.slice(0);

      // When: upcoming / past / all
      if (when === 'upcoming'){
        rows = rows.filter(r => r.starts_at && isUpcoming(r.starts_at));
      } else if (when === 'past'){
        rows = rows.filter(r => r.starts_at && !isUpcoming(r.starts_at));
      }

      // Month filter
      if (month !== ""){
        rows = rows.filter(r => r.starts_at && withinMonth(r.starts_at, month));
      }

      // Search (title + location)
      if (q){
        rows = rows.filter(r =>
          (`${r.title || ""} ${r.location || ""}`).toLowerCase().includes(q)
        );
      }

      filtered = rows;
      page = 0;
      renderCurrentPage();
    }

    async function fetchAll(){
      const list = document.getElementById('eventsList');
      list.innerHTML =
        `<article class="card"><div class="pad sub">Loading events…</div></article>`;

      const [eventsRes, countsRes] = await Promise.all([
        supabase
          .from('events')
          .select('id,title,starts_at,location,cover_url')
          .order('starts_at',{ ascending:true }),
        supabase
          .from('event_rsvp_counts')
          .select('event_id,yes_count,maybe_count,no_count')
      ]);

      if (eventsRes.error){
        console.error(eventsRes.error);
        list.innerHTML =
          `<article class="card"><div class="pad sub">
             Couldn’t load events right now. Refresh the page in a bit.
           </div></article>`;
        return [];
      }

      const countsMap = new Map((countsRes.data || []).map(c => [c.event_id, c]));

      return (eventsRes.data || []).map(e => ({
        ...e,
        counts: countsMap.get(e.id) || { yes_count:0, maybe_count:0, no_count:0 }
      }));
    }

    document.getElementById('apply').addEventListener('click', applyFilters);

    document.getElementById('prev').addEventListener('click', () => {
      if (page > 0){
        page--;
        renderCurrentPage();
      }
    });

    document.getElementById('next').addEventListener('click', () => {
      if ((page + 1) * pageSize < filtered.length){
        page++;
        renderCurrentPage();
      }
    });

    window.addEventListener('DOMContentLoaded', async () => {
      cached = await fetchAll();
      filtered = cached.slice(0);
      page = 0;
      renderCurrentPage();
    });


    /* ========= Create Event Modal ========= */

    const backdrop   = document.getElementById('modalBackdrop');
    const addEventBtn = document.getElementById('addEventBtn');

    const openModal = () => {
      backdrop.style.display = 'flex';
      backdrop.setAttribute('aria-hidden','false');
    };

    const closeModal = () => {
      backdrop.style.display = 'none';
      backdrop.setAttribute('aria-hidden','true');
    };

    addEventBtn.addEventListener('click', async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user){
        alert("Sign in to create an event.");
        document.getElementById('signinBtn')?.click();
        return;
      }
      openModal();
    });

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) closeModal();
    });

    function toISO(localDT){
      if (!localDT) return null;
      const [date, time] = localDT.split('T');
      return new Date(`${date}T${time}:00`).toISOString();
    }

    document.getElementById('modalCreate').addEventListener('click', async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user){
        alert("Sign in to create an event.");
        return;
      }

      const title      = document.getElementById('f_title').value.trim();
      const startsRaw  = document.getElementById('f_starts').value;
      const endsRaw    = document.getElementById('f_ends').value;
      const locationTxt = document.getElementById('f_location').value.trim() || null;
      const cover      = document.getElementById('f_cover').value.trim() || null;
      const desc       = document.getElementById('f_desc').value.trim()  || null;

      if (!title || !startsRaw){
        alert("Title and start time are required.");
        return;
      }

      const row = {
        title,
        starts_at: toISO(startsRaw),
        ends_at:   endsRaw ? toISO(endsRaw) : null,
        location:  locationTxt,
        cover_url: cover,
        description: desc,
        created_by: user.id
      };

      const { error } = await supabase.from('events').insert(row);
      if (error){
        alert("Couldn’t create event: " + error.message);
        return;
      }

      closeModal();
      cached = await fetchAll();
      applyFilters(); // re-applies current filters on fresh data
      alert("Event created and added to the board.");
    });
  </script>

</body>
</html>
