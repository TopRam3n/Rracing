  <style>
    :root{
      --bg:#050508;
      --bg1:#141414;
      --bg2:#1b1b1b;
      --fg:#fff;
      --muted:#bdbdbd;
      --accent:#e50914;
      --accent-yellow:#FFD93B;
      --line:rgba(255,255,255,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:radial-gradient(circle at top, #161623 0, #050508 55%, #000 100%);
      color:var(--fg);
      font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif
    }
    a{color:var(--fg);text-decoration:none}
    .container{max-width:900px;margin:0 auto;padding:0 24px}

    .nav{
      position:sticky;top:0;z-index:20;
      background:rgba(5,5,8,.9);
      border-bottom:1px solid var(--line);
      backdrop-filter:saturate(140%) blur(12px);
    }
    .nav-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 0;
      gap:16px;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:40px;height:40px;border-radius:10px;object-fit:cover}
    h1,h2{font-family:"Bebas Neue";letter-spacing:2px;margin:0}
    .sub{color:var(--muted);font-size:12px}

    .menu{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    .btn{
      display:inline-flex;gap:8px;align-items:center;
      padding:8px 14px;border-radius:999px;
      border:1px solid var(--line);
      cursor:pointer;background:transparent;color:var(--fg);
      font-family:inherit;font-size:13px;
      transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    .btn.primary{
      background:radial-gradient(circle at top left,#ff4d4d,var(--accent));
      color:#fff;border-color:rgba(229,9,20,.9);
      box-shadow:0 0 18px rgba(229,9,20,.5);
    }
    .btn.primary:hover{
      box-shadow:0 0 26px rgba(229,9,20,.7);
      transform:translateY(-1px);
    }
    .btn.yellow{
      background:radial-gradient(circle at top left, #ffe58a, var(--accent-yellow));
      color:#111;
      border-color:rgba(255,217,59,.7);
      box-shadow:0 0 18px rgba(255,217,59,.25);
      font-weight:700;
    }
    .btn.yellow:hover{
      transform:translateY(-1px);
      box-shadow:0 0 26px rgba(255,217,59,.32);
    }

    .section{padding:40px 0 52px}
    .card{
      background:var(--bg1);
      border:1px solid var(--line);
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 40px 120px -30px rgba(0,0,0,.7);
    }
    .pad{padding:18px}
    .meta{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 0}
    .chip{
      background:var(--bg2);
      border:1px solid var(--line);
      border-radius:999px;
      padding:7px 11px;
      font-size:13px;
    }
    .row{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
    .input{
      width:100%;background:var(--bg2);border:1px solid var(--line);
      color:#fff;padding:12px;border-radius:12px;outline:none;
      font-family:inherit;font-size:14px;
    }
    textarea.input{resize:vertical}
    .comment{border-top:1px solid var(--line);padding:14px 0}
    .comment .actions{display:flex;gap:8px;margin-top:8px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .grid{display:grid;gap:12px}
    .cols-2{grid-template-columns:1fr 1fr}
    @media(max-width:760px){.cols-2{grid-template-columns:1fr}}

    .presence{display:flex;gap:6px;align-items:center;font-size:13px;color:var(--muted)}

    .nav-auth{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .profile-menu{position:relative;display:flex;align-items:center;}
    .profile-chip{
      width:32px;height:32px;border-radius:50%;
      background:var(--bg2);
      display:flex;align-items:center;justify-content:center;
      font-weight:600;cursor:pointer;border:1px solid var(--line);
      font-size:13px;
    }
    .profile-chip:hover{
      border-color:rgba(255,255,255,.32);
      box-shadow:0 0 16px rgba(255,217,59,.6);
      transform:translateY(-1px);
    }
    .dropdown{
      position:absolute;right:0;top:40px;
      background:var(--bg1);border:1px solid var(--line);
      box-shadow:0 20px 40px rgba(0,0,0,.6);
      border-radius:16px;display:flex;flex-direction:column;
      min-width:190px;z-index:999;
    }
    .dropdown a,.dropdown button{
      padding:10px 16px;text-align:left;border:none;
      background:transparent;color:var(--fg);font-size:13px;
      width:100%;cursor:pointer;font-family:inherit;
    }
    .dropdown a:hover,.dropdown button:hover{background:#1f1f1f}

    @media(max-width:640px){
      .nav-inner{flex-wrap:wrap}
      .menu{order:3;width:100%;justify-content:flex-start}
      .nav-auth{order:2;width:100%;justify-content:flex-end}
    }

    /* ===== Team badge ===== */
    .team-badge{
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.25);
      padding:10px 12px;border-radius:999px;margin-top:12px;
    }
    .team-badge img{
      width:28px;height:28px;border-radius:8px;object-fit:cover;border:1px solid rgba(255,255,255,.12);
    }
    .team-badge .pill{
      display:inline-flex;align-items:center;
      padding:5px 10px;border-radius:999px;
      background:var(--accent-yellow);color:#111;font-size:12px;border:1px solid rgba(255,217,59,.65);
      font-weight:700;
    }

    /* ===== Payment / RSVP code blocks ===== */
    .info-block{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.22);
      border-radius:16px;
      padding:12px;
      margin-top:14px;
    }
    .info-title{
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:8px;
    }
    .code-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:8px 12px;
      border:1px solid rgba(255,217,59,.25);
      background:rgba(255,217,59,.08);
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
    }
  </style>
</head>

  <main class="container">
    <section class="section">
      <div id="eventCard" class="card">
        <div class="pad sub">Loading…</div>
      </div>
    </section>

    <section class="section">
      <h2 style="font-size:36px;letter-spacing:2px;text-transform:uppercase;">Comments</h2>
      <div id="commentForm" class="row" style="margin:10px 0 16px; display:none">
        <input id="commentText" class="input" placeholder="Share your thoughts…"/>
        <button id="commentPost" class="btn primary">Post</button>
      </div>
      <div id="comments" class="card">
        <div class="pad sub">Loading comments…</div>
      </div>

  <script>
    const eventId = new URLSearchParams(location.search).get('id');
    const el = (id)=>document.getElementById(id);
    const escapeHTML = (s)=> (s||"").replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));

    function fmt(d){
      if(!d) return "";
      const dt = new Date(d);
      return dt.toLocaleString(undefined,{
        weekday:'short',month:'short',day:'2-digit',
        hour:'2-digit',minute:'2-digit'
      });
    }

    // RSVP code generator: RR-8F3K2
    function generateRsvpCode(){
      const alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no 0/O/1/I
      let out = "RR-";
      for (let i=0;i<5;i++){
        out += alphabet[Math.floor(Math.random()*alphabet.length)];
      }
      return out;
    }

    function isMissingColumnError(err){
      const msg = (err?.message || "").toLowerCase();
      return msg.includes("column") && msg.includes("does not exist");
    }

    let currentUserId = null;

    async function requireLogin(callback){
      if (window.authUI && typeof authUI.requireLogin === 'function'){
        return authUI.requireLogin(callback);
      }
      const { data: { user } = {} } = await supabase.auth.getUser();
      if (!user){
        alert("Please sign in first.");
        return false;
      }
      if (callback) callback(user);
      return true;
    }

    async function syncPageAuth(){
      const { data: { user } } = await supabase.auth.getUser();
      currentUserId = user?.id || null;
      const form = el('commentForm');
      if(form) form.style.display = user ? 'flex' : 'none';
    }

    supabase.auth.onAuthStateChange(async () => {
      await syncPageAuth();
      await loadMyRsvp();
      await loadMyBuilds();
    });

    async function refreshRsvpCounts(){
      const countsEl = el('rsvpCounts');
      if(!countsEl || !eventId) return;

      const { data, error } = await supabase
        .from('event_rsvp_counts')
        .select('yes_count,maybe_count,no_count')
        .eq('event_id', eventId)
        .maybeSingle();

      if(error || !data){
        countsEl.textContent = '';
        return;
      }

      countsEl.textContent = `✅ ${data.yes_count} going • 🤔 ${data.maybe_count} maybe • ❌ ${data.no_count} not going`;
    }

    async function renderTeamForEvent(eventRow){
      const host = el('eventTeamBadge');
      if(!host) return;

      if(!eventRow?.team_id){
        host.style.display = 'none';
        return;
      }

      const { data: team, error: tErr } = await supabase
        .from('teams')
        .select('id,name,logo_url,is_promoter')
        .eq('id', eventRow.team_id)
        .single();

      if(tErr || !team){
        console.error(tErr);
        host.style.display = 'none';
        return;
      }

      const { data:{ user } } = await supabase.auth.getUser();
      let role = null;

      if(user){
        const { data: mem } = await supabase
          .from('team_members')
          .select('role,status')
          .eq('team_id', team.id)
          .eq('user_id', user.id)
          .maybeSingle();

        role = (mem && mem.status === 'active') ? mem.role : null;
      }

      const canManage = role && ['owner','manager'].includes(role);

      host.style.display = 'flex';
      host.innerHTML = `
        <div class="team-badge">
          ${team.logo_url ? `<img src="${escapeHTML(team.logo_url)}" alt="">` : ``}
          <div style="font-weight:700">${escapeHTML(team.name)}</div>
          ${team.is_promoter ? `<span class="pill">PROMOTER</span>` : ``}
          <a class="btn" href="/team.html?id=${team.id}" style="margin-left:auto">View team</a>
          ${canManage ? `<a class="btn primary" href="/admin-team.html?team=${team.id}">Manage</a>` : ``}
        </div>
      `;
    }

    function openExternalPayment(url){
      if(!url) return;
      try{
        window.open(url, "_blank", "noopener,noreferrer");
      }catch(e){
        location.href = url;
      }
    }

    async function loadEvent(){
      const card = el('eventCard');
      if(!eventId){
        card.innerHTML = `<div class="pad sub">Missing event ID.</div>`;
        return;
      }

      const { data, error } = await supabase.from('events')
        .select(`
          id,title,starts_at,ends_at,location,description,cover_url,
          created_by,team_id,
          payment_url,payment_label,payment_instructions,
          teams:team_id(id,name,is_promoter,logo_url)
        `)
        .eq('id', eventId)
        .maybeSingle();

      if(error || !data){
        card.innerHTML = `<div class="pad sub">Event not found.</div>`;
        return;
      }

      document.title = `${data.title} — ROK Racers JA`;

      const time = `${fmt(data.starts_at)}${data.ends_at ? ` — ${fmt(data.ends_at)}` : ""}`;
      const canEdit = !!(currentUserId && data.created_by && data.created_by === currentUserId);

      const hostTeamPill = data.teams?.id
        ? `<a class="chip" href="/team.html?id=${data.teams.id}" style="text-decoration:none">
            🏁 Host: ${escapeHTML(data.teams.name || 'Team')}
          </a>`
        : '';

      const hasPay = !!data.payment_url;

      card.innerHTML = `
        ${data.cover_url ? `<img src="${escapeHTML(data.cover_url)}" alt="${escapeHTML(data.title)}" style="width:100%;display:block">` : ""}

        <div class="pad">
          <h2 style="font-size:42px;letter-spacing:2px;text-transform:uppercase;">${escapeHTML(data.title)}</h2>
          <div class="meta">
            <span class="chip">🕒 ${escapeHTML(time)}</span>
            ${data.location ? `<span class="chip">📍 ${escapeHTML(data.location)}</span>` : ""}
            ${hostTeamPill}
          </div>

          <div id="eventTeamBadge" style="display:none"></div>

          <p style="margin-top:14px">
            ${escapeHTML(data.description||"").replace(/\n/g,'<br>')}
          </p>

          <!-- Payment block (external link) -->
          <div id="paymentBlock" class="info-block" style="${hasPay ? '' : 'display:none'}">
            <div class="info-title">Tickets</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between">
              <div class="sub" style="font-size:13px;max-width:520px">
                ${escapeHTML(data.payment_instructions || "Pay using the promoter's external link. If you're paying by transfer, use your RSVP code as reference where possible.")}
              </div>
              <button id="payNowBtn" class="btn yellow" type="button">
                ${escapeHTML(data.payment_label || "Pay now (external)")} ↗
              </button>
            </div>
          </div>

          <!-- RSVP code block -->
          <div id="rsvpCodeBlock" class="info-block" style="display:none">
            <div class="info-title">Your RSVP code</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between">
              <span class="code-pill">🎟 <span id="rsvpCodeText">RR-XXXXX</span></span>
              <div style="display:flex;gap:10px;flex-wrap:wrap">
                <button id="copyRsvpCode" class="btn" type="button">Copy</button>
                <button id="shareRsvpCode" class="btn" type="button">Share</button>
              </div>
            </div>
            <div class="sub" style="margin-top:8px;font-size:13px">
              Use this at the gate, or as your transfer reference if the promoter requests it.
            </div>
          </div>

          <div class="toolbar" id="ownerToolbar" style="${canEdit?'':'display:none'}">
            <button class="btn" id="editBtn">Edit</button>
            <button class="btn" id="deleteBtn">Delete</button>
          </div>

          <div class="grid cols-2" style="margin-top:12px" id="rsvp">
            <div>
              <label class="sub" for="attachBuild">Attach build (optional):</label>
              <select id="attachBuild" class="input" style="max-width:320px">
                <option value="">— None —</option>
              </select>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px">
              <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
                <button class="btn" data-rsvp="yes">RSVP: Yes</button>
                <button class="btn" data-rsvp="maybe">Maybe</button>
                <button class="btn" data-rsvp="no">No</button>
                <span id="rsvpStatus" class="sub" style="margin-left:8px"></span>
              </div>
              <span id="rsvpCounts" class="sub" style="font-size:13px"></span>
            </div>
          </div>

          <div id="editForm" style="display:none;margin-top:14px" class="grid cols-2">
            <input id="e_title" class="input" placeholder="Title" value="${escapeHTML(data.title)}">
            <input id="e_location" class="input" placeholder="Location" value="${escapeHTML(data.location||'')}">
            <input id="e_starts" class="input" placeholder="Starts (YYYY-MM-DD HH:MM)" value="${data.starts_at? new Date(data.starts_at).toISOString().slice(0,16).replace('T',' '):''}">
            <input id="e_ends" class="input" placeholder="Ends (YYYY-MM-DD HH:MM)" value="${data.ends_at? new Date(data.ends_at).toISOString().slice(0,16).replace('T',' '):''}">
            <input id="e_cover" class="input" placeholder="Cover URL" value="${escapeHTML(data.cover_url||'')}">
            <textarea id="e_desc" class="input" rows="4" placeholder="Description">${escapeHTML(data.description||'')}</textarea>

            <!-- Optional: allow editing payment fields if you want (kept hidden unless you add UI later) -->
            <input id="e_pay_url" class="input" placeholder="Payment URL (external)" value="${escapeHTML(data.payment_url||'')}">
            <input id="e_pay_label" class="input" placeholder="Payment button label" value="${escapeHTML(data.payment_label||'')}">
            <textarea id="e_pay_ins" class="input" rows="3" placeholder="Payment instructions">${escapeHTML(data.payment_instructions||'')}</textarea>

            <div style="display:flex;gap:10px">
              <button id="saveEdit" class="btn primary">Save</button>
              <button id="cancelEdit" class="btn">Cancel</button>
            </div>
          </div>
        </div>`;

      await renderTeamForEvent(data);

      // Wire payment button
      const payBtn = el('payNowBtn');
      if (payBtn && data.payment_url){
        payBtn.onclick = ()=> openExternalPayment(data.payment_url);
      }

      // RSVP button handlers
      document.querySelectorAll('[data-rsvp]').forEach(btn=>{
        btn.addEventListener('click', ()=> requireLogin(() => upsertRsvp(btn.dataset.rsvp)));
      });

      // Owner edit/delete
      if(canEdit){
        el('editBtn').onclick = ()=> el('editForm').style.display = 'block';
        el('cancelEdit').onclick = ()=> el('editForm').style.display = 'none';
        el('saveEdit').onclick = async ()=>{
          const title = el('e_title').value.trim();
          const locationTxt = el('e_location').value.trim() || null;
          const startsAt = el('e_starts').value.trim();
          const endsAt = el('e_ends').value.trim();
          const cover = el('e_cover').value.trim() || null;
          const desc = el('e_desc').value.trim() || null;

          // payment fields
          const payUrl = (el('e_pay_url')?.value || '').trim() || null;
          const payLabel = (el('e_pay_label')?.value || '').trim() || null;
          const payIns = (el('e_pay_ins')?.value || '').trim() || null;

          const payload = {
            title,
            location: locationTxt,
            cover_url: cover,
            description: desc,
            payment_url: payUrl,
            payment_label: payLabel,
            payment_instructions: payIns
          };

          payload.starts_at = startsAt ? new Date(startsAt.replace(' ','T')).toISOString() : null;
          payload.ends_at = endsAt ? new Date(endsAt.replace(' ','T')).toISOString() : null;

          const { error } = await supabase.from('events').update(payload).eq('id', eventId);

          // If payment columns don't exist yet, don't block saving core fields
          if (error && isMissingColumnError(error)){
            delete payload.payment_url;
            delete payload.payment_label;
            delete payload.payment_instructions;
            const { error: e2 } = await supabase.from('events').update(payload).eq('id', eventId);
            if (e2) return alert('Update failed: ' + e2.message);
          } else if (error){
            return alert('Update failed: ' + error.message);
          }

          await loadEvent();
          alert('Saved.');
        };
        el('deleteBtn').onclick = async ()=>{
          if(!confirm('Delete this event? This cannot be undone.')) return;
          const { error } = await supabase.from('events').delete().eq('id', eventId);
          if(error) return alert('Delete failed: ' + error.message);
          location.href = '/events.html';
        };
      }

      await loadMyBuilds();
      await loadMyRsvp();
      await refreshRsvpCounts();

      // If you land on #rsvp (from homepage button), scroll nicely
      if (location.hash === '#rsvp'){
        setTimeout(()=> document.getElementById('rsvp')?.scrollIntoView({ behavior:'smooth', block:'start' }), 250);
      }
    }

    function renderComment(c){
      const dt = c.created_at ? new Date(c.created_at).toLocaleString() : '';
      const isOwner = currentUserId && (c.user_id === currentUserId);
      return `
        <div class="comment" data-id="${c.id}">
          <div class="sub" style="margin-bottom:6px">${escapeHTML(dt)}</div>
          <div class="body" data-mode="view">${escapeHTML(c.body).replace(/\n/g,'<br>')}</div>
          ${isOwner ? `
            <div class="actions">
              <button class="btn" data-action="edit">Edit</button>
              <button class="btn" data-action="delete">Delete</button>
            </div>` : ``}
        </div>`;
    }

    async function loadComments(){
      const wrap = el('comments');
      const { data, error } = await supabase
        .from('comments')
        .select('id, body, created_at, user_id, target_type, target_id')
        .eq('target_type', 'event')
        .eq('target_id', eventId)
        .order('created_at', { ascending: true });

      if(error){
        wrap.innerHTML = `<div class="pad sub">Couldn’t load comments.</div>`;
        return;
      }
      if(!data || !data.length){
        wrap.innerHTML = `<div class="pad sub">No comments yet — be the first.</div>`;
        return;
      }
      wrap.innerHTML = `<div class="pad" id="commentsInner"></div>`;
      el('commentsInner').innerHTML = data.map(renderComment).join('');
    }

    async function postComment(){
      const input = el('commentText');
      const text = input.value.trim();
      if(!text) return;

      const { data: { user } } = await supabase.auth.getUser();
      if(!user){
        alert("Please sign in first.");
        return;
      }

      const { error } = await supabase.from('comments').insert({
        user_id: user.id,
        target_type: 'event',
        target_id: eventId,
        body: text
      });

      if(error){
        alert("Couldn’t post: " + error.message);
        return;
      }
      input.value = "";
    }

    el('commentPost').onclick = ()=> requireLogin(postComment);

    el('comments').addEventListener('click', async (e)=>{
      const btn = e.target.closest('button[data-action]');
      if(!btn) return;
      const commentEl = e.target.closest('.comment');
      const id = commentEl?.dataset.id;
      const action = btn.dataset.action;

      if(action === 'delete'){
        if(!confirm('Delete this comment?')) return;
        const { error } = await supabase.from('comments').delete().eq('id', id);
        if(error) return alert('Delete failed: ' + error.message);
      }

      if(action === 'edit'){
        const bodyDiv = commentEl.querySelector('.body');
        if(bodyDiv.dataset.mode !== 'view') return;
        const text = bodyDiv.innerText;
        bodyDiv.dataset.mode = 'edit';
        bodyDiv.innerHTML = `
          <textarea class="input" rows="3">${escapeHTML(text)}</textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn primary" data-action="save">Save</button>
            <button class="btn" data-action="cancel">Cancel</button>
          </div>`;
      }

      if(action === 'cancel'){
        const { data, error } = await supabase.from('comments').select('*').eq('id', id).maybeSingle();
        if(!error && data){
          const node = e.target.closest('.comment');
          node.outerHTML = renderComment(data);
        }
      }

      if(action === 'save'){
        const node = e.target.closest('.comment');
        const ta = node.querySelector('textarea');
        const newText = ta.value.trim();
        if(!newText) return alert('Comment cannot be empty.');
        const { error } = await supabase.from('comments').update({ body: newText }).eq('id', id);
        if(error) return alert('Update failed: ' + error.message);
      }
    });

    let commentsChannel;
    function setupLiveComments(){
      if(!eventId) return;
      commentsChannel?.unsubscribe();

      commentsChannel = supabase.channel(`comments-${eventId}`)
        .on('postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'comments', filter: `target_id=eq.${eventId}` },
          (payload) => {
            const c = payload.new;
            if (c.target_type !== 'event') return;

            const wrap = el('comments');
            if (wrap.textContent.includes('No comments yet')) {
              wrap.innerHTML = `<div class="pad" id="commentsInner"></div>`;
            }
            const inner = el('commentsInner') || (()=>{ wrap.innerHTML = `<div class="pad" id="commentsInner"></div>`; return el('commentsInner'); })();
            inner.insertAdjacentHTML('beforeend', renderComment(c));
          })
        .on('postgres_changes',
          { event: 'UPDATE', schema: 'public', table: 'comments', filter: `target_id=eq.${eventId}` },
          (payload) => {
            const c = payload.new;
            if (c.target_type !== 'event') return;
            const node = document.querySelector(`.comment[data-id="${c.id}"]`);
            if(node){ node.outerHTML = renderComment(c); }
          })
        .on('postgres_changes',
          { event: 'DELETE', schema: 'public', table: 'comments', filter: `target_id=eq.${eventId}` },
          (payload) => {
            const id = payload.old.id;
            const node = document.querySelector(`.comment[data-id="${id}"]`);
            node?.remove();
            const inner = el('commentsInner');
            if(inner && !inner.children.length){
              el('comments').innerHTML = `<div class="pad sub">No comments yet — be the first.</div>`;
            }
          })
        .subscribe();
    }

    let presenceChannel;
    async function setupPresence(){
      if(!eventId) return;
      const { data: { user } } = await supabase.auth.getUser();
      const key = user?.id || `anon-${crypto.getRandomValues(new Uint32Array(1))[0]}`;

      presenceChannel?.unsubscribe();
      presenceChannel = supabase.channel(`presence-event-${eventId}`, {
        config: { presence: { key } }
      });

      presenceChannel
        .on('presence', { event: 'sync' }, () => {
          const state = presenceChannel.presenceState();
          let count = 0;
          for (const _k in state) count++;
          el('viewerCount').textContent = count;
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            await presenceChannel.track({ eventId });
          }
        });
    }

    async function loadMyBuilds(){
      const { data: { user } } = await supabase.auth.getUser();
      const sel = el('attachBuild');
      if(!user || !sel) return;

      const { data, error } = await supabase
        .from('builds')
        .select('id,title,is_public')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false });

      if(error){
        console.error(error);
        return;
      }

      sel.innerHTML = `<option value="">— None —</option>` + (data||[]).map(b =>
        `<option value="${b.id}">${escapeHTML(b.title)}${b.is_public? '':' (private)'}</option>`
      ).join("");
    }

    function showRsvpCodeUI(code){
      const block = el('rsvpCodeBlock');
      const text = el('rsvpCodeText');
      if(!block || !text) return;

      if(!code){
        block.style.display = 'none';
        return;
      }

      block.style.display = 'block';
      text.textContent = code;

      const copyBtn = el('copyRsvpCode');
      const shareBtn = el('shareRsvpCode');

      copyBtn?.addEventListener('click', async ()=>{
        try{
          await navigator.clipboard.writeText(code);
          alert('RSVP code copied.');
        }catch(e){
          prompt('Copy your RSVP code:', code);
        }
      });

      shareBtn?.addEventListener('click', async ()=>{
        const msg = `ROK Racers RSVP Code: ${code}`;
        if (navigator.share){
          try{ await navigator.share({ text: msg }); }catch(e){}
        } else {
          prompt('Share this RSVP code:', msg);
        }
      });
    }

    async function loadMyRsvp(){
      const { data: { user } } = await supabase.auth.getUser();
      const badge = el('rsvpStatus');
      const sel = el('attachBuild');
      if(!user){
        if(badge) badge.textContent = '';
        if(sel) sel.value = '';
        showRsvpCodeUI(null);
        return;
      }

      // Try to include rsvp_code. If column doesn't exist, retry without it.
      let rsvpRow = null;

      const res = await supabase
        .from('event_rsvps')
        .select('status, build_id, rsvp_code')
        .eq('event_id', eventId)
        .eq('user_id', user.id)
        .maybeSingle();

      if(res.error && isMissingColumnError(res.error)){
        const res2 = await supabase
          .from('event_rsvps')
          .select('status, build_id')
          .eq('event_id', eventId)
          .eq('user_id', user.id)
          .maybeSingle();

        if(res2.error){
          console.error(res2.error);
          return;
        }
        rsvpRow = res2.data;
      } else if (res.error){
        console.error(res.error);
        return;
      } else {
        rsvpRow = res.data;
      }

      if(rsvpRow){
        if(badge) badge.textContent = `Your RSVP: ${rsvpRow.status}`;
        if(sel && rsvpRow.build_id) sel.value = rsvpRow.build_id;
        showRsvpCodeUI(rsvpRow.rsvp_code || null);
      } else {
        if(badge) badge.textContent = 'No RSVP yet';
        if(sel) sel.value = '';
        showRsvpCodeUI(null);
      }
    }

    async function ensureRsvpCodeIfNew(userId){
      // Check if user already has RSVP for this event
      const existingRes = await supabase
        .from('event_rsvps')
        .select('status, build_id, rsvp_code')
        .eq('event_id', eventId)
        .eq('user_id', userId)
        .maybeSingle();

      // If rsvp_code column doesn't exist, just return null and let RSVP proceed normally
      if(existingRes.error && isMissingColumnError(existingRes.error)){
        return { existing: existingRes.data || null, code: null, columnMissing: true };
      }
      if(existingRes.error){
        // if some other error, still let RSVP proceed but no code
        console.error(existingRes.error);
        return { existing: null, code: null, columnMissing: false };
      }

      if(existingRes.data?.rsvp_code){
        return { existing: existingRes.data, code: existingRes.data.rsvp_code, columnMissing: false };
      }

      // If no RSVP exists yet, we generate a code for first insert.
      // If RSVP exists but no code, we can still generate and patch it.
      const needsCode = true;
      if(!needsCode) return { existing: existingRes.data || null, code: null, columnMissing: false };

      // Try a few times in case of unique collision
      for (let attempt=0; attempt<6; attempt++){
        const code = generateRsvpCode();

        if(existingRes.data){
          // Patch existing row
          const upd = await supabase
            .from('event_rsvps')
            .update({ rsvp_code: code })
            .eq('event_id', eventId)
            .eq('user_id', userId);

          if(!upd.error){
            return { existing: existingRes.data, code, columnMissing: false };
          }
          // If unique violation, try again
          const msg = (upd.error?.message || "").toLowerCase();
          if(msg.includes('duplicate') || msg.includes('unique')){
            continue;
          }
          console.error(upd.error);
          return { existing: existingRes.data, code: null, columnMissing: false };
        } else {
          // We'll insert RSVP later with the code (handled in upsertRsvp)
          return { existing: null, code, columnMissing: false };
        }
      }

      return { existing: existingRes.data || null, code: null, columnMissing: false };
    }

    async function upsertRsvp(newStatus){
      const { data: { user } } = await supabase.auth.getUser();
      if(!user){
        alert('Sign in first.');
        return;
      }
      const buildId = el('attachBuild')?.value || null;

      // Try to create/ensure RSVP code (if your column exists)
      const codeInfo = await ensureRsvpCodeIfNew(user.id);

      // If RSVP existed already, use normal upsert (don’t overwrite their code)
      if (codeInfo.existing){
        const { error } = await supabase
          .from('event_rsvps')
          .upsert({
            event_id: eventId,
            user_id: user.id,
            status: newStatus,
            build_id: buildId || null
          }, { onConflict: 'event_id,user_id' });

        if(error){
          alert('RSVP failed: ' + error.message);
          return;
        }
      } else {
        // First RSVP insert: include code if available and column exists
        const payload = {
          event_id: eventId,
          user_id: user.id,
          status: newStatus,
          build_id: buildId || null
        };

        if (!codeInfo.columnMissing && codeInfo.code){
          payload.rsvp_code = codeInfo.code;
        }

        const { error } = await supabase
          .from('event_rsvps')
          .upsert(payload, { onConflict: 'event_id,user_id' });

        if(error){
          // If we tried to write rsvp_code but column isn't there, retry without it
          if (isMissingColumnError(error)){
            delete payload.rsvp_code;
            const { error: e2 } = await supabase
              .from('event_rsvps')
              .upsert(payload, { onConflict: 'event_id,user_id' });
            if (e2){
              alert('RSVP failed: ' + e2.message);
              return;
            }
          } else {
            alert('RSVP failed: ' + error.message);
            return;
          }
        }
      }

      await loadMyRsvp();
      await refreshRsvpCounts();
      alert('RSVP saved.');
    }


    window.addEventListener('DOMContentLoaded', async ()=>{
      await syncPageAuth();
      await loadEvent();
      await loadComments();
      setupLiveComments();
      setupPresence();
    });
  </script>
