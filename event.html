<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Event — ROK Racers JA</title>
  <meta name="description" content="Event details for the Jamaican car community." />
  <link rel="icon" href="../../Assets/og.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- ✅ Shared Supabase client + auth UI -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="auth-ui.js"></script>

  <!-- Design System (centralized tokens + components) -->
  <link rel="stylesheet" href="../../styles/design-system.css">

  <style>
    :root{
      --bg-main:#050508;
      --bg-card:#141414;
      --bg-alt:#111111;

      --accent-main:#128b02;
      --accent-secondary:#FFD93B;
      --accent-cyan:#FFD93B;

      --text-main:#ffffff;
      --text-muted:#bdbdbd;
      --border-subtle: rgba(255,255,255,0.06);

      --radius-lg:24px;
      --radius-md:18px;
      --shadow-soft: 0 18px 40px rgba(0,0,0,0.7);

      --transition-fast: 0.18s ease-out;
      --transition-med: 0.25s ease-out;

      --nav-height:76px;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{
      height:100%;
      background: radial-gradient(circle at top, #161623 0, #050508 55%, #000 100%);
      color:var(--text-main);
      font-family:"Rajdhani", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      scroll-behavior:smooth;
      -webkit-font-smoothing: antialiased;
    }
    a{ color:inherit; text-decoration:none; }
    img{ max-width:100%; display:block; }

    .container{ width: min(1100px, 100% - 32px); margin:0 auto; }
    @media (min-width:1280px){ .container{ width:min(1200px, 100% - 64px); } }

    .nav-wrapper{
      position: sticky; top:0; z-index: 50;
      backdrop-filter: blur(16px);
      background: linear-gradient(to bottom, rgba(5,5,8,0.9), rgba(5,5,8,0.6));
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    }
    .nav-wrapper.nav-solid{
      background: rgba(5,5,8,0.98);
      border-bottom-color: rgba(255,255,255,0.10);
      box-shadow: var(--shadow-soft);
    }
    .nav{
      height: var(--nav-height);
      display:flex; align-items:center; justify-content:space-between;
      gap:18px;
    }

    .logo{ display:flex; align-items:center; gap:10px; letter-spacing:0.04em; }
    .logo-mark{
      width:36px; height:36px; border-radius:999px;
      border:1px solid rgba(24,201,100,0.7);
      box-shadow: 0 0 18px rgba(24,201,100,0.35);
      overflow:hidden; background:#000;
      display:flex; align-items:center; justify-content:center;
    }
    .logo-mark img{ width:100%; height:100%; object-fit:cover; }
    .logo-text-main{ font-family:"Bebas Neue"; font-size:22px; text-transform:uppercase; }
    .logo-text-sub{ font-size:11px; color:var(--accent-cyan); text-transform:uppercase; }

    .nav-links{
      display:flex; gap:18px; align-items:center;
      font-size:13px; text-transform:uppercase; letter-spacing:0.15em;
      color: var(--text-muted);
    }
    .nav-links a{ position:relative; padding-bottom:4px; }
    .nav-links a::after{
      content:""; position:absolute; left:0; bottom:0; width:0; height:2px;
      background:linear-gradient(to right, var(--accent-main), var(--accent-cyan));
      transition: width var(--transition-fast);
      border-radius:999px;
    }
    .nav-links a:hover{ color:var(--text-main); }
    .nav-links a:hover::after{ width:100%; }

    .nav-cta{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .pill-viewing{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.25);
      font-size:11px;
      letter-spacing:0.14em;
      text-transform:uppercase;
      color: var(--text-muted);
      white-space:nowrap;
    }

    .btn{
      border-radius:999px; padding:8px 16px;
      font-size:13px; text-transform:uppercase; letter-spacing:0.15em;
      border:1px solid transparent; background:transparent;
      cursor:pointer; display:inline-flex; align-items:center; gap:6px;
      transition: background var(--transition-fast), color var(--transition-fast),
        border-color var(--transition-fast), transform var(--transition-fast),
        box-shadow var(--transition-fast);
      color:#fff;
    }
    .btn-primary{
      background: radial-gradient(circle at top left, #39ff96, var(--accent-main));
      box-shadow: 0 0 24px rgba(24,201,100,0.55);
      border-color: rgba(24,201,100,0.85);
    }
    .btn-primary:hover{ transform:translateY(-1px); box-shadow:0 0 32px rgba(24,201,100,0.75); }
    .btn-ghost{
      border-color: rgba(255,255,255,0.12);
      color: var(--text-muted);
    }
    .btn-ghost:hover{
      color: var(--text-main);
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.02);
    }
    .btn-pill-sm{ padding:6px 14px; font-size:11px; letter-spacing:0.16em; }

    .profile-menu{ position:relative; display:flex; align-items:center; }
    .profile-chip{
      width:32px; height:32px; border-radius:50%;
      background:var(--bg-card);
      display:flex; align-items:center; justify-content:center;
      font-weight:600; cursor:pointer;
      border:1px solid rgba(255,255,255,0.18);
      transition: box-shadow var(--transition-fast), border-color var(--transition-fast), transform var(--transition-fast);
      font-size:13px;
      user-select:none;
    }
    .profile-chip:hover{
      border-color:rgba(255,255,255,0.32);
      box-shadow:0 0 16px rgba(255,217,59,0.6);
      transform:translateY(-1px);
    }
    .dropdown{
      position:absolute; right:0; top:44px;
      background:rgba(10,10,14,0.96);
      border:1px solid var(--border-subtle);
      box-shadow:0 20px 40px rgba(0,0,0,.65);
      border-radius:16px;
      display:none;
      flex-direction:column;
      min-width:240px;
      z-index:999;
      backdrop-filter: blur(16px);
      overflow:hidden;
    }
    .dropdown.open{ display:flex; }
    .dd-head{
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex; flex-direction:column; gap:2px;
    }
    .dd-title{ font-size:12px; text-transform:uppercase; letter-spacing:0.16em; color:var(--text-muted); }
    .dd-email{ font-size:13px; color:#fff; opacity:0.92; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dropdown a, .dropdown button{
      padding:10px 14px; text-align:left;
      border:none; background:transparent; color:var(--text-main);
      font-size:13px; width:100%; cursor:pointer;
      display:flex; justify-content:space-between; align-items:center;
    }
    .dropdown a:hover, .dropdown button:hover{ background:rgba(255,255,255,0.06); }
    .dd-sep{ height:1px; background:rgba(255,255,255,0.08); margin:6px 0; }
    .dd-badge{
      font-size:10px; text-transform:uppercase; letter-spacing:.14em;
      padding:3px 8px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.16);
      color:var(--text-muted); background:rgba(0,0,0,0.25); white-space:nowrap;
    }

    @media (max-width: 860px){
      .nav-links{ display:none; }
      .logo-text-sub{ display:none; }
    }

    .page{ min-height: 100vh; position:relative; }
    .page::after{
      content:""; position:fixed; inset-inline:0; bottom:-120px; height:220px;
      background: radial-gradient(circle at bottom, rgba(24, 201, 100, 0.22), transparent 60%);
      pointer-events:none; z-index:0;
    }

    .section{ position:relative; padding: 34px 0 52px; z-index:1; }
    .card{
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      background: radial-gradient(circle at top, rgba(255,255,255,0.06), rgba(10,10,10,0.98));
      box-shadow: var(--shadow-soft);
      overflow:hidden;
      position:relative;
    }
    .pad{ padding:16px; }
    .muted{ color: var(--text-muted); }
    h1,h2{ font-family:"Bebas Neue"; letter-spacing:2px; text-transform:uppercase; }
    h2{ font-size:36px; margin-bottom:12px; }

    .event-header{
      display:grid;
      grid-template-columns: 1.25fr 1fr;
      gap:14px;
      align-items:stretch;
      padding:14px;
    }
    @media (max-width:900px){ .event-header{ grid-template-columns:1fr; } }

    .poster{
      border-radius: 18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.08);
      position:relative;
      height: 320px;
      background: #0b0b10;
    }
    @media (max-width:600px){ .poster{ height:240px; } }
    .poster::after{
      content:""; position:absolute; inset:0;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,217,59,0.22), transparent 55%),
        radial-gradient(circle at 85% 85%, rgba(24,201,100,0.25), transparent 55%),
        linear-gradient(to bottom, rgba(0,0,0,0.10), rgba(0,0,0,0.55));
      pointer-events:none;
    }
    .poster img{ width:100%; height:100%; object-fit:cover; transform: scale(1.02); }
    .poster-badge{
      position:absolute; left:12px; bottom:12px; z-index:2;
      display:inline-flex; align-items:center; gap:8px;
      border-radius:999px; padding:6px 10px;
      border:1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.55);
      font-size:10px; text-transform:uppercase; letter-spacing:0.18em; color:#fff;
      backdrop-filter: blur(10px);
    }
    .poster-badge .dot{
      width:7px; height:7px; border-radius:999px;
      background: var(--accent-secondary);
      box-shadow: 0 0 10px rgba(255,217,59,1);
    }

    .event-panel{
      border-radius: 18px;
      border:1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.25);
      padding:14px;
      position:relative;
      overflow:hidden;
    }
    .event-panel::before{
      content:""; position:absolute; inset:-30%;
      background:
        radial-gradient(circle at 10% 10%, rgba(255,217,59,0.12), transparent 50%),
        radial-gradient(circle at 90% 90%, rgba(24,201,100,0.18), transparent 50%);
      opacity:0.9; pointer-events:none;
    }
    .event-panel > *{ position:relative; z-index:1; }

    .event-title{ font-size:46px; line-height:0.95; margin-bottom:10px; }
    @media (max-width:600px){ .event-title{ font-size:38px; } }

    .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .chip{
      display:inline-flex; align-items:center; gap:8px;
      border-radius:999px; padding:7px 11px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.02);
      font-size:12px; color: var(--text-muted);
      letter-spacing:0.10em; text-transform:uppercase; white-space:nowrap;
    }
    .chip strong{ color:#fff; font-weight:700; letter-spacing:0.06em; text-transform:none; }

    .desc{ margin-top:12px; color: var(--text-muted); font-size:14px; line-height:1.45; }

    .rsvp-rail{
      margin-top:14px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.22);
      padding:12px;
      backdrop-filter: blur(12px);
    }
    .rsvp-top{
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center; justify-content:space-between;
      margin-bottom:10px;
    }
    .rsvp-title{ font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color: var(--text-muted); }
    .rsvp-status{ font-size:12px; color: var(--text-muted); }
    .btn-xs{ padding:6px 12px; font-size:10px; letter-spacing:0.16em; }
    .btn-outline-light{
      border-color: rgba(255,255,255,0.24);
      color: var(--text-main);
      background: rgba(0,0,0,0.25);
    }
    .btn-outline-light:hover{ background: rgba(255,255,255,0.05); }

    .input{
      width:100%;
      background: rgba(5,5,10,0.9);
      border:1px solid rgba(255,255,255,0.10);
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      outline:none;
      font-family:inherit;
      font-size:14px;
    }

    .info-block{
      margin-top:12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.22);
      padding:12px;
    }
    .info-title{ font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
    .pay-row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .btn-yellow{
      background: radial-gradient(circle at top left, #ffe58a, var(--accent-secondary));
      color:#111; border-color: rgba(255,217,59,0.7);
      box-shadow: 0 0 18px rgba(255,217,59,0.25);
      font-weight:800;
    }
    .btn-yellow:hover{ transform: translateY(-1px); box-shadow: 0 0 26px rgba(255,217,59,0.32); }

    .code-pill{
      display:inline-flex; align-items:center; gap:8px;
      border-radius:999px; padding:8px 12px;
      border:1px solid rgba(255,217,59,.25);
      background: rgba(255,217,59,.08);
      font-weight:900; letter-spacing:.12em; text-transform:uppercase;
    }

    .team-badge{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.22);
      padding:10px 12px; border-radius:999px;
      margin-top:12px;
    }
    .team-badge img{
      width:28px; height:28px; border-radius:8px;
      object-fit:cover; border:1px solid rgba(255,255,255,.12);
    }
    .team-badge .pill{
      display:inline-flex; align-items:center;
      padding:5px 10px; border-radius:999px;
      background: var(--accent-secondary); color:#111;
      font-size:12px; border:1px solid rgba(255,217,59,.65);
      font-weight:900; letter-spacing:0.08em; text-transform:uppercase;
    }

    .comment-form{ display:flex; gap:10px; flex-wrap:wrap; margin:10px 0 16px; }
    .comment-form .input{ flex:1; min-width: 220px; }
    .comment{
      border-top:1px solid rgba(255,255,255,0.06);
      padding:14px 16px;
    }
    .comment .meta{
      display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
      font-size:12px; color:var(--text-muted); margin-bottom:8px;
    }
    .comment .actions{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }

    .blur-up{
      filter: blur(18px);
      transform: scale(1.03);
      transition: filter 350ms ease, transform 350ms ease;
    }
    .blur-up.is-loaded{ filter: blur(0); transform: scale(1.02); }
  </style>
</head>

  <!-- ✅ NO inline auth modal — auth-ui.js injects it -->

  <script>
    const eventId = new URLSearchParams(location.search).get('id');
    const el = (id)=>document.getElementById(id);

    const escapeHTML = (s)=> (s||"").replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));

    function fmt(d){
      if(!d) return "TBA";
      return new Date(d).toLocaleString(undefined,{
        weekday:'short',month:'short',day:'2-digit',
        hour:'numeric',minute:'2-digit'
      });
    }

    function isMissingColumnError(err){
      const msg = (err?.message || "").toLowerCase();
      return msg.includes("column") && msg.includes("does not exist");
    }

    function generateRsvpCode(){
      const alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let out = "RR-";
      for (let i=0;i<5;i++) out += alphabet[Math.floor(Math.random()*alphabet.length)];
      return out;
    }

    function applyBlurUp(img){
      if(!img) return;
      img.classList.add('blur-up');
      const done = ()=> img.classList.add('is-loaded');
      if (img.complete) done();
      else img.addEventListener('load', done, { once:true });
      img.addEventListener('error', done, { once:true });
    }

    // ===== Nav solid on scroll =====
    const navWrapper = el('navWrapper');
    function updateNavSolid(){ navWrapper?.classList.toggle('nav-solid', window.scrollY > 40); }
    updateNavSolid();
    window.addEventListener('scroll', updateNavSolid, { passive:true });

    // ===== requireLogin via authUI =====
    // ✅ Delegates to auth-ui.js — no inline modal needed
    async function requireLogin(callback){
      const loggedIn = await authUI.requireLogin();
      if (!loggedIn) return false;
      const user = authUI.getUser();
      if (callback) callback(user);
      return true;
    }

    // ===== FK FIX: Ensure referenced user row exists =====
    async function ensureUserRow(user){
      if(!user?.id) return;
      try{
        const { error } = await supabase.from('profiles').upsert({
          id: user.id, email: user.email || null, updated_at: new Date().toISOString()
        }, { onConflict:'id' });
        if (!error) return;
      } catch {}
      try{
        await supabase.from('users').upsert({
          id: user.id, email: user.email || null, updated_at: new Date().toISOString()
        }, { onConflict:'id' });
      } catch {}
    }

    // ===== Page state =====
    let currentUserId = null;

    async function syncPageAuth(){
      const user = authUI.getUser();
      currentUserId = user?.id || null;
      if (user) await ensureUserRow(user);
      el('commentForm').style.display = user ? 'flex' : 'none';
    }

    // ✅ Auth state changes handled by auth-ui.js onAuthStateChange
    // We use authUI.onChange to react to auth changes on this page
    if (window.authUI){
      authUI.onChange(async ()=>{
        await syncPageAuth();
        await loadMyRsvp();
        await loadMyBuilds();
      });
    }

    // ===== Team badge =====
    async function renderTeamForEvent(eventRow){
      const host = el('eventTeamBadge');
      if(!host) return;
      if(!eventRow?.team_id){ host.style.display='none'; return; }

      const { data: team, error: tErr } = await supabase
        .from('teams').select('id,name,logo_url,is_promoter')
        .eq('id', eventRow.team_id).maybeSingle();

      if(tErr || !team){ host.style.display='none'; return; }

      host.style.display = 'block';
      host.innerHTML = `
        <div class="team-badge">
          ${team.logo_url ? `<img src="${escapeHTML(team.logo_url)}" alt="" class="team-logo">` : ``}
          <div style="font-weight:900; letter-spacing:.04em">${escapeHTML(team.name)}</div>
          ${team.is_promoter ? `<span class="pill">Promoter</span>` : ``}
          <a class="btn btn-ghost btn-pill-sm" href="/team.html?id=${team.id}" style="margin-left:auto">View</a>
        </div>`;

      const tImg = host.querySelector('.team-logo');
      if(tImg) applyBlurUp(tImg);
    }

    // ===== Event render =====
    async function loadEvent(){
      const card = el('eventCard');
      if(!eventId){
        card.innerHTML = `<div class="pad muted">Missing event ID.</div>`;
        return;
      }

      const { data, error } = await supabase.from('events')
        .select(`id,title,starts_at,ends_at,location,description,cover_url,created_by,team_id,payment_url,payment_label,payment_instructions,teams:team_id(id,name,is_promoter,logo_url)`)
        .eq('id', eventId).maybeSingle();

      if(error || !data){
        card.innerHTML = `<div class="pad muted">Event not found.</div>`;
        return;
      }

      document.title = `${data.title || 'Event'} — ROK Racers JA`;

      const timeLine = `${fmt(data.starts_at)}${data.ends_at ? ` — ${fmt(data.ends_at)}` : ""}`;
      const cover = data.cover_url ? data.cover_url : "/Assets/logo.png";
      const hasPay = !!data.payment_url;

      card.innerHTML = `
        <div class="event-header">
          <div class="poster">
            <img id="coverImg" src="${escapeHTML(cover)}" alt="${escapeHTML(data.title || 'Event')}" loading="eager" />
            <div class="poster-badge"><span class="dot"></span> Event Poster</div>
          </div>

          <div class="event-panel">
            <h1 class="event-title">${escapeHTML(data.title || 'Event')}</h1>

            <div class="chips">
              <span class="chip">🕒 <strong>${escapeHTML(timeLine)}</strong></span>
              ${data.location ? `<span class="chip">📍 <strong>${escapeHTML(data.location)}</strong></span>` : ``}
              ${data.teams?.id ? `<a class="chip" href="/team.html?id=${data.teams.id}">🏁 <strong>Host: ${escapeHTML(data.teams.name || 'Team')}</strong></a>` : ``}
            </div>

            <div id="eventTeamBadge" style="display:none"></div>

            ${data.description ? `<div class="desc">${escapeHTML(data.description).replace(/\n/g,'<br>')}</div>` : `<div class="desc">No description yet.</div>`}

            <div id="paymentBlock" class="info-block" style="${hasPay ? '' : 'display:none'}">
              <div class="info-title">Tickets</div>
              <div class="pay-row">
                <div class="muted" style="font-size:13px; max-width:520px">
                  ${escapeHTML(data.payment_instructions || "Pay using the promoter's external link. If you're paying by transfer, use your RSVP code as reference where possible.")}
                </div>
                <button id="payNowBtn" class="btn btn-yellow btn-pill-sm" type="button">
                  ${escapeHTML(data.payment_label || "Pay now (external)")} ↗
                </button>
              </div>
            </div>

            <div id="rsvpCodeBlock" class="info-block" style="display:none">
              <div class="info-title">Your RSVP code</div>
              <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between">
                <span class="code-pill">🎟 <span id="rsvpCodeText">RR-XXXXX</span></span>
                <div style="display:flex;gap:10px;flex-wrap:wrap">
                  <button id="copyRsvpCode" class="btn btn-ghost btn-pill-sm" type="button">Copy</button>
                  <button id="shareRsvpCode" class="btn btn-ghost btn-pill-sm" type="button">Share</button>
                </div>
              </div>
              <div class="muted" style="margin-top:8px;font-size:13px">
                Use this at the gate, or as your transfer reference if the promoter requests it.
              </div>
            </div>

            <div class="rsvp-rail" id="rsvp">
              <div class="rsvp-top">
                <div class="rsvp-title">RSVP + Attach Build</div>
                <div class="rsvp-status" id="rsvpStatus"></div>
              </div>

              <div style="display:grid; grid-template-columns: 1fr; gap:10px;">
                <div>
                  <div class="muted" style="font-size:12px; margin-bottom:6px; letter-spacing:.10em; text-transform:uppercase;">Attach your build (public owned)</div>
                  <select id="attachBuild" class="input">
                    <option value="">— None —</option>
                  </select>
                </div>

                <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                  <button class="btn btn-outline-light btn-xs" type="button" data-rsvp="yes">RSVP: Yes</button>
                  <button class="btn btn-outline-light btn-xs" type="button" data-rsvp="maybe">Maybe</button>
                  <button class="btn btn-outline-light btn-xs" type="button" data-rsvp="no">No</button>
                  <span class="muted" id="rsvpCounts" style="font-size:12px; margin-left:auto;"></span>
                </div>
              </div>
            </div>
          </div>
        </div>`;

      const coverImg = el('coverImg');
      if (coverImg) applyBlurUp(coverImg);

      const payBtn = el('payNowBtn');
      if (payBtn && data.payment_url){
        payBtn.onclick = ()=> {
          try{ window.open(data.payment_url, "_blank", "noopener,noreferrer"); }
          catch{ location.href = data.payment_url; }
        };
      }

      // ✅ RSVP buttons use authUI.requireLogin
      document.querySelectorAll('[data-rsvp]').forEach(btn=>{
        btn.addEventListener('click', ()=> requireLogin(async (user)=> {
          await ensureUserRow(user);
          await upsertRsvp(btn.dataset.rsvp);
        }));
      });

      await renderTeamForEvent(data);
      await loadMyBuilds();
      await loadMyRsvp();
      await refreshRsvpCounts();

      if (location.hash === '#rsvp'){
        setTimeout(()=> document.getElementById('rsvp')?.scrollIntoView({ behavior:'smooth', block:'start' }), 200);
      }
    }

    // ===== RSVP =====
    async function refreshRsvpCounts(){
      const countsEl = el('rsvpCounts');
      if(!countsEl || !eventId) return;
      const { data, error } = await supabase.from('event_rsvp_counts')
        .select('yes_count,maybe_count,no_count').eq('event_id', eventId).maybeSingle();
      if(error || !data){ countsEl.textContent = ''; return; }
      countsEl.textContent = `✅ ${data.yes_count} going • 🤔 ${data.maybe_count} maybe • ❌ ${data.no_count} not going`;
    }

    function showRsvpCodeUI(code){
      const block = el('rsvpCodeBlock');
      const text = el('rsvpCodeText');
      if(!block || !text) return;
      if(!code){ block.style.display = 'none'; return; }
      block.style.display = 'block';
      text.textContent = code;

      el('copyRsvpCode')?.addEventListener('click', async ()=>{
        try{ await navigator.clipboard.writeText(code); alert('RSVP code copied.'); }
        catch{ prompt('Copy your RSVP code:', code); }
      }, { once:true });

      el('shareRsvpCode')?.addEventListener('click', async ()=>{
        const msg = `ROK Racers RSVP Code: ${code}`;
        if (navigator.share){ try{ await navigator.share({ text: msg }); }catch{} }
        else { prompt('Share this RSVP code:', msg); }
      }, { once:true });
    }

    async function loadMyRsvp(){
      const user = authUI.getUser();
      const badge = el('rsvpStatus');
      const sel = el('attachBuild');
      if(!user){
        if(badge) badge.textContent = '';
        if(sel) sel.value = '';
        showRsvpCodeUI(null);
        return;
      }
      await ensureUserRow(user);

      let rsvpRow = null;
      const res = await supabase.from('event_rsvps')
        .select('status, build_id, rsvp_code').eq('event_id', eventId).eq('user_id', user.id).maybeSingle();

      if(res.error && isMissingColumnError(res.error)){
        const res2 = await supabase.from('event_rsvps')
          .select('status, build_id').eq('event_id', eventId).eq('user_id', user.id).maybeSingle();
        if(res2.error) return;
        rsvpRow = res2.data;
      } else if(res.error){ return; }
      else { rsvpRow = res.data; }

      if(rsvpRow){
        if(badge) badge.textContent = `Your RSVP: ${rsvpRow.status}`;
        if(sel && rsvpRow.build_id) sel.value = rsvpRow.build_id;
        showRsvpCodeUI(rsvpRow.rsvp_code || null);
      } else {
        if(badge) badge.textContent = 'No RSVP yet';
        if(sel) sel.value = '';
        showRsvpCodeUI(null);
      }
    }

    async function ensureRsvpCodeIfNew(userId){
      const existingRes = await supabase.from('event_rsvps')
        .select('status, build_id, rsvp_code').eq('event_id', eventId).eq('user_id', userId).maybeSingle();

      if(existingRes.error && isMissingColumnError(existingRes.error)){
        return { existing: existingRes.data || null, code: null, columnMissing: true };
      }
      if(existingRes.error){ return { existing: null, code: null, columnMissing: false }; }
      if(existingRes.data?.rsvp_code){
        return { existing: existingRes.data, code: existingRes.data.rsvp_code, columnMissing:false };
      }

      for (let attempt=0; attempt<6; attempt++){
        const code = generateRsvpCode();
        if(existingRes.data){
          const upd = await supabase.from('event_rsvps').update({ rsvp_code: code })
            .eq('event_id', eventId).eq('user_id', userId);
          if(!upd.error) return { existing: existingRes.data, code, columnMissing:false };
          const msg = (upd.error?.message || "").toLowerCase();
          if(msg.includes('duplicate') || msg.includes('unique')) continue;
          return { existing: existingRes.data, code:null, columnMissing:false };
        } else {
          return { existing: null, code, columnMissing:false };
        }
      }
      return { existing: existingRes.data || null, code:null, columnMissing:false };
    }

    async function upsertRsvp(newStatus){
      const user = authUI.getUser();
      if(!user){ alert('Sign in first.'); return; }
      await ensureUserRow(user);

      const buildId = el('attachBuild')?.value || null;
      const codeInfo = await ensureRsvpCodeIfNew(user.id);

      if (codeInfo.existing){
        const { error } = await supabase.from('event_rsvps')
          .upsert({ event_id: eventId, user_id: user.id, status: newStatus, build_id: buildId || null }, { onConflict: 'event_id,user_id' });
        if(error){ alert('RSVP failed: ' + error.message); return; }
      } else {
        const payload = { event_id: eventId, user_id: user.id, status: newStatus, build_id: buildId || null };
        if (!codeInfo.columnMissing && codeInfo.code) payload.rsvp_code = codeInfo.code;
        const { error } = await supabase.from('event_rsvps').upsert(payload, { onConflict: 'event_id,user_id' });
        if(error){
          if (isMissingColumnError(error)){
            delete payload.rsvp_code;
            const { error: e2 } = await supabase.from('event_rsvps').upsert(payload, { onConflict: 'event_id,user_id' });
            if (e2){ alert('RSVP failed: ' + e2.message); return; }
          } else {
            alert('RSVP failed: ' + error.message); return;
          }
        }
      }
      await loadMyRsvp();
      await refreshRsvpCounts();
    }

    // ===== BUILDS =====
    async function loadMyBuilds(){
      const user = authUI.getUser();
      const sel = el('attachBuild');
      if(!user || !sel) return;
      await ensureUserRow(user);

      const attempt1 = await supabase.from('builds')
        .select('id,title,is_public,build_type,created_at').eq('user_id', user.id).eq('is_public', true)
        .or('build_type.eq.Owned,build_type.eq.owned').order('created_at', { ascending:false });

      let rows = null;
      if (!attempt1.error){ rows = attempt1.data || []; }
      else if (isMissingColumnError(attempt1.error)){
        const attempt2 = await supabase.from('builds').select('id,title,is_public,created_at')
          .eq('user_id', user.id).eq('is_public', true).order('created_at', { ascending:false });
        if (!attempt2.error) rows = attempt2.data || [];
      } else {
        const attempt3 = await supabase.from('builds').select('id,title,is_public,build_type,created_at')
          .eq('user_id', user.id).eq('is_public', true).order('created_at', { ascending:false });
        if (!attempt3.error) rows = attempt3.data || [];
      }

      if(!rows || !rows.length){
        sel.innerHTML = `<option value="">— No public owned builds yet —</option>`;
        return;
      }
      sel.innerHTML = `<option value="">— None —</option>` + rows.map(b =>
        `<option value="${b.id}">${escapeHTML(b.title || 'Untitled build')}</option>`
      ).join('');
    }

    // ===== COMMENTS =====
    function renderComment(c){
      const dt = c.created_at ? new Date(c.created_at).toLocaleString() : '';
      const isOwner = currentUserId && (c.user_id === currentUserId);
      return `
        <div class="comment" data-id="${c.id}">
          <div class="meta">
            <span>${escapeHTML(dt)}</span>
            ${isOwner ? `<span class="muted">You</span>` : `<span class="muted">Driver</span>`}
          </div>
          <div class="body" data-mode="view">${escapeHTML(c.body).replace(/\n/g,'<br>')}</div>
          ${isOwner ? `
            <div class="actions">
              <button class="btn btn-ghost btn-pill-sm" data-action="edit" type="button">Edit</button>
              <button class="btn btn-ghost btn-pill-sm" data-action="delete" type="button">Delete</button>
            </div>` : ``}
        </div>`;
    }

    async function loadComments(){
      const wrap = el('comments');
      const { data, error } = await supabase.from('comments')
        .select('id, body, created_at, user_id, target_type, target_id')
        .eq('target_type', 'event').eq('target_id', eventId)
        .order('created_at', { ascending:true });

      if(error){ wrap.innerHTML = `<div class="pad muted">Couldn't load comments.</div>`; return; }
      if(!data || !data.length){ wrap.innerHTML = `<div class="pad muted">No comments yet — be the first.</div>`; return; }
      wrap.innerHTML = `<div id="commentsInner"></div>`;
      el('commentsInner').innerHTML = data.map(renderComment).join('');
    }

    async function postComment(){
      const input = el('commentText');
      const text = (input.value || '').trim();
      if(!text) return;
      const user = authUI.getUser();
      if(!user){ authUI.requireLogin(); return; }
      await ensureUserRow(user);
      const { error } = await supabase.from('comments').insert({
        user_id: user.id, target_type: 'event', target_id: eventId, body: text
      });
      if(error){ alert("Couldn't post: " + error.message); return; }
      input.value = "";
      await loadComments();
    }

    el('commentPost')?.addEventListener('click', ()=> requireLogin(async (user)=>{
      await ensureUserRow(user);
      await postComment();
    }));

    el('comments')?.addEventListener('click', async (e)=>{
      const btn = e.target.closest('button[data-action]');
      if(!btn) return;
      const commentEl = e.target.closest('.comment');
      const id = commentEl?.dataset.id;
      const action = btn.dataset.action;

      if(action === 'delete'){
        if(!confirm('Delete this comment?')) return;
        const { error } = await supabase.from('comments').delete().eq('id', id);
        if(error) return alert('Delete failed: ' + error.message);
        await loadComments(); return;
      }

      if(action === 'edit'){
        const bodyDiv = commentEl.querySelector('.body');
        if(bodyDiv.dataset.mode !== 'view') return;
        const text = bodyDiv.innerText;
        bodyDiv.dataset.mode = 'edit';
        bodyDiv.innerHTML = `
          <textarea class="input" rows="3">${escapeHTML(text)}</textarea>
          <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
            <button class="btn btn-primary btn-pill-sm" data-action="save" type="button">Save</button>
            <button class="btn btn-ghost btn-pill-sm" data-action="cancel" type="button">Cancel</button>
          </div>`;
        return;
      }

      if(action === 'cancel'){ await loadComments(); return; }

      if(action === 'save'){
        const node = e.target.closest('.comment');
        const ta = node.querySelector('textarea');
        const newText = (ta.value || '').trim();
        if(!newText) return alert('Comment cannot be empty.');
        const { error } = await supabase.from('comments').update({ body: newText }).eq('id', id);
        if(error) return alert('Update failed: ' + error.message);
        await loadComments();
      }
    });

    // ===== Live comments =====
    let commentsChannel;
    function setupLiveComments(){
      if(!eventId) return;
      commentsChannel?.unsubscribe();
      commentsChannel = supabase.channel(`comments-${eventId}`)
        .on('postgres_changes',
          { event:'*', schema:'public', table:'comments', filter:`target_id=eq.${eventId}` },
          (payload)=>{
            const c = payload.new || payload.old;
            if (c?.target_type !== 'event') return;
            loadComments();
          })
        .subscribe();
    }

    // ===== Presence =====
    let presenceChannel;
    async function setupPresence(){
      if(!eventId) return;
      const user = authUI.getUser();
      const key = user?.id || `anon-${crypto.getRandomValues(new Uint32Array(1))[0]}`;
      presenceChannel?.unsubscribe();
      presenceChannel = supabase.channel(`presence-event-${eventId}`, {
        config: { presence: { key } }
      });
      presenceChannel
        .on('presence', { event:'sync' }, ()=>{
          const state = presenceChannel.presenceState();
          let total = 0;
          Object.values(state).forEach(arr => total += (arr?.length || 0));
          el('viewerCount').textContent = total;
        })
        .subscribe(async (status)=>{
          if(status === 'SUBSCRIBED'){
            await presenceChannel.track({ eventId, t: Date.now() });
          }
        });
    }

    // ===== Boot =====
    document.addEventListener('DOMContentLoaded', async ()=>{
      await syncPageAuth();
      // ✅ auth-ui.js handles nav auth UI — no updateAuthUI() needed

      await loadEvent();
      await loadComments();
      setupLiveComments();
      setupPresence();
    });
  </script>
</body>
</html>
