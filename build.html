<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Build — ROK Racers JA</title>
  <meta name="description" content="Build details in the ROK Racers JA garage." />
  <link rel="icon" href="/Assets/og.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://dtgnvzjtojdqmujzokgh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0Z252emp0b2pkcW11anpva2doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyMTkwMDAsImV4cCI6MjA3Nzc5NTAwMH0.r8LBQ14sxABB0mIw0exPlmv19W1fx0-iKLyefPhh8d8";
    window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>

  <!-- Shared auth helper for nav/sign-in + requireLogin -->
  <script src="/auth-ui.js"></script>

  <style>
    :root{
      --bg:#141414; --bg1:#161616; --bg2:#1b1b1b;
      --fg:#fff; --muted:#bdbdbd;
      --accent:#e50914; --line:rgba(255,255,255,.08);
      --shadow:0 40px 120px -30px rgba(0,0,0,.6);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--fg);font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif}
    a{color:var(--fg);text-decoration:none}
    .container{max-width:1100px;margin:0 auto;padding:0 24px}
    .sub{color:var(--muted)}

    /* NAV */
    .nav{
      position:sticky;top:0;z-index:50;
      background:rgba(18,18,18,.9);
      border-bottom:1px solid var(--line);
      backdrop-filter:saturate(140%) blur(8px);
    }
    .nav-inner{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 0;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .logo-img{width:48px;height:48px;border-radius:8px;object-fit:contain}
    h1,h2,h3{font-family:"Bebas Neue";letter-spacing:2px;margin:0}
    .title small{color:var(--muted)}
    .menu{display:flex;gap:10px;align-items:center}
    .btn{
      display:inline-flex;gap:8px;align-items:center;
      padding:10px 14px;border-radius:14px;
      border:1px solid var(--line);cursor:pointer;
      background:transparent;color:var(--fg);
      font-family:inherit;font-size:15px;
    }
    .btn.primary{background:#fff;color:#000;border-color:#fff}
    .btn.small{padding:6px 10px;font-size:14px}
    .btn[disabled]{opacity:.5;pointer-events:none}

    .section{padding:48px 0}
    .grid{display:grid;gap:20px}
    .cols-2{grid-template-columns:1.4fr 1fr}
    @media(max-width:960px){.cols-2{grid-template-columns:1fr}}

    .card{
      background:var(--bg1);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:18px;
    }
    .gallery-main{
      width:100%;border-radius:16px;overflow:hidden;
      border:1px solid var(--line);
      background:#000;
      aspect-ratio:16/9;
      display:flex;align-items:center;justify-content:center;
    }
    .gallery-main img{
      width:100%;height:100%;object-fit:cover;display:block;
    }
    .thumb-row{
      display:flex;gap:8px;margin-top:8px;overflow-x:auto;padding-bottom:4px;
    }
    .thumb{
      flex:0 0 auto;width:90px;height:60px;border-radius:10px;
      overflow:hidden;border:1px solid var(--line);cursor:pointer;
      opacity:.7;transition:opacity .15s,transform .15s;
    }
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .thumb.active{opacity:1;transform:translateY(-2px);border-color:var(--accent)}

    .badge{
      display:inline-flex;align-items:center;justify-content:center;
      padding:6px 10px;border-radius:999px;
      border:1px solid var(--line);
      background:var(--bg2);font-size:13px;margin-right:6px;margin-top:4px;
    }
    .badge.subtle{opacity:.8}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}

    .spec-grid{
      display:grid;gap:8px;
      grid-template-columns:repeat(2,minmax(0,1fr));
    }
    @media(max-width:760px){.spec-grid{grid-template-columns:1fr}}
    .spec-item{
      padding:8px 10px;border-radius:12px;
      background:var(--bg2);border:1px solid var(--line);
      font-size:13px;
    }
    .spec-label{display:block;font-size:11px;color:var(--muted);margin-bottom:2px}

    .comment-card{
      border-top:1px solid var(--line);
      padding:10px 0;
    }
    .comment-meta{
      font-size:12px;color:var(--muted);margin-bottom:4px;
    }

    /* Nav auth chip */
    .nav-auth{display:flex;align-items:center;gap:10px}
    .profile-menu{position:relative;display:flex;align-items:center}
    .profile-chip{
      width:40px;height:40px;border-radius:50%;
      background:var(--bg2);
      display:flex;align-items:center;justify-content:center;
      font-weight:600;cursor:pointer;border:1px solid var(--line);
    }
    .profile-chip span{font-size:16px}
    .dropdown{
      position:absolute;right:0;top:48px;
      background:var(--bg1);border:1px solid var(--line);
      box-shadow:0 20px 40px rgba(0,0,0,.45);
      border-radius:14px;display:flex;flex-direction:column;
      min-width:190px;z-index:999;
    }
    .dropdown a,.dropdown button{
      padding:10px 16px;text-align:left;border:none;
      background:transparent;color:var(--fg);font-size:15px;
      width:100%;cursor:pointer;font-family:inherit;
    }
    .dropdown a:hover,.dropdown button:hover{background:#1f1f1f}

    textarea.input{
      width:100%;
      background:var(--bg2);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      color:#fff;
      font:inherit;
      min-height:60px;
      resize:vertical;
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav class="nav" role="navigation" aria-label="Primary">
    <div class="container nav-inner">
      <a class="brand" href="/" aria-label="ROK Racers JA home">
        <img src="/Assets/logo.png" alt="" class="logo-img" />
        <div class="title">
          <h1>ROK RACERS JA</h1>
          <small>Build</small>
        </div>
      </a>

      <div style="display:flex;align-items:center;gap:12px">
        <div class="menu" role="menubar" aria-label="Main menu">
          <a class="btn" role="menuitem" href="/about.html">About</a>
          <a class="btn" role="menuitem" href="/events.html">Events</a>
          <a class="btn" role="menuitem" href="/garage.html">Garage</a>
        </div>

        <div class="nav-auth">
          <button id="navSignInBtn" class="btn">Sign in</button>
          <div id="navProfileWrap" class="profile-menu" style="display:none">
            <div id="navProfileChip" class="profile-chip" aria-haspopup="true" aria-expanded="false">
              <span id="navProfileInitials">U</span>
            </div>
            <div id="navProfileDropdown" class="dropdown" style="display:none">
              <a href="/garage.html">My Garage</a>
              <a href="/tickets.html">My Tickets</a>
              <a href="/likes-builds.html">Liked Builds</a>
              <a href="/likes-sightings.html">Liked Sightings</a>
              <button id="navSignOutBtn" style="justify-content:flex-start" type="button">Sign out</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="section">
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <h2 id="buildTitle" style="font-size:44px">Loading build…</h2>
          <!-- NEW: owner line -->
          <div id="buildOwner" class="sub" style="margin-top:4px"></div>
          <div id="buildMeta" class="meta-row"></div>
        </div>
        <div class="row">
          <button id="likeBtn" class="btn" type="button" disabled>♥ 0</button>
          <a href="/garage.html" class="btn small">← Back to garage</a>
        </div>
      </div>

      <div id="buildError" class="sub" style="margin-bottom:12px;color:#ffb3b3"></div>

      <div class="grid cols-2">
        <!-- LEFT: gallery + description -->
        <div class="card">
          <div id="galleryMain" class="gallery-main">
            <span class="sub">Loading…</span>
          </div>
          <div id="galleryThumbs" class="thumb-row"></div>

          <p id="buildDescription" style="margin-top:14px" class="sub"></p>
        </div>

        <!-- RIGHT: specs + meta -->
        <div class="card">
          <h3 style="font-size:24px;margin-bottom:8px">Build info</h3>
          <div id="buildBadges" class="meta-row" style="margin-bottom:10px"></div>

          <div id="specBlock" style="margin-top:10px">
            <h3 style="font-size:20px;margin-bottom:6px">Specs</h3>
            <div id="specGrid" class="spec-grid"></div>
          </div>

          <div style="margin-top:16px;font-size:13px" class="sub" id="buildFooterMeta"></div>
        </div>
      </div>
    </section>

    <!-- COMMENTS -->
    <section class="section">
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:10px">
        <h3 style="font-size:32px">Comments</h3>
      </div>

      <div id="commentFormRow" class="row" style="margin-bottom:10px;display:none">
        <textarea id="commentInput" class="input" placeholder="Drop your thoughts on this build…" style="flex:1;min-height:60px"></textarea>
        <button id="commentPostBtn" class="btn primary" type="button">Post</button>
      </div>

      <div id="commentsCard" class="card">
        <div id="commentsInner" class="sub">Loading comments…</div>
      </div>
    </section>
  </main>

<script>
  const buildId = new URLSearchParams(location.search).get('id');
  const $ = (id) => document.getElementById(id);

  let currentUser = null;
  let liked = false;
  let likeCount = 0;

  function escapeHTML(s){
    return (s || "").replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }

  // Fallback requireLogin if auth-ui.js didn't wire it up
  if (!window.authUI) window.authUI = {};
  if (!window.authUI.requireLogin) {
    window.authUI.requireLogin = async function(callback){
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        const email = prompt("Enter your email to sign in:");
        if (!email) return false;
        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: location.href }
        });
        if (error) {
          alert("Sign-in error: " + error.message);
          return false;
        }
        alert("Magic link sent. Check your email, then reload.");
        return false;
      }
      if (callback) callback(user);
      return true;
    };
  }

  function showBuildError(msg){
    $('buildError').textContent = msg;
  }

  function clearBuildUIForError(titleText){
    $('buildTitle').textContent = titleText;
    $('buildOwner').textContent = '';
    $('buildMeta').innerHTML = '';
    $('galleryMain').innerHTML = `<span class="sub">Nothing to show here.</span>`;
    $('galleryThumbs').innerHTML = '';
    $('buildDescription').textContent = '';
    $('buildBadges').innerHTML = '';
    $('specGrid').innerHTML = `<div class="sub">No specs available.</div>`;
    $('buildFooterMeta').textContent = '';
    $('likeBtn').disabled = true;
    $('commentFormRow').style.display = 'none';
    $('commentsInner').textContent = 'Comments are not available for this build.';
  }

  /* ===== Gallery ===== */
  function setGallery(images, fallbackUrl){
    const main   = $('galleryMain');
    const thumbs = $('galleryThumbs');
    let list = images && images.length ? images.map(im => im.image_url) : [];

    if(!list.length && fallbackUrl){
      list = [fallbackUrl];
    }

    if(!list.length){
      main.innerHTML = `<span class="sub">No media yet — owner hasn’t dropped visuals for this build.</span>`;
      thumbs.innerHTML = '';
      return;
    }

    let current = list[0];
    main.innerHTML = `<img src="${escapeHTML(current)}" alt="Build image">`;

    if(list.length === 1){
      thumbs.innerHTML = '';
      return;
    }

    thumbs.innerHTML = '';
    list.forEach((url, idx) => {
      const div = document.createElement('div');
      div.className = 'thumb' + (idx === 0 ? ' active' : '');
      div.innerHTML = `<img src="${escapeHTML(url)}" alt="Thumbnail ${idx+1}">`;
      div.addEventListener('click', () => {
        current = url;
        main.innerHTML = `<img src="${escapeHTML(current)}" alt="Build image">`;
        thumbs.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        div.classList.add('active');
      });
      thumbs.appendChild(div);
    });
  }

  /* ===== Badges + Specs ===== */
  function renderBadges(build){
    const wrap = $('buildBadges');
    const badges = [];

    const type = build.build_type || 'owned';
    const typeMap = {
      owned: 'Owned',
      dream: 'Dream build',
      for_sale: 'For sale'
    };
    badges.push(`<span class="badge">${typeMap[type] || 'Build'}</span>`);

    if(build.stage){
      const stageLabel = {
        stock: 'Stage: Stock/OEM+',
        stage_1: 'Stage 1 (bolt-ons)',
        stage_2: 'Stage 2 (boost)',
        track: 'Track / Drift',
        other: 'Stage: Custom'
      }[build.stage] || `Stage: ${build.stage}`;
      badges.push(`<span class="badge subtle">${escapeHTML(stageLabel)}</span>`);
    }

    if(build.power_goal){
      badges.push(`<span class="badge subtle">Power goal: ${build.power_goal} hp</span>`);
    }

    badges.push(
      `<span class="badge" style="border-color:${build.is_public ? 'var(--accent)' : 'var(--line)'}">
        ${build.is_public ? 'Public build' : 'Private (only you)'}
      </span>`
    );

    wrap.innerHTML = badges.join('');
  }

  function renderSpecs(specs){
    const grid = $('specGrid');
    if(!specs){
      grid.innerHTML = `<div class="sub">No specs added yet — this build’s story is still being written.</div>`;
      return;
    }

    const pairs = [
      ['wheels','Wheels'],
      ['tires','Tires'],
      ['suspension','Suspension'],
      ['brakes','Brakes'],
      ['engine','Engine'],
      ['exhaust','Exhaust'],
      ['drivetrain','Drivetrain'],
      ['interior','Interior'],
      ['exterior','Exterior'],
    ];

    const rows = pairs
      .map(([key,label]) => {
        const v = specs[key];
        if(!v) return '';
        return `
          <div class="spec-item">
            <span class="spec-label">${label}</span>
            <span>${escapeHTML(v)}</span>
          </div>`;
      })
      .filter(Boolean);

    if(!rows.length){
      grid.innerHTML = `<div class="sub">No specs added yet — owner hasn’t logged the parts list.</div>`;
    }else{
      grid.innerHTML = rows.join('');
    }
  }

  /* ===== Owner / profile ===== */
  async function loadOwnerMeta(build){
    const ownerEl = $('buildOwner');
    ownerEl.textContent = '';

    try{
      const { data, error } = await supabase
        .from('profiles')                // <-- adjust table name if needed
        .select('id, handle, display_name')
        .eq('id', build.user_id)
        .maybeSingle();

      if(error){
        console.error('Owner lookup error', error);
        return;
      }
      if(!data) return;

      const handle = (data.handle || '').trim();
      const name   = (data.display_name || '').trim();

      let html = '';

      if(handle){
        const safeHandle = escapeHTML(handle);
        const href = `/u/${encodeURIComponent(handle)}`;
        html = `Built by <a href="${href}" style="text-decoration:underline">@${safeHandle}</a>`;
      }else if(name){
        html = `Built by ${escapeHTML(name)}`;
      }

      ownerEl.innerHTML = html;
    }catch(err){
      console.error('Owner meta exception', err);
    }
  }

  /* ===== Likes ===== */
  async function loadLikes(){
    const likeBtn = $('likeBtn');
    const { data: { user } } = await supabase.auth.getUser();
    currentUser = user || null;

    let total = 0;

    const { data: likeAgg, error: likeAggErr } = await supabase
      .from('build_like_counts')
      .select('like_count')
      .eq('build_id', buildId)
      .maybeSingle();

    if(likeAggErr){
      console.error(likeAggErr);
    }else{
      total = Number(likeAgg?.like_count || 0);
    }

    likeCount = total;

    if(user){
      const { data: existing, error: existingErr } = await supabase
        .from('build_likes')
        .select('build_id')
        .eq('build_id', buildId)
        .eq('user_id', user.id)
        .maybeSingle();
      if(existingErr){
        console.error(existingErr);
      }
      liked = !!existing;
    }else{
      liked = false;
    }

    likeBtn.disabled = false;
    likeBtn.textContent = `${liked ? '♥' : '♡'} ${likeCount}`;
    likeBtn.setAttribute('aria-pressed', liked ? 'true' : 'false');

    likeBtn.onclick = async () => {
      const ok = await window.authUI.requireLogin();
      if(!ok) return;

      const { data: { user } } = await supabase.auth.getUser();
      if(!user) return;

      likeBtn.disabled = true;

      const { data: existing, error: existingErr2 } = await supabase
        .from('build_likes')
        .select('build_id')
        .eq('build_id', buildId)
        .eq('user_id', user.id)
        .maybeSingle();

      if(existingErr2){
        console.error(existingErr2);
        alert('That move stalled. Try again in a few seconds.');
        likeBtn.disabled = false;
        return;
      }

      if(existing){
        const { error: delErr } = await supabase
          .from('build_likes')
          .delete()
          .eq('build_id', buildId)
          .eq('user_id', user.id);
        if(delErr){
          console.error(delErr);
          alert('Unboost failed. Try again shortly.');
        }else{
          liked = false;
          likeCount = Math.max(0, likeCount - 1);
        }
      }else{
        const { error: insErr } = await supabase
          .from('build_likes')
          .insert({ build_id: buildId, user_id: user.id });
        if(insErr){
          console.error(insErr);
          alert('Couldn’t boost this build. Try again shortly.');
        }else{
          liked = true;
          likeCount += 1;
        }
      }

      likeBtn.disabled = false;
      likeBtn.textContent = `${liked ? '♥' : '♡'} ${likeCount}`;
      likeBtn.setAttribute('aria-pressed', liked ? 'true' : 'false');
    };
  }

  /* ===== Build load ===== */
  async function loadBuild(){
    if(!buildId){
      showBuildError('No build selected. Head back to the garage and pick one.');
      clearBuildUIForError('No build selected');
      return false;
    }

    const { data: { user } } = await supabase.auth.getUser();
    currentUser = user || null;

    const { data: build, error } = await supabase
      .from('builds')
      .select('*')
      .eq('id', buildId)
      .maybeSingle();

    if(error || !build){
      console.error(error);
      showBuildError('We couldn’t find this build. It may have been deleted or moved.');
      clearBuildUIForError('Build not found');
      return false;
    }

    // Respect private builds
    if(!build.is_public && (!user || user.id !== build.user_id)){
      showBuildError('This build is private. Ask the owner to share a public build or check their garage.');
      clearBuildUIForError('Private build');
      return false;
    }

    document.title = `${build.title || 'Build'} — ROK Racers JA`;
    $('buildTitle').textContent = build.title || 'Untitled build';

    const created = build.created_at ? new Date(build.created_at) : null;
    const when = created ? created.toLocaleString('en-US', {
      month:'short', day:'2-digit', year:'numeric'
    }) : '';

    const metaBits = [];
    if(build.make || build.model || build.year){
      const carLabel = [build.year, build.make, build.model].filter(Boolean).join(' ');
      if(carLabel) metaBits.push(`<span class="sub">${escapeHTML(carLabel)}</span>`);
    }
    if(build.color_hex){
      metaBits.push(`
        <span class="badge subtle">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${build.color_hex};margin-right:4px;"></span>
          Paint
        </span>
      `);
    }
    if(when){
      metaBits.push(`<span class="sub">Added ${escapeHTML(when)}</span>`);
    }
    $('buildMeta').innerHTML = metaBits.join(' • ');

    if(build.description){
      $('buildDescription').innerHTML = escapeHTML(build.description).replace(/\n/g,'<br>');
    }else{
      $('buildDescription').innerHTML = `<span class="sub">No description yet — owner hasn’t told this build’s story.</span>`;
    }

    const footer = [];
    if(build.is_public){
      footer.push('Visible in your public garage and eligible for Top 5.');
    }else{
      footer.push('Only visible to you (private build).');
    }
    $('buildFooterMeta').textContent = footer.join(' ');

    const { data: images, error: imgErr } = await supabase
      .from('build_images')
      .select('id,image_url')
      .eq('build_id', buildId)
      .order('created_at', { ascending:true });

    if(imgErr){
      console.error(imgErr);
      setGallery([], build.custom_image_url || build.thumb_url || null);
    }else{
      setGallery(images || [], build.custom_image_url || build.thumb_url || null);
    }

    renderSpecs(build.specs || null);
    renderBadges(build);

    // NEW: owner meta
    await loadOwnerMeta(build);

    await loadLikes();

    return true;
  }

  /* ===== Comments ===== */
  function renderComment(c){
    const dt = c.created_at ? new Date(c.created_at).toLocaleString() : '';
    return `
      <div class="comment-card">
        <div class="comment-meta">${escapeHTML(dt)}</div>
        <div>${escapeHTML(c.body).replace(/\n/g,'<br>')}</div>
      </div>`;
  }

  async function loadComments(){
    const wrap = $('commentsInner');
    const { data, error } = await supabase
      .from('comments')
      .select('id,body,created_at,user_id')
      .eq('build_id', buildId)
      .order('created_at', { ascending:true });

    if(error){
      console.error(error);
      wrap.textContent = 'We couldn’t load comments just now. Refresh to try again.';
      return;
    }
    if(!data || !data.length){
      wrap.textContent = 'No comments yet — be the first to drop your thoughts on this build.';
      return;
    }
    wrap.innerHTML = data.map(renderComment).join('');
  }

  async function updateCommentFormVisibility(){
    const { data: { user } } = await supabase.auth.getUser();
    currentUser = user || null;
    const formRow = $('commentFormRow');
    formRow.style.display = user ? 'flex' : 'none';
  }

  $('commentPostBtn').addEventListener('click', async () => {
    const ok = await window.authUI.requireLogin();
    if(!ok) return;

    const input = $('commentInput');
    const text = input.value.trim();
    if(!text) return;

    const { data: { user } } = await supabase.auth.getUser();
    if(!user) return;

    const { error } = await supabase
      .from('comments')
      .insert({
        build_id: buildId,
        body: text,
        user_id: user.id
      });

    if(error){
      console.error(error);
      alert('Could not post comment. Try again in a few seconds.');
      return;
    }
    input.value = '';
    await loadComments();
  });

  /* ===== Init ===== */
  window.addEventListener('DOMContentLoaded', async ()=>{
    if(!buildId){
      showBuildError('No build selected. Head back to the garage and pick one.');
      clearBuildUIForError('No build selected');
      return;
    }

    const canView = await loadBuild();
    if(!canView) return;

    await updateCommentFormVisibility();
    await loadComments();

    supabase.auth.onAuthStateChange(updateCommentFormVisibility);
  });
</script>

</body>
</html>
