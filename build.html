<style>
  :root{--bg:#141414;--bg1:#161616;--bg2:#1b1b1b;--fg:#fff;--muted:#bdbdbd;--accent:#e50914;--line:rgba(255,255,255,.08)}

  h1,h2,h3{font-family:"Bebas Neue";letter-spacing:2px;margin:0}
  .sub{color:var(--muted)}
  .section{padding:56px 0}
  .card{background:var(--bg1);border:1px solid var(--line);border-radius:20px;overflow:hidden}

  .cols-2{grid-template-columns:1.2fr .8fr}
  @media(max-width:980px){.cols-2{grid-template-columns:1fr}}
  .input, textarea.input{width:100%;background:var(--bg2);border:1px solid var(--line);color:#fff;padding:12px;border-radius:12px;outline:none;font-family:inherit}
  .thumbs{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .thumbs img{width:90px;height:70px;object-fit:cover;border:1px solid var(--line);border-radius:10px;cursor:pointer;opacity:.9}

  .meta{display:flex;gap:10px;flex-wrap:wrap}
  .comment{border-top:1px solid var(--line);padding:12px 0}
  .comment .actions{display:flex;gap:8px;margin-top:8px}
  .nav-auth {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Wrap the chip + dropdown together */

  position: relative;
  display: flex;
  align-items: center;

  width: 40px;

  border-radius: 50%;

  display: flex;

  cursor: pointer;

.profile-chip span {

.dropdown {

  <main class="container">
    <section class="section">
      <div class="grid cols-2">
        <!-- LEFT: gallery + content -->
        <article id="buildCard" class="card">
          <div class="pad sub">Loading…</div>
        </article>

        <!-- RIGHT: meta + like + privacy -->
        <aside class="card">
          <div id="metaBox" class="pad sub">Loading…</div>
          <div class="pad" id="likeBox" style="border-top:1px solid var(--line)">
            <div class="row" style="justify-content:space-between">
              <div><strong>Likes:</strong> <span id="likeCount">0</span></div>
              <button id="likeBtn" class="btn" title="Like">♡</button>
            </div>
          </div>
        </aside>
      </div>
    </section>

    <!-- COMMENTS -->
    <section class="section">
      <h2 style="font-size:40px">Comments</h2>
      <div id="commentForm" class="row" style="margin:10px 0 16px; display:none">
        <textarea id="commentText" class="input" rows="3" placeholder="Share your thoughts…"></textarea>
        <button id="commentPost" class="btn primary">Post</button>
      </div>
      <div id="comments" class="card"><div class="pad sub">Loading comments…</div></div>
    </section>
  </main>

  <script>
    /* ========== Small helpers ========== */
    const buildId = new URLSearchParams(location.search).get('id');
    const el = (id)=>document.getElementById(id);
    const escapeHTML = (s)=> (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    let currentUserId = null;

    function fmtKV(label, value){
      if(!value) return '';
      return `<div><strong>${escapeHTML(label)}:</strong> ${escapeHTML(String(value))}</div>`;
    }

    /* ========== Auth mini widget ========== */
    async function refreshAuthUI(){
      const { data: { user } } = await supabase.auth.getUser();
      const badge = el('userBadge');
      const si = el('signinBtn');
      const so = el('signoutBtn');
      const form = el('commentForm');
      if(user){
        badge.textContent = user.email;
        si.style.display = 'none';
        so.style.display = 'inline-flex';
        form.style.display = 'flex';
      }else{
        badge.textContent = '';
        si.style.display = 'inline-flex';
        so.style.display = 'none';
        form.style.display = 'none';
      }
      currentUserId = user?.id || null;
      // after auth change, refresh “liked?” state
      if(buildId) await refreshLikedState();
    }

    el('signinBtn').onclick = async ()=>{
      const email = prompt("Enter your email to sign in:");
      if(!email) return;
      const { error } = await supabase.auth.signInWithOtp({ 
        email, 
        options:{ emailRedirectTo: location.href } 
      });
      if(error) return alert("Sign-in error: " + error.message);
      alert("Magic link sent! Check your email.");
    };

    el('signoutBtn').onclick = async ()=>{
      await supabase.auth.signOut(); 
      await refreshAuthUI();
    };

    supabase.auth.onAuthStateChange(() => {
      refreshAuthUI();
    });
    refreshAuthUI();

// --- Elements ---
const signinBtn = document.getElementById("signinBtn");
const profileMenu = document.getElementById("profileMenu");
const profileChip = document.getElementById("profileChip");
const dropdown = document.getElementById("dropdown");
const initialsEl = document.getElementById("profileInitials");

// --- Auth UI state ---
async function updateAuthUI() {
  const { data: { user }} = await supabase.auth.getUser();

  if (user) {
    signinBtn.style.display = "none";
    profileMenu.style.display = "flex";

    const initials = user.email?.charAt(0)?.toUpperCase() || "U";
    initialsEl.textContent = initials;
  } else {
    signinBtn.style.display = "inline-flex";
    profileMenu.style.display = "none";
    dropdown.style.display = "none";
  }
}

// Toggle dropdown
profileChip?.addEventListener("click", () => {
  dropdown.style.display = dropdown.style.display === "none" ? "block" : "none";
});
document.addEventListener("click", (e) => {
  if (!profileMenu.contains(e.target)) dropdown.style.display = "none";
});

// Sign in
signinBtn.onclick = async () => {
  const email = prompt("Enter your email:");
  if (!email) return;
  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: location.href }
  });
  if (error) alert(error.message);
  else alert("Magic link sent! Check your inbox.");
};

// Sign out
document.getElementById("signoutBtn")?.addEventListener("click", async () => {
  await supabase.auth.signOut();
  updateAuthUI();
});

// Init
supabase.auth.onAuthStateChange(updateAuthUI);
updateAuthUI();

// --- Access guard ---
window.requireLogin = async function(callback){
  const { data: { user }} = await supabase.auth.getUser();
  if (!user) {
    alert("Please sign in first.");
    signinBtn.click();
    return false;
  }
  if (callback) callback();
  return true;
};



    /* ========== Load build + images ========== */
    let currentImages = [];
    let currentLikeCount = 0;

    async function loadBuild(){
      const card = el('buildCard');
      const meta = el('metaBox');
      if(!buildId){
        card.innerHTML = `<div class="pad sub">Missing build ID.</div>`;
        meta.innerHTML='';
        return;
      }

      const [
        { data: build, error: e1 },
        { data: imgs, error: e2 },
        { data: countRow }
      ] = await Promise.all([

      supabase
      .from('builds')
      .select('id,title,description,make,model,year,stage,power_goal,is_public,user_id,created_at,base_model_key')
      .eq('id', buildId).maybeSingle(),

      supabase
      .from('build_images')
      .select('image_url,sort_order,created_at')
      .eq('build_id', buildId).order('sort_order',{ascending:true})
      .order('created_at',{ascending:true}),
  
      supabase
      .from('build_like_counts')
      .select('like_count').eq('build_id', buildId).maybeSingle()
]);


      if(e1 || !build){
        console.error(e1);
        card.innerHTML = `<div class="pad sub">Build not found or you don't have access.</div>`;
        meta.innerHTML = '';
        return;
      }

      document.title = `${build.title} — ROK Racers JA`;
      currentImages = imgs || [];
      currentLikeCount = countRow?.like_count || 0;
      el('likeCount').textContent = currentLikeCount;

      const hero = currentImages[0]?.image_url || '/Assets/og.png';
      const thumbs = (currentImages||[]).map((im,i)=>`
        <img src="${im.image_url}" data-idx="${i}" class="${i===0?'active':''}" alt="thumb ${i+1}">
      `).join('');

      card.innerHTML = `
        ${hero ? `<img id="heroImg" src="${hero}" alt="${escapeHTML(build.title)}" class="heroimg">` : ''}
        <div class="pad">
          <h2 style="font-size:44px">${escapeHTML(build.title)}</h2>
          <div class="meta" style="margin-top:8px">
            <span class="chip">${build.is_public ? 'Public' : 'Private'}</span>
            <span class="chip">Posted ${new Date(build.created_at).toLocaleDateString()}</span>
          </div>

          <div class="thumbs" id="thumbs">${thumbs}</div>

          <div style="margin-top:16px">${
            build.description 
              ? escapeHTML(build.description).replace(/\n/g,'<br>') 
              : '<span class="sub">No description yet.</span>'
          }</div>

          <div class="card" style="margin-top:16px">
            <div class="pad">
              <h3 style="font-size:28px">Specs</h3>
              <div class="grid" style="grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px">
                ${fmtKV('Make', build.make)}
                ${fmtKV('Model', build.model)}
                ${fmtKV('Year', build.year)}
                ${fmtKV('Stage', build.stage)}
                ${fmtKV('Power goal', build.power_goal)}
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('thumbs')?.addEventListener('click', (e)=>{
        const img = e.target.closest('img[data-idx]'); 
        if(!img) return;
        const idx = Number(img.dataset.idx);
        const heroEl = document.getElementById('heroImg');
        heroEl.src = currentImages[idx].image_url;
        document.querySelectorAll('#thumbs img').forEach(n=>n.classList.remove('active'));
        img.classList.add('active');
      });

            // Meta box (owner info + Edit when owner)
      const { data: { user } } = await supabase.auth.getUser();
      const isOwner = user && user.id === build.user_id;

      let metaHtml = `
        <div><strong>Visibility:</strong> ${build.is_public ? 'Public' : 'Private'}</div>
      `;

      if(isOwner){
        metaHtml += `
          <div class="sub" style="margin-top:6px">You own this build.</div>
          <a href="/build-edit.html?id=${build.id}"
             class="btn primary"
             style="margin-top:12px;display:inline-flex">
            Edit build
          </a>
        `;
      }else{
        metaHtml += `
          <div class="sub" style="margin-top:6px">
            Only the owner can edit this build.
          </div>
        `;
      }

      meta.innerHTML = metaHtml;

    }

    /* ========== Likes ========== */
    async function refreshLikedState(){
      if(!buildId) return;
      const { data: { user } } = await supabase.auth.getUser();
      const btn = el('likeBtn');
      if(!user){
        btn.textContent = '♡'; 
        btn.title='Sign in to like';
        return;
      }
      const { data: row } = await supabase
        .from('build_likes')
        .select('build_id')
        .eq('build_id', buildId)
        .eq('user_id', user.id)
        .maybeSingle();
      if(row){
        btn.textContent='♥'; 
        btn.title='Unlike';
      } else {
        btn.textContent='♡'; 
        btn.title='Like';
      }
    }

    el('likeBtn').addEventListener('click', async ()=>{
      const { data: { user } } = await supabase.auth.getUser();
      if(!user) return alert('Sign in to like builds.');

      const { data: row } = await supabase
        .from('build_likes')
        .select('build_id')
        .eq('build_id', buildId)
        .eq('user_id', user.id)
        .maybeSingle();

      if(row){
        const { error } = await supabase
          .from('build_likes')
          .delete()
          .eq('build_id', buildId)
          .eq('user_id', user.id);
        if(error) return alert('Unlike failed: ' + error.message);
        el('likeBtn').textContent='♡'; 
        el('likeBtn').title='Like';
      }else{
        const { error } = await supabase
          .from('build_likes')
          .insert({ build_id: buildId, user_id: user.id });
        if(error) return alert('Like failed: ' + error.message);
        el('likeBtn').textContent='♥'; 
        el('likeBtn').title='Unlike';
      }
    });

    // Live like count
    let likeChannel;
    function liveLikes(){
      likeChannel?.unsubscribe();
      likeChannel = supabase.channel(`build-like-${buildId}`)
        .on('postgres_changes',{
          event:'INSERT',
          schema:'public',
          table:'build_likes',
          filter:`build_id=eq.${buildId}`
        }, ()=>{
          const n = Number(el('likeCount').textContent||0);
          el('likeCount').textContent = n+1;
        })
        .on('postgres_changes',{
          event:'DELETE',
          schema:'public',
          table:'build_likes',
          filter:`build_id=eq.${buildId}`
        }, ()=>{
          const n = Number(el('likeCount').textContent||0);
          el('likeCount').textContent = Math.max(0, n-1);
        })
        .subscribe();
    }

    /* ========== Comments (using build_comments) ========== */
    function renderComment(c){
      const dt = new Date(c.created_at).toLocaleString();
      const isOwner = currentUserId && (c.profile_id === currentUserId);
      return `
        <div class="comment" data-id="${c.id}">
          <div class="sub" style="margin-bottom:6px">${escapeHTML(dt)}</div>
          <div class="body" data-mode="view">${escapeHTML(c.body).replace(/\n/g,'<br>')}</div>
          ${isOwner ? `
            <div class="actions">
              <button class="btn" data-action="edit">Edit</button>
              <button class="btn" data-action="delete">Delete</button>
            </div>
          `:''}
        </div>
      `;
    }

    async function loadComments(){
      const wrap = el('comments');
      const { data, error } = await supabase
        .from('build_comments')
        .select('id, body, created_at, profile_id')
        .eq('build_id', buildId)
        .order('created_at', { ascending: true });

      if(error){
        console.error(error);
        wrap.innerHTML = `<div class="pad sub">Couldn’t load comments.</div>`;
        return;
      }
      if(!data || !data.length){
        wrap.innerHTML = `<div class="pad sub">No comments yet — be the first.</div>`;
        return;
      }

      wrap.innerHTML = `<div class="pad" id="commentsInner">` + data.map(renderComment).join('') + `</div>`;
    }

    el('commentPost').onclick = async ()=>{
      const input = el('commentText');
      const text = input.value.trim();
      if(!text) return;
      const { data: { user } } = await supabase.auth.getUser();
      if(!user) return alert("Please sign in first.");

      const { error } = await supabase.from('build_comments').insert({
        build_id: buildId, body: text, profile_id: user.id
      });
      if(error) return alert("Couldn’t post: " + error.message);
      input.value = "";
      // realtime will append
    };

    // Edit/Delete handlers
    el('comments').addEventListener('click', async (e)=>{
      const btn = e.target.closest('button[data-action]');
      if(!btn) return;
      const node = e.target.closest('.comment');
      const id = node?.dataset.id;
      const action = btn.dataset.action;

      if(action === 'delete'){
        if(!confirm('Delete this comment?')) return;
        const { error } = await supabase.from('build_comments').delete().eq('id', id);
        if(error) return alert('Delete failed: ' + error.message);
      }

      if(action === 'edit'){
        const body = node.querySelector('.body');
        if(body.dataset.mode !== 'view') return;
        const current = body.innerText;
        body.dataset.mode = 'edit';
        body.innerHTML = `
          <textarea class="input" rows="3">${escapeHTML(current)}</textarea>
          <div class="row" style="margin-top:8px">
            <button class="btn primary" data-action="save">Save</button>
            <button class="btn" data-action="cancel">Cancel</button>
          </div>
        `;
      }

      if(action === 'cancel'){
        const { data, error } = await supabase.from('build_comments').select('*').eq('id', id).maybeSingle();
        if(!error && data){ node.outerHTML = renderComment(data); }
      }

      if(action === 'save'){
        const ta = node.querySelector('textarea');
        const newText = (ta?.value || '').trim();
        if(!newText) return alert('Comment cannot be empty.');
        const { error } = await supabase.from('build_comments').update({ body: newText }).eq('id', id);
        if(error) return alert('Update failed: ' + error.message);
        // realtime will update and re-render
      }
    });

    // Live comments
    let commentsChannel;
    function liveComments(){
      commentsChannel?.unsubscribe();
      commentsChannel = supabase.channel(`build-comments-${buildId}`)
        .on('postgres_changes',{
          event:'INSERT',
          schema:'public',
          table:'build_comments',
          filter:`build_id=eq.${buildId}`
        }, (p)=>{
          const c = p.new;
          const wrap = el('comments');
          if (wrap.textContent.includes('No comments yet')) {
            wrap.innerHTML = `<div class="pad" id="commentsInner"></div>`;
          }
          const inner = el('commentsInner') || (()=>{ 
            wrap.innerHTML = `<div class="pad" id="commentsInner"></div>`; 
            return el('commentsInner'); 
          })();
          inner.insertAdjacentHTML('beforeend', renderComment(c));
        })
        .on('postgres_changes',{
          event:'UPDATE',
          schema:'public',
          table:'build_comments',
          filter:`build_id=eq.${buildId}`
        }, (p)=>{
          const c = p.new;
          const node = document.querySelector(`.comment[data-id="${c.id}"]`);
          if(node){ node.outerHTML = renderComment(c); }
        })
        .on('postgres_changes',{
          event:'DELETE',
          schema:'public',
          table:'build_comments',
          filter:`build_id=eq.${buildId}`
        }, (p)=>{
          const id = p.old.id;
          const node = document.querySelector(`.comment[data-id="${id}"]`);
          node?.remove();
          const inner = el('commentsInner');
          if(inner && !inner.children.length){
            el('comments').innerHTML = `<div class="pad sub">No comments yet — be the first.</div>`;
          }
        })
        .subscribe();
    }

    async function loadParts(){
  const wrap = document.getElementById('partsBox');
  if(!wrap) return;

  const { data, error } = await supabase
    .from('build_parts')
    .select('id,category,label,brand,spec,notes,created_at')
    .eq('build_id', buildId)
    .order('category', { ascending: true })
    .order('created_at', { ascending: true });

  if(error){
    wrap.innerHTML = `<h3 style="font-size:28px">Parts</h3><div class="sub">Couldn’t load parts.</div>`;
    return;
  }
  if(!data || !data.length){
    wrap.innerHTML = `<h3 style="font-size:28px">Parts</h3><div class="sub">No parts listed yet.</div>`;
    return;
  }

  const byCat = new Map();
  data.forEach(p => {
    const key = p.category || 'other';
    if(!byCat.has(key)) byCat.set(key, []);
    byCat.get(key).push(p);
  });

  let html = `<h3 style="font-size:28px">Parts</h3>`;
  html += `<div class="grid" style="grid-template-columns:1fr;gap:10px;margin-top:8px">`;

  for(const [cat, parts] of byCat.entries()){
    html += `
      <div>
        <div class="chip" style="margin-bottom:6px">${cat[0].toUpperCase() + cat.slice(1)}</div>
        <ul class="sub" style="list-style:none;padding:0;margin:0">
          ${parts.map(p => `
            <li style="margin-bottom:4px">
              <strong>${escapeHTML(p.label || '')}</strong>
              ${p.brand ? ` — ${escapeHTML(p.brand)}` : ''}
              ${p.spec ? ` <span style="opacity:.9">(${escapeHTML(p.spec)})</span>` : ''}
              ${p.notes ? `<div style="font-size:13px;margin-top:2px">${escapeHTML(p.notes)}</div>` : ''}
            </li>
          `).join('')}
        </ul>
      </div>
    `;
  }
  html += `</div>`;

  wrap.innerHTML = html;
}


    /* ========== Boot ========== */
    window.addEventListener('DOMContentLoaded', async ()=>{
  await loadBuild();
  await refreshLikedState();
  liveLikes();

  await loadComments();
  liveComments();

  await loadParts();
});

  </script>
</body>
</html>
