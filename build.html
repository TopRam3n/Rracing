<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Build — ROK Racers JA</title>
<meta name="description" content="Build details from the ROK Racers JA garage." />
<link rel="icon" href="/Assets/og.png" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  /* === Supabase client (use your real constants) === */
  const SUPABASE_URL = "https://dtgnvzjtojdqmujzokgh.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0Z252emp0b2pkcW11anpva2doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyMTkwMDAsImV4cCI6MjA3Nzc5NTAwMH0.r8LBQ14sxABB0mIw0exPlmv19W1fx0-iKLyefPhh8d8";
  window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>
<style>
  :root{--bg:#141414;--bg1:#161616;--bg2:#1b1b1b;--fg:#fff;--muted:#bdbdbd;--accent:#e50914;--line:rgba(255,255,255,.08)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif}
  a{color:var(--fg);text-decoration:none}
  .container{max-width:1100px;margin:0 auto;padding:0 24px}
  .nav{position:sticky;top:0;background:rgba(18,18,18,.9);border-bottom:1px solid var(--line);backdrop-filter:saturate(140%) blur(8px);z-index:10}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:44px;height:44px;border-radius:8px}
  h1,h2,h3{font-family:"Bebas Neue";letter-spacing:2px;margin:0}
  .sub{color:var(--muted)}
  .section{padding:56px 0}
  .card{background:var(--bg1);border:1px solid var(--line);border-radius:20px;overflow:hidden}
  .pad{padding:18px}
  .btn{display:inline-flex;gap:8px;align-items:center;padding:10px 14px;border-radius:14px;border:1px solid var(--line);cursor:pointer}
  .btn.primary{background:#fff;color:#000;border-color:#fff}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:14px}
  .row{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .grid{display:grid;gap:24px}
  .cols-2{grid-template-columns:1.2fr .8fr}
  @media(max-width:980px){.cols-2{grid-template-columns:1fr}}
  .input, textarea.input{width:100%;background:var(--bg2);border:1px solid var(--line);color:#fff;padding:12px;border-radius:12px;outline:none;font-family:inherit}
  .thumbs{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .thumbs img{width:90px;height:70px;object-fit:cover;border:1px solid var(--line);border-radius:10px;cursor:pointer;opacity:.9}
  .thumbs img.active{outline:2px solid #fff;opacity:1}
  .heroimg{width:100%;aspect-ratio:16/9;object-fit:cover;background:#0f0f0f;display:block}
  .meta{display:flex;gap:10px;flex-wrap:wrap}
  .comment{border-top:1px solid var(--line);padding:12px 0}
  .comment .actions{display:flex;gap:8px;margin-top:8px}
</style>
</head>
<body>
  <!-- NAV -->
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand" aria-label="ROK Racers JA home">
        <img src="/Assets/logo.png" class="logo" alt="">
        <div><h1>ROK RACERS JA</h1><small class="sub">Build</small></div>
      </a>
      <div class="row">
        <span id="userBadge" class="sub"></span>
        <button id="signinBtn" class="btn">Sign in</button>
        <button id="signoutBtn" class="btn" style="display:none">Sign out</button>
        <a class="btn" href="/garage.html">Garage</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="section">
      <div class="grid cols-2">
        <!-- LEFT: gallery + content -->
        <article id="buildCard" class="card">
          <div class="pad sub">Loading…</div>
        </article>

        <!-- RIGHT: meta + like + privacy -->
        <aside class="card">
          <div id="metaBox" class="pad sub">Loading…</div>
          <div class="pad" id="likeBox" style="border-top:1px solid var(--line)">
            <div class="row" style="justify-content:space-between">
              <div><strong>Likes:</strong> <span id="likeCount">0</span></div>
              <button id="likeBtn" class="btn" title="Like">♡</button>
            </div>
          </div>
        </aside>
      </div>
    </section>

    <!-- COMMENTS -->
    <section class="section">
      <h2 style="font-size:40px">Comments</h2>
      <div id="commentForm" class="row" style="margin:10px 0 16px; display:none">
        <textarea id="commentText" class="input" rows="3" placeholder="Share your thoughts…"></textarea>
        <button id="commentPost" class="btn primary">Post</button>
      </div>
      <div id="comments" class="card"><div class="pad sub">Loading comments…</div></div>
    </section>
  </main>

  <script>
    /* ========== Small helpers ========== */
    const buildId = new URLSearchParams(location.search).get('id');
    const el = (id)=>document.getElementById(id);
    const escapeHTML = (s)=> (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    let currentUserId = null;

    function fmtKV(label, value){
      if(!value) return '';
      return `<div><strong>${escapeHTML(label)}:</strong> ${escapeHTML(String(value))}</div>`;
    }

    /* ========== Auth mini widget ========== */
    async function refreshAuthUI(){
      const { data: { user } } = await supabase.auth.getUser();
      const badge = el('userBadge');
      const si = el('signinBtn');
      const so = el('signoutBtn');
      const form = el('commentForm');
      if(user){
        badge.textContent = user.email;
        si.style.display = 'none';
        so.style.display = 'inline-flex';
        form.style.display = 'flex';
      }else{
        badge.textContent = '';
        si.style.display = 'inline-flex';
        so.style.display = 'none';
        form.style.display = 'none';
      }
      currentUserId = user?.id || null;
      // after auth change, refresh “liked?” state
      if(buildId) await refreshLikedState();
    }
    el('signinBtn').onclick = async ()=>{
      const email = prompt("Enter your email to sign in:");
      if(!email) return;
      const { error } = await supabase.auth.signInWithOtp({ email, options:{ emailRedirectTo: location.href }});
      if(error) return alert("Sign-in error: " + error.message);
      alert("Magic link sent! Check your email.");
    };
    el('signoutBtn').onclick = async ()=>{ await supabase.auth.signOut(); await refreshAuthUI(); };
    supabase.auth.onAuthStateChange(refreshAuthUI); refreshAuthUI();

    /* ========== Load build + images ========== */
    let currentImages = [];
    let currentLikeCount = 0;

    async function loadBuild(){
      const card = el('buildCard');
      const meta = el('metaBox');
      if(!buildId){ card.innerHTML = `<div class="pad sub">Missing build ID.</div>`; meta.innerHTML=''; return; }

      const [{ data: build, error: e1 }, { data: imgs, error: e2 }, { data: countRow }] = await Promise.all([
        supabase.from('builds').select('id,title,description,make,model,year,stage,power_goal,is_public,user_id,created_at').eq('id', buildId).maybeSingle(),
        supabase.from('build_images').select('image_url,sort_order,created_at').eq('build_id', buildId).order('sort_order',{ascending:true}).order('created_at',{ascending:true}),
        supabase.from('build_like_counts').select('like_count').eq('build_id', buildId).maybeSingle()
      ]);

      if(e1 || !build){
        card.innerHTML = `<div class="pad sub">Build not found or you don't have access.</div>`;
        meta.innerHTML = '';
        return;
      }

      document.title = `${build.title} — ROK Racers JA`;
      currentImages = imgs || [];
      currentLikeCount = countRow?.like_count || 0;
      el('likeCount').textContent = currentLikeCount;

      // Gallery markup
      const hero = currentImages[0]?.image_url || '/Assets/og.png';
      const thumbs = (currentImages||[]).map((im,i)=>`
        <img src="${im.image_url}" data-idx="${i}" class="${i===0?'active':''}" alt="thumb ${i+1}">
      `).join('');

      card.innerHTML = `
        ${hero ? `<img id="heroImg" src="${hero}" alt="${escapeHTML(build.title)}" class="heroimg">` : ''}
        <div class="pad">
          <h2 style="font-size:44px">${escapeHTML(build.title)}</h2>
          <div class="meta" style="margin-top:8px">
            <span class="chip">${build.is_public ? 'Public' : 'Private'}</span>
            <span class="chip">Posted ${new Date(build.created_at).toLocaleDateString()}</span>
          </div>

          <div class="thumbs" id="thumbs">${thumbs}</div>

          <div style="margin-top:16px">${(build.description ? escapeHTML(build.description).replace(/\n/g,'<br>') : '<span class="sub">No description yet.</span>')}</div>

          <div class="card" style="margin-top:16px">
            <div class="pad">
              <h3 style="font-size:28px">Specs</h3>
              <div class="grid" style="grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px">
                ${fmtKV('Make', build.make)}
                ${fmtKV('Model', build.model)}
                ${fmtKV('Year', build.year)}
                ${fmtKV('Stage', build.stage)}
                ${fmtKV('Power goal', build.power_goal)}
              </div>
            </div>
          </div>
        </div>
      `;

      // thumbs click to swap hero
      document.getElementById('thumbs')?.addEventListener('click', (e)=>{
        const img = e.target.closest('img[data-idx]'); if(!img) return;
        const idx = Number(img.dataset.idx);
        const heroEl = document.getElementById('heroImg');
        heroEl.src = currentImages[idx].image_url;
        document.querySelectorAll('#thumbs img').forEach(n=>n.classList.remove('active'));
        img.classList.add('active');
      });

      // Meta box (owner info minimal)
      meta.innerHTML = `
        <div><strong>Visibility:</strong> ${build.is_public ? 'Public' : 'Private'}</div>
        <div class="sub" style="margin-top:6px">Only the owner can edit. (Edit page coming soon)</div>
      `;
    }

    /* ========== Likes ========== */
    async function refreshLikedState(){
      if(!buildId) return;
      const { data: { user } } = await supabase.auth.getUser();
      const btn = el('likeBtn');
      if(!user){ btn.textContent = '♡'; btn.title='Sign in to like'; return; }
      const { data: row } = await supabase.from('build_likes').select('build_id').eq('build_id', buildId).eq('profile_id', user.id).maybeSingle();
      if(row){ btn.textContent='♥'; btn.title='Unlike'; } else { btn.textContent='♡'; btn.title='Like'; }
    }

    el('likeBtn').addEventListener('click', async ()=>{
      const { data: { user } } = await supabase.auth.getUser();
      if(!user) return alert('Sign in to like builds.');

      const { data: row } = await supabase.from('build_likes').select('build_id').eq('build_id', buildId).eq('profile_id', user.id).maybeSingle();
      if(row){
        const { error } = await supabase.from('build_likes').delete().eq('build_id', buildId).eq('profile_id', user.id);
        if(error) return alert('Unlike failed: ' + error.message);
        el('likeBtn').textContent='♡'; el('likeBtn').title='Like';
      }else{
        const { error } = await supabase.from('build_likes').insert({ build_id: buildId, profile_id: user.id });
        if(error) return alert('Like failed: ' + error.message);
        el('likeBtn').textContent='♥'; el('likeBtn').title='Unlike';
      }
    });

    // Live like count
    let likeChannel;
    function liveLikes(){
      likeChannel?.unsubscribe();
      likeChannel = supabase.channel(`build-like-${buildId}`)
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'build_likes',filter:`build_id=eq.${buildId}`}, (p)=>{
          const n = Number(el('likeCount').textContent||0);
          el('likeCount').textContent = n+1;
        })
        .on('postgres_changes',{event:'DELETE',schema:'public',table:'build_likes',filter:`build_id=eq.${buildId}`}, (p)=>{
          const n = Number(el('likeCount').textContent||0);
          el('likeCount').textContent = Math.max(0, n-1);
        })
        .subscribe();
    }

    /* ========== Comments ========== */
    function renderComment(c){
      const dt = new Date(c.created_at).toLocaleString();
      const isOwner = currentUserId && (c.profile_id === currentUserId);
      return `
        <div class="comment" data-id="${c.id}">
          <div class="sub" style="margin-bottom:6px">${escapeHTML(dt)}</div>
          <div class="body" data-mode="view">${escapeHTML(c.body).replace(/\n/g,'<br>')}</div>
          ${isOwner ? `
            <div class="actions">
              <button class="btn" data-action="edit">Edit</button>
              <button class="btn" data-action="delete">Delete</button>
            </div>
          `:''}
        </div>
      `;
    }

    async function loadComments(){
      const wrap = el('comments');
      const { data, error } = await supabase
        .from('build_comments')
        .select('id, body, created_at, profile_id')
        .eq('build_id', buildId)
        .order('created_at', { ascending: true });

      if(error){ wrap.innerHTML = `<div class="pad sub">Couldn’t load comments.</div>`; return; }
      if(!data || !data.length){ wrap.innerHTML = `<div class="pad sub">No comments yet — be the first.</div>`; return; }

      wrap.innerHTML = `<div class="pad" id="commentsInner">` + data.map(renderComment).join('') + `</div>`;
    }

    el('commentPost').onclick = async ()=>{
      const input = el('commentText');
      const text = input.value.trim();
      if(!text) return;
      const { data: { user } } = await supabase.auth.getUser();
      if(!user) return alert("Please sign in first.");

      const { error } = await supabase.from('build_comments').insert({
        build_id: buildId, body: text, profile_id: user.id
      });
      if(error) return alert("Couldn’t post: " + error.message);
      input.value = "";
      // realtime will append
    };

    // Edit/Delete handlers
    el('comments').addEventListener('click', async (e)=>{
      const btn = e.target.closest('button[data-action]');
      if(!btn) return;
      const node = e.target.closest('.comment');
      const id = node?.dataset.id;
      const action = btn.dataset.action;

      if(action === 'delete'){
        if(!confirm('Delete this comment?')) return;
        const { error } = await supabase.from('build_comments').delete().eq('id', id);
        if(error) return alert('Delete failed: ' + error.message);
      }

      if(action === 'edit'){
        const body = node.querySelector('.body');
        if(body.dataset.mode !== 'view') return;
        const current = body.innerText;
        body.dataset.mode = 'edit';
        body.innerHTML = `
          <textarea class="input" rows="3">${escapeHTML(current)}</textarea>
          <div class="row" style="margin-top:8px">
            <button class="btn primary" data-action="save">Save</button>
            <button class="btn" data-action="cancel">Cancel</button>
          </div>
        `;
      }

      if(action === 'cancel'){
        const { data, error } = await supabase.from('build_comments').select('*').eq('id', id).maybeSingle();
        if(!error && data){ node.outerHTML = renderComment(data); }
      }

      if(action === 'save'){
        const ta = node.querySelector('textarea');
        const newText = (ta?.value || '').trim();
        if(!newText) return alert('Comment cannot be empty.');
        const { error } = await supabase.from('build_comments').update({ body: newText }).eq('id', id);
        if(error) return alert('Update failed: ' + error.message);
        // realtime will update and re-render
      }
    });

    // Live comments
    let commentsChannel;
    function liveComments(){
      commentsChannel?.unsubscribe();
      commentsChannel = supabase.channel(`build-comments-${buildId}`)
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'build_comments',filter:`build_id=eq.${buildId}`}, (p)=>{
          const c = p.new;
          const wrap = el('comments');
          if (wrap.textContent.includes('No comments yet')) {
            wrap.innerHTML = `<div class="pad" id="commentsInner"></div>`;
          }
          const inner = el('commentsInner') || (()=>{ wrap.innerHTML = `<div class="pad" id="commentsInner"></div>`; return el('commentsInner'); })();
          inner.insertAdjacentHTML('beforeend', renderComment(c));
        })
        .on('postgres_changes',{event:'UPDATE',schema:'public',table:'build_comments',filter:`build_id=eq.${buildId}`}, (p)=>{
          const c = p.new;
          const node = document.querySelector(`.comment[data-id="${c.id}"]`);
          if(node){ node.outerHTML = renderComment(c); }
        })
        .on('postgres_changes',{event:'DELETE',schema:'public',table:'build_comments',filter:`build_id=eq.${buildId}`}, (p)=>{
          const id = p.old.id;
          const node = document.querySelector(`.comment[data-id="${id}"]`);
          node?.remove();
          const inner = el('commentsInner');
          if(inner && !inner.children.length){
            el('comments').innerHTML = `<div class="pad sub">No comments yet — be the first.</div>`;
          }
        })
        .subscribe();
    }

    /* ========== Boot ========== */
    window.addEventListener('DOMContentLoaded', async ()=>{
      await loadBuild();
      await refreshLikedState();
      liveLikes();

      await loadComments();
      liveComments();
    });
  </script>
</body>
</html>
