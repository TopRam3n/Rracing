<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Marketplace — ROK Racers JA</title>
  <meta name="description" content="Marketplace coming soon." />
  <link rel="icon" href="../../Assets/og.png"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

  <!-- Design System (centralized tokens + components) -->
  <link rel="stylesheet" href="../../styles/design-system.css">

  <style>
    :root{
      --bg:#050508; --bg1:#141414; --bg2:#1b1b1b;
      --fg:#fff; --muted:#bdbdbd; --accent:#e50914; --accent-yellow:#FFD93B;
      --line:rgba(255,255,255,.08); --shadow:0 40px 120px -30px rgba(0,0,0,.7);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:radial-gradient(circle at top, #161623 0, #050508 55%, #000 100%);
      color:var(--fg);
      font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif;
    }
    a{color:var(--fg);text-decoration:none}
    .container{max-width:980px;margin:0 auto;padding:56px 24px}
    h1{font-family:"Bebas Neue";letter-spacing:2px;margin:0;font-size:64px}
    .sub{color:var(--muted)}
    .card{
      margin-top:18px;
      background:var(--bg1);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .pad{padding:18px}
    .btn{
      display:inline-flex;gap:8px;align-items:center;
      padding:10px 14px;border-radius:999px;
      border:1px solid var(--line);
      cursor:pointer;font-size:13px;
      background:transparent;color:var(--fg);
    }
    .btn.primary{
      background:radial-gradient(circle at top left,#ff4d4d,var(--accent));
      color:#fff;border-color:rgba(229,9,20,.9);
      box-shadow:0 0 18px rgba(229,9,20,.5);
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}
  </style>
</head>
<body>
  <main class="container">
    <h1>Marketplace</h1>
    <div class="sub">A one stop shop for all the cars, parts and deals you need— coming soon!</div>

    <div class="card">
      <div class="pad">
        <div class="row">
          <a class="btn" href="./index.html">Home</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
