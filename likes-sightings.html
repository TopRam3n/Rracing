<!-- Design System (centralized tokens + components) -->
<link rel="stylesheet" href="../../styles/design-system.css">

<style>
  :root{
    --bg:#050508;
    --bg1:#141414;
    --bg2:#1b1b1b;
    --fg:#fff;
    --muted:#bdbdbd;
    --accent:#128b02;
    --accent-yellow:#FFD93B;
    --line:rgba(255,255,255,.08);
    --shadow:0 40px 120px -30px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:radial-gradient(circle at top, #161623 0, #050508 55%, #000 100%);
    color:var(--fg);
    font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif;
  }
  a{color:inherit;text-decoration:none}
  .container{max-width:1200px;margin:0 auto;padding:0 24px}

  .nav{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(5,5,8,.9);
    border-bottom:1px solid var(--line);
    backdrop-filter:saturate(140%) blur(12px);
  }
  .nav-inner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 0;
    gap:16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .logo{
    width:48px;
    height:48px;
    border-radius:12px;
    object-fit:cover;
  }
  h1,h2{
    font-family:"Bebas Neue",system-ui,sans-serif;
    letter-spacing:2px;
    margin:0;
  }
  .title small{
    color:var(--muted);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.16em;
  }

  .nav-auth{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
  .btn{
    display:inline-flex;
    gap:8px;
    align-items:center;
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    cursor:pointer;
    font-size:13px;
    background:transparent;
    color:var(--fg);
    transition:transform .18s ease-out, box-shadow .18s ease-out, background .18s ease-out, border-color .18s ease-out;
  }
  .btn.primary{
    background:radial-gradient(circle at top left,#ff4d4d,var(--accent));
    color:#fff;
    border-color:rgba(229,9,20,.9);
    box-shadow:0 0 18px rgba(229,9,20,.5);
  }
  .btn.primary:hover{
    box-shadow:0 0 26px rgba(229,9,20,.7);
    transform:translateY(-1px);
  }
  .btn:hover{
    background:rgba(255,255,255,0.03);
  }

  .profile-menu{
    position:relative;
    display:flex;
    align-items:center;
  }
  .profile-chip{
    width:32px;
    height:32px;
    border-radius:50%;
    background:var(--bg2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
    cursor:pointer;
    border:1px solid var(--line);
    font-size:13px;
    transition:box-shadow .18s ease-out, border-color .18s ease-out, transform .18s ease-out;
  }
  .profile-chip:hover{
    border-color:rgba(255,255,255,.32);
    box-shadow:0 0 16px rgba(255,217,59,.6);
    transform:translateY(-1px);
  }
  .dropdown{
    position:absolute;
    right:0;
    top:40px;
    background:#121212;
    border:1px solid var(--line);
    box-shadow:0 20px 40px rgba(0,0,0,.6);
    border-radius:16px;
    display:flex;
    flex-direction:column;
    min-width:190px;
    z-index:60;
  }
  .dropdown a,
  .dropdown button{
    padding:10px 16px;
    text-align:left;
    border:none;
    background:transparent;
    color:var(--fg);
    font-size:13px;
    width:100%;
    cursor:pointer;
  }
  .dropdown a:hover,
  .dropdown button:hover{
    background:#1f1f1f;
  }

  main{padding:32px 0 48px}
  .header-row{
    display:flex;
    justify-content:space-between;
    gap:16px;
    align-items:flex-end;
    flex-wrap:wrap;
    margin-bottom:12px;
  }
  .sub{
    color:var(--muted);
    font-size:14px;
  }

  .grid{
    display:grid;
    gap:18px;
    grid-template-columns:repeat(3,1fr);
  }
  @media(max-width:960px){
    .grid{grid-template-columns:repeat(2,1fr);}
  }
  @media(max-width:640px){
    .grid{grid-template-columns:1fr;}
  }

  .card{
    background:var(--bg1);
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:transform .22s ease-out, box-shadow .22s ease-out, border-color .22s ease-out;
  }
  .card:hover{
    transform:translateY(-4px);
    border-color:rgba(255,217,59,0.7);
    box-shadow:0 30px 80px rgba(0,0,0,.9);
  }

  .thumb{
    position:relative;
    height:160px;
    background:linear-gradient(135deg,#171717,#2a2a2a);
    overflow:hidden;
  }
  .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .thumb::before{
    content:"";
    position:absolute;
    inset:-30%;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,217,59,0.3), transparent 60%),
      radial-gradient(circle at 80% 80%, rgba(229,9,20,0.5), transparent 60%);
    mix-blend-mode:screen;
    opacity:0.9;
  }
  .pill-location{
    position:absolute;
    left:10px;
    bottom:10px;
    padding:4px 10px;
    border-radius:999px;
    background:rgba(0,0,0,0.75);
    border:1px solid rgba(255,255,255,0.22);
    font-size:11px;
  }
  .pill-category{
    position:absolute;
    right:10px;
    top:10px;
    padding:4px 10px;
    border-radius:999px;
    background:rgba(0,0,0,0.75);
    border:1px solid rgba(255,255,255,0.22);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.16em;
  }

  .card-body{
    padding:10px 12px 12px;
  }
  .title-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:4px;
  }
  .card-title{
    font-size:14px;
    font-weight:600;
  }
  .handle{
    font-size:11px;
    color:var(--muted);
  }
  .caption{
    font-size:13px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .meta-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11px;
    color:var(--muted);
  }
  .likes-comments{
    display:flex;
    gap:10px;
    align-items:center;
  }

  .unlike-btn{
    margin-top:8px;
    padding:4px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.22);
    background:rgba(0,0,0,0.7);
    font-size:11px;
    cursor:pointer;
  }

  .empty{
    border-radius:18px;
    border:1px dashed rgba(255,255,255,0.16);
    padding:20px 18px;
    background:rgba(5,5,8,0.9);
    text-align:left;
    box-shadow:0 24px 60px rgba(0,0,0,0.9);
  }

  @media(max-width:600px){
    .header-row{align-items:flex-start;}
  }
</style>
</head>
<body>
  <nav class="nav" role="navigation" aria-label="Primary">
    <div class="container nav-inner">
      <a class="brand" href="./index.html" aria-label="ROK Racers JA home">
        <img src="../../Assets/logo.png" alt="" class="logo">
        <div class="title">
          <h1>ROK RACERS JA</h1>
          <small>Liked sightings</small>
        </div>
      </a>

      <div class="nav-auth">
        <a class="btn" href="./index.html">Home</a>

        <button id="loginBtn" class="btn">Log in</button>
        <button id="joinBtn" class="btn primary">Join the grid</button>

        <div id="navProfileWrap" class="profile-menu" style="display:none">
          <div id="navProfileChip" class="profile-chip" aria-haspopup="true" aria-expanded="false">
            <span id="navProfileInitials">U</span>
          </div>
          <div id="navProfileDropdown" class="dropdown" style="display:none">
            <a href="./garage.html">My Garage</a>
            <a href="./tickets.html">My Tickets</a>
            <a href="./likes-builds.html">Liked Builds</a>
            <a href="./likes-sightings.html">Liked Sightings</a>
            <a href="./teams.html">My Teams</a>
            <a href="../Users/activity.html">Activity</a>
            <button id="signoutBtn" type="button">Sign out</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <section>
      <div class="header-row">
        <div>
          <h2 style="font-size:40px;letter-spacing:2px;text-transform:uppercase;">Liked sightings</h2>
          <p class="sub">
            The link-ups, pulls and clean park-ups you’ve saved from the island feed.
          </p>
        </div>
        <button class="btn" onclick="location.href='./sightings.html'">
          View full sightings feed
        </button>
      </div>

      <div id="likedSightingsGrid" class="grid" aria-live="polite">
        <div class="empty">
          Loading your liked sightings…
        </div>
      </div>
    </section>
  </main>

  <script>
    async function loadLikedSightings(){
      const grid = document.getElementById('likedSightingsGrid');
      grid.innerHTML = `<div class="empty">Loading your liked sightings…</div>`;

      const { data: { user } } = await supabase.auth.getUser();
      if (!user){
        grid.innerHTML = `
          <div class="empty">
            <p style="margin-bottom:8px;">Sign in to see the sightings you’ve liked.</p>
            <button class="btn primary" type="button"
              onclick="window.authUI && authUI.requireLogin(()=>location.reload())">
              Log in to view liked sightings
            </button>
          </div>`;
        return;
      }

      const { data: likes, error: likesErr } = await supabase
        .from('sighting_likes')
        .select('sighting_id')
        .eq('user_id', user.id);

      if (likesErr){
        console.error(likesErr);
        grid.innerHTML = `
          <div class="empty">
            Couldn’t load your liked sightings right now. Refresh in a bit.
          </div>`;
        return;
      }

      if (!likes || !likes.length){
        grid.innerHTML = `
          <div class="empty">
            <p style="margin-bottom:6px;">You haven’t liked any sightings yet.</p>
            <p class="sub" style="margin-bottom:10px;">
              Jump into the island feed, tap ♥ on the shots you rate, and they’ll live here.
            </p>
            <button class="btn primary" type="button" onclick="location.href='./sightings.html'">
              Browse sightings
            </button>
          </div>`;
        return;
      }

      const ids = likes.map(l => l.sighting_id);
      const { data: rows, error: sErr } = await supabase
        .from('sightings_with_like_count')
        .select('id,title,caption,location,parish,image_url,created_at,like_count,comment_count,author_handle,category')
        .in('id', ids)
        .order('created_at',{ ascending:false });

      if (sErr){
        console.error(sErr);
        grid.innerHTML = `
          <div class="empty">
            Couldn’t load the sightings linked to your likes. Try again shortly.
          </div>`;
        return;
      }

      if (!rows || !rows.length){
        grid.innerHTML = `
          <div class="empty">
            Those sightings might have been removed or gone private.
            Check the live feed for new drops.
          </div>`;
        return;
      }

      grid.innerHTML = rows.map(s => {
        const locLine = [s.parish, s.location].filter(Boolean).join(" · ") || "Jamaica";
        const when = s.created_at ? new Date(s.created_at).toLocaleDateString() : "";
        const handle = s.author_handle ? '@'+s.author_handle : 'Sighting';
        const cat = s.category || 'Sighting';
        const teaser = s.caption ? (s.caption.length > 120 ? s.caption.slice(0,120) + '…' : s.caption) : '';

        const img = s.image_url
          ? `<img src="${s.image_url}" alt="${s.title || 'Sighting'}" loading="lazy">`
          : "";

        return `
          <article class="card" data-id="${s.id}">
            <div class="thumb" onclick="location.href='./sighting.html?id=${s.id}'">
              ${img}
              <div class="pill-location">${locLine}</div>
              <div class="pill-category">${cat}</div>
            </div>
            <div class="card-body">
              <div class="title-row" onclick="location.href='./sighting.html?id=${s.id}'">
                <div class="card-title">${s.title || 'Sighting'}</div>
                <div class="handle">${handle}${when ? ' · ' + when : ''}</div>
              </div>
              <div class="caption" onclick="location.href='./sighting.html?id=${s.id}'">
                ${teaser}
              </div>
              <div class="meta-row">
                <div class="likes-comments">
                  <span>♥ ${s.like_count || 0}</span>
                  <span>💬 ${s.comment_count || 0}</span>
                </div>
                <button class="unlike-btn" type="button" data-unlike="${s.id}">
                  Remove like
                </button>
              </div>
            </div>
          </article>`;
      }).join('');

      grid.addEventListener('click', async (e) => {
        const btn = e.target.closest('[data-unlike]');
        if (!btn) return;

        const id = btn.getAttribute('data-unlike');
        const { data: { user: user2 } } = await supabase.auth.getUser();
        if (!user2){
          alert("Sign in to manage your likes.");
          return;
        }

        const { error } = await supabase
          .from('sighting_likes')
          .delete()
          .eq('sighting_id', id)
          .eq('user_id', user2.id);

        if (error){
          console.error(error);
          alert("Couldn’t remove that like. Try again in a few seconds.");
          return;
        }

        const card = grid.querySelector(`article.card[data-id="${id}"]`);
        if (card) card.remove();

        if (!grid.querySelector('article.card')){
          grid.innerHTML = `
            <div class="empty">
              <p style="margin-bottom:6px;">No liked sightings left on your list.</p>
              <p class="sub" style="margin-bottom:10px;">
                Hit the island feed and save the next clean spot you see.
              </p>
              <button class="btn primary" type="button" onclick="location.href='./sightings.html'">
                View sightings
              </button>
            </div>`;
        }
      }, { once:false });
    }

    document.addEventListener('DOMContentLoaded', loadLikedSightings);
  </script>
</body>
</html>
