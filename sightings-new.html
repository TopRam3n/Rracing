<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>New Sighting — ROK Racers JA</title>
  <link rel="icon" href="/Assets/og.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://dtgnvzjtojdqmujzokgh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0Z252emp0b2pkcW11anpva2doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyMTkwMDAsImV4cCI6MjA3Nzc5NTAwMH0.r8LBQ14sxABB0mIw0exPlmv19W1fx0-iKLyefPhh8d8";
    window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>

  <!-- shared nav/auth helpers -->
  <script src="/auth-ui.js"></script>

  <style>
    :root{
      --bg:#141414; --bg1:#161616; --bg2:#1b1b1b;
      --fg:#fff; --muted:#bdbdbd;
      --accent:#e50914; --line:rgba(255,255,255,.08);
      --shadow:0 40px 120px -30px rgba(0,0,0,.6);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--fg);font-family:"Rajdhani",system-ui,Segoe UI,Roboto,Arial,sans-serif}
    a{color:var(--fg);text-decoration:none}
    .container{max-width:900px;margin:0 auto;padding:0 24px}
    .sub{color:var(--muted)}

    /* NAV like tickets/build */
    .nav{
      position:sticky;top:0;z-index:50;
      background:rgba(18,18,18,.9);
      border-bottom:1px solid var(--line);
      backdrop-filter:saturate(140%) blur(8px);
    }
    .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
    .brand{display:flex;align-items:center;gap:12px}
    .logo-img{width:48px;height:48px;border-radius:8px;object-fit:contain}
    h1,h2{font-family:"Bebas Neue";letter-spacing:2px;margin:0}
    .title small{color:var(--muted)}

    .menu{display:flex;gap:10px;align-items:center}
    .btn{
      display:inline-flex;gap:8px;align-items:center;
      padding:10px 14px;border-radius:14px;
      border:1px solid var(--line);cursor:pointer;
      background:transparent;color:var(--fg);
      font-family:inherit;
    }
    .btn.primary{background:#fff;color:#000;border-color:#fff}
    .btn[disabled]{opacity:.5;pointer-events:none}

    .section{padding:48px 0}

    input[type="text"],
    select,
    textarea,
    input[type="file"]{
      width:100%;background:var(--bg2);border:1px solid var(--line);
      color:#fff;padding:10px 12px;border-radius:12px;font:inherit;outline:none;
    }
    textarea{min-height:70px;resize:vertical}
    label{display:block;font-size:14px;margin-bottom:4px}
    .field{margin-bottom:14px}

    .card{
      background:var(--bg1);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    /* nav auth */
    .nav-auth{display:flex;align-items:center;gap:10px}
    .profile-menu{position:relative;display:flex;align-items:center}
    .profile-chip{
      width:40px;height:40px;border-radius:50%;
      background:var(--bg2);display:flex;align-items:center;justify-content:center;
      font-weight:600;cursor:pointer;border:1px solid var(--line);
    }
    .profile-chip span{font-size:16px}
    .dropdown{
      position:absolute;right:0;top:48px;
      background:var(--bg1);border:1px solid var(--line);
      box-shadow:0 20px 40px rgba(0,0,0,.45);
      border-radius:14px;display:flex;flex-direction:column;
      min-width:190px;z-index:999;
    }
    .dropdown a,.dropdown button{
      padding:10px 16px;border:none;background:transparent;color:var(--fg);
      text-align:left;width:100%;cursor:pointer;font-family:inherit;font-size:15px;
    }
    .dropdown a:hover,.dropdown button:hover{background:#1f1f1f}
  </style>
</head>
<body>
  <!-- NAV -->
  <nav class="nav" role="navigation">
    <div class="container nav-inner">
      <a class="brand" href="/" aria-label="ROK Racers JA home">
        <img src="/Assets/logo.png" class="logo-img" alt="">
        <div class="title">
          <h1>ROK RACERS JA</h1>
          <small>New sighting</small>
        </div>
      </a>

      <div style="display:flex;align-items:center;gap:12px">
        <div class="menu">
          <a class="btn" href="/events.html">Events</a>
          <a class="btn" href="/garage.html">Garage</a>
          <a class="btn" href="/sightings.html">Sightings</a>
        </div>
        <div class="nav-auth">
          <button id="navSignInBtn" class="btn">Sign in</button>
          <div id="navProfileWrap" class="profile-menu" style="display:none">
            <div id="navProfileChip" class="profile-chip" aria-haspopup="true" aria-expanded="false">
              <span id="navProfileInitials">U</span>
            </div>
            <div id="navProfileDropdown" class="dropdown" style="display:none">
              <a href="/garage.html">My Garage</a>
              <a href="/tickets.html">My Tickets</a>
              <a href="/likes-builds.html">Liked Builds</a>
              <a href="/likes-sightings.html">Liked Sightings</a>
              <button id="navSignOutBtn" type="button">Sign out</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="section">
      <h2 style="font-size:40px">Upload a sighting</h2>
      <p class="sub">Drop a clean shot of a car you caught on the road. Basic info now, we’ll add more filters later.</p>

      <p id="authWarning" class="sub" style="margin-top:8px"></p>

      <form id="sightingForm" class="card" style="margin-top:18px">
        <div class="field">
          <label for="title">Caption</label>
          <textarea id="title" placeholder="e.g. Clean S15 leaving Half-Way-Tree…" required></textarea>
        </div>

        <div class="field">
          <label for="location">Location (optional)</label>
          <input id="location" type="text" placeholder="e.g. Half-Way-Tree, Kingston" />
        </div>

        <div class="field">
          <label for="parish">Parish (optional)</label>
          <select id="parish">
            <option value="">Select parish…</option>
            <option value="Kingston">Kingston</option>
            <option value="St. Andrew">St. Andrew</option>
            <option value="St. Catherine">St. Catherine</option>
            <option value="St. Thomas">St. Thomas</option>
            <option value="Portland">Portland</option>
            <option value="St. Mary">St. Mary</option>
            <option value="St. Ann">St. Ann</option>
            <option value="Trelawny">Trelawny</option>
            <option value="St. James">St. James</option>
            <option value="Hanover">Hanover</option>
            <option value="Westmoreland">Westmoreland</option>
            <option value="St. Elizabeth">St. Elizabeth</option>
            <option value="Manchester">Manchester</option>
            <option value="Clarendon">Clarendon</option>
          </select>
        </div>

        <div class="field">
          <label for="photo">Photo</label>
          <input id="photo" type="file" accept="image/*" required>
          <p class="sub" style="font-size:12px;margin-top:4px">JPG/PNG, keep it under ~5MB if you can.</p>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px">
          <button id="saveBtn" type="submit" class="btn primary">Post sighting</button>
          <a href="/sightings.html" class="btn">Cancel</a>
          <span id="formMsg" class="sub"></span>
        </div>
      </form>
    </section>
  </main>

  <script>
    // Fallback requireLogin if auth-ui.js doesn't define one yet
    if (!window.requireLogin) {
      window.requireLogin = async function(callback){
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
          const email = prompt("Enter your email to sign in:");
          if (!email) return false;
          const { error } = await supabase.auth.signInWithOtp({
            email,
            options: { emailRedirectTo: location.href }
          });
          if (error) { alert("Sign-in error: " + error.message); return false; }
          alert("Magic link sent. Check your email, then reload.");
          return false;
        }
        if (callback) callback(user);
        return true;
      };
    }

    const authWarning = document.getElementById('authWarning');
    const form = document.getElementById('sightingForm');
    const formMsg = document.getElementById('formMsg');
    const saveBtn = document.getElementById('saveBtn');

    let currentUser = null;

    async function ensureUser(){
      const { data: { user } } = await supabase.auth.getUser();
      currentUser = user;
      if(!user){
        authWarning.textContent = 'Sign in to post a sighting. We’ll attach it to your profile.';
        saveBtn.disabled = true;
      }else{
        authWarning.textContent = '';
        saveBtn.disabled = false;
      }
    }

    async function uploadPhoto(user){
      const input = document.getElementById('photo');
      const file = input.files[0];
      if(!file) throw new Error("Please choose a photo.");

      const path = `user-${user.id}/${Date.now()}-${file.name}`;
      const { error } = await supabase
        .storage
        .from('sightings')
        .upload(path, file, { upsert:false });

      if(error) throw error;

      const { data } = supabase
        .storage
        .from('sightings')
        .getPublicUrl(path);

      return { publicUrl: data.publicUrl, path };
    }

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      formMsg.textContent = '';
      saveBtn.disabled = true;
      saveBtn.textContent = 'Posting…';

      const ok = await window.requireLogin();
      if(!ok){
        saveBtn.disabled = false;
        saveBtn.textContent = 'Post sighting';
        return;
      }

      const { data: { user } } = await supabase.auth.getUser();
      currentUser = user;
      if(!user){
        formMsg.textContent = 'Sign-in required.';
        saveBtn.disabled = false;
        saveBtn.textContent = 'Post sighting';
        return;
      }

      try{
        const title = document.getElementById('title').value.trim();
        const locationTxt = document.getElementById('location').value.trim() || null;
        const parish = document.getElementById('parish').value || null;

        if(!title) throw new Error("Caption is required.");

        const { publicUrl, path } = await uploadPhoto(user);

        const { data, error } = await supabase
          .from('sightings')
          .insert({
            user_id: user.id,
            title,
            location: locationTxt,
            parish,
            image_url: publicUrl,
            storage_path: path
          })
          .select('id')
          .maybeSingle();

        if(error) throw error;

        formMsg.textContent = 'Posted! Redirecting…';
        window.location.href = `/sighting.html?id=${data.id}`;
      }catch(err){
        console.error(err);
        formMsg.textContent = 'Couldn’t post sighting: ' + err.message;
      }finally{
        saveBtn.disabled = false;
        saveBtn.textContent = 'Post sighting';
      }
    });

    document.addEventListener('DOMContentLoaded', ensureUser);
  </script>
</body>
</html>
